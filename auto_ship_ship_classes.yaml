# Auto-ship ship-class policy.
#
# New ship classes inherit `defaults`, so the safe baseline is two manual
# reviewer keys and no auto-merge/auto-open policy. Runtime code must treat
# missing or unknown classes as defaults plus a closed path allowlist.
version: 1

defaults:
  auto_merge: false
  keys_auto_open: false
  required_keys:
    - codex_reviewer
    - cowork_reviewer
  approval_ttl_minutes: 30
  required_status_checks:
    - auto_ship_envelope
    - ci
  forbidden_paths:
    - workflow/runtime/**
    - workflow/providers/**
    - workflow/api/**
    - workflow/wiki/**
    - workflow/dispatcher/**
    - .github/**
    - scripts/deploy/**
    - migrations/**
    - "*.env"
    - "*secret*"
    - "*auth*"

reviewer_roles:
  codex_reviewer:
    provider_family: openai
    github_review_required: true
  cowork_reviewer:
    provider_family: anthropic
    github_review_required: true
  host_reviewer:
    provider_family: host
    github_review_required: true

ship_classes:
  docs_canary:
    description: Initial canary class for narrowly scoped docs canary changes.
    allowed_paths:
      - docs/autoship-canaries/**
    graduation:
      next_class: docs_general
      min_successful_auto_ships: 10
      min_clean_observation_windows: 3
      rollback_free_days: 30
      max_forbidden_path_events: 0
      max_envelope_bypass_events: 0

  docs_general:
    description: Proposed post-canary docs class; disabled until graduation.
    enabled: false
    allowed_paths:
      - docs/**
    graduation:
      next_class: tests_canary
      min_successful_auto_ships: 10
      min_clean_observation_windows: 3
      rollback_free_days: 30
      max_forbidden_path_events: 0
      max_envelope_bypass_events: 0

  tests_canary:
    description: Proposed narrow test/fixture canary class; disabled until graduation.
    enabled: false
    allowed_paths:
      - tests/fixtures/autoship_canaries/**
      - tests/test_autoship_canaries_*.py
    graduation:
      next_class: null
      min_successful_auto_ships: 10
      min_clean_observation_windows: 3
      rollback_free_days: 30
      max_forbidden_path_events: 0
      max_envelope_bypass_events: 0
