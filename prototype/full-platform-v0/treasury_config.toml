# Treasury configuration for the Workflow paid-market.
#
# This file carries ONLY public addresses + configuration. Never seed phrases,
# never private keys. See .secrets/ (gitignored) for the host-local seed/key
# storage.
#
# Target state (per #29 paid-market spec §6.5): all fields here are runtime-
# editable via the `treasury_config` Postgres table at production. This TOML
# is the v0 prototype stand-in + the static seed for production at first
# deploy.

[treasury.base-sepolia]
address                  = "0x3023f144fdaEC0F3E5F75125D55B9BAe3AEEdEb1"
chain_id                 = 84532
chain_name               = "Base Sepolia"
network_type             = "testnet"
fee_bps                  = 100       # 1% (per project_monetization_crypto_1pct memory)
settlement_threshold_usd = 1.00      # Per-bid on-chain above, batched below (per project_q10_q11_q12_resolutions Q4-follow-up)
batch_cadence_hours      = 168       # Weekly
label                    = "workflow-testnet-treasury-v0"
created                  = "2026-04-19"
is_active                = true

# Seed storage location (references only — never values):
#   .secrets/base-sepolia-treasury.txt  (gitignored; host-local filesystem)
#   MUST BE MOVED to admin-pool vault (1Password / Vaultwarden) before any
#   production use per SUCCESSION.md §3.2.

# Mainnet placeholder — to be populated when testnet validation is complete
# and 2-of-3 multisig wallet is established per SUCCESSION.md §2.1 + §6.5.
[treasury.base-mainnet]
address                  = ""       # intentionally empty — TBD at mainnet migration
chain_id                 = 8453
chain_name               = "Base"
network_type             = "mainnet"
is_active                = false
