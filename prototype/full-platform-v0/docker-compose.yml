services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: workflow_v0_postgres
    environment:
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow_v0_dev
      POSTGRES_DB: workflow_v0
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-apply migrations on first container start.
      # Files here run in filename order (001 → 002 → 003). Only runs
      # if pgdata volume is empty — subsequent restarts preserve state.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow_v0"]
      interval: 2s
      timeout: 2s
      retries: 15

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow_v0_gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WORKFLOW_V0_DSN: "postgresql://workflow:workflow_v0_dev@postgres:5432/workflow_v0"
    # Run gateway in HTTP transport mode for in-container debugging.
    command: >
      python -c "from gateway import mcp; mcp.run(transport='streamable-http', host='0.0.0.0', port=8002)"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from gateway import _health_payload; import sys; sys.exit(0 if _health_payload()['postgres']=='ok' else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
