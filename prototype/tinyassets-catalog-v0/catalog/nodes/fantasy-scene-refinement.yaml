input_schema: |
  {"type": "object", "required": ["scene_draft_ref", "chapter_context"],
   "properties": {"scene_draft_ref": {"type": "string",
                                      "description": "instance_ref to the current scene draft (prose text) on owner's host"},
                  "chapter_context": {"type": "object",
                                      "properties": {"prior_scenes_summary": "string",
                                                     "chapter_arc_goal": "string",
                                                     "character_voice_refs": {"type": "array", "items": "string"}}},
                  "refinement_focus": {"type": "array",
                                       "items": {"type": "string",
                                                 "enum": ["pacing", "dialogue", "specificity", "pov_discipline", "sensory_grounding"]}},
                  "preserve_style_from_ref": {"type": "string",
                                              "description": "instance_ref to author's voice/style guide; preserves their conventions"}}}
output_schema: |
  {"type": "object",
   "properties": {"refined_scene_ref": {"type": "string",
                                        "description": "instance_ref to the refined draft (owner-local)"},
                  "changes_summary": {"type": "array",
                                      "items": {"type": "object",
                                                "properties": {"focus_area": "string",
                                                               "change_type": {"type": "string",
                                                                               "enum": ["rewrite", "tighten", "expand", "replace"]},
                                                               "rationale": "string"}}},
                  "word_count_delta": {"type": "integer"},
                  "preservation_score": {"type": "number", "minimum": 0, "maximum": 1,
                                         "description": "How much of the original voice/style was preserved (1.0 = perfect match)"}}}

concept: |
  {"purpose":
   "Refine a drafted fantasy scene against refinement_focus areas while preserving the author's established voice. Transformer-class per node-taxonomy §2.4 — rewrites to different form without adding new substance.",

   "steps": [
     "Load scene draft from scene_draft_ref (owner-local). Draft text is instance-layer.",
     "Load author's voice/style from preserve_style_from_ref (voice profiles, recurring phrases, tone conventions).",
     "For each focus area in refinement_focus: identify concrete issues in the draft",
     "Apply changes: pacing = cut slack / compress beats; dialogue = naturalize speech patterns; specificity = replace abstractions with sensory detail; pov_discipline = remove head-hopping; sensory_grounding = strengthen concrete anchors",
     "Throughout: match voice against preserve_style_from_ref. Compute preservation_score = semantic similarity (voice-preserving embeddings).",
     "Emit refined scene + per-change rationale + word-count delta + preservation score.",
     "Caller decides whether to accept the refinement or request another pass."
   ],

   "technique_notes":
   "Transformer not generator: does NOT add narrative substance. If the draft is missing a beat, this node doesn't invent one — that's the drafter's job. It tightens + clarifies what's there. The `preserve_style_from_ref` + `preservation_score` are load-bearing: without them, LLM refinements tend to homogenize author voice toward a bland standard.",

   "privacy_posture":
   "Scene draft text + author voice profile are instance-layer (owner-local). The CONCEPT (what refinement focus areas mean + how to apply them + how to preserve voice) is public. Other fantasy authors can fork this node and use it on their own drafts without exposing anyone's WIP.",

   "lineage_note":
   "Descended from the Sporemarch universe's scene-drafting pipeline (fantasy-daemon codebase). Generalizes the refinement step so it works across any fantasy universe, not just the host's. The eval-loop pattern wrapping it lives in catalog/branches/fantasy-scene-chapter-loop.yaml.",

   "failure_modes": [
     "Preservation score < 0.7: refinement drifted too far from author voice; caller may reject + redraft with stricter voice anchor",
     "Word-count delta extreme (|Δ| > 40%): transformer went beyond tightening into rewriting; reject + ask user to pick a specific focus_area rather than all-of-above",
     "Focus area applied but scene quality didn't improve: evaluator node (scene-quality-evaluator) will catch; no loop here. Edit-cycle wrapper branch handles that.",
     "Voice profile corrupted / missing: fall back to generic prose rules; emit warning; preservation_score reflects degradation"
   ],

   "distinction_from_drafter":
   "fantasy-scene-drafter (11111111-...-111103) GENERATES new scenes from beats. This node REFINES an existing draft. Different node-type (generator vs transformer), different composition role. A typical chapter loop uses drafter → evaluator → refinement → evaluator → commit."}

instance_ref: "host-local: ~/writing/{universe}/drafts/chapter-{n}/scene-{m}.md + ~/writing/{universe}/voice-profile.yaml"

suggested_followup_nodes:
  - fantasy-scene-drafter  # upstream: initial draft generation
  - scene-quality-evaluator  # downstream: judge refinement acceptance
  - chapter-scene-orchestrator  # top-level: composes drafter + refinement + evaluator

composes_branches:
  - fantasy-scene-chapter-loop  # see catalog/branches/fantasy-scene-chapter-loop.yaml
