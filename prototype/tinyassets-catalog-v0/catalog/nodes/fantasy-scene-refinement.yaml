# Demonstrates the existing Sporemarch domain fits the new schema cleanly.
# Shows (a) edit-cycle pattern at the single-node level (distinct from the
# fantasy-scene-chapter-loop branch which runs multi-scene), (b) concept
# layer = the refinement rules + pacing/dialogue standards generalize
# across fantasy authors, (c) instance_ref = user's actual draft text.

