input_schema: |
  {"type": "object", "required": ["bank_statement_ref", "ledger_rows_ref", "period_start", "period_end"],
   "properties": {"bank_statement_ref": {"type": "string",
                                         "description": "instance_ref to bank statement PDF/CSV on owner's host"},
                  "ledger_rows_ref": {"type": "string",
                                      "description": "instance_ref to exported ledger rows for the same period (CSV/QBO/etc)"},
                  "period_start": {"type": "string", "format": "date"},
                  "period_end": {"type": "string", "format": "date"},
                  "tolerance_cents": {"type": "integer", "default": 1,
                                      "description": "Amount difference under which two rows are considered a match despite not being bit-exact"}}}
output_schema: |
  {"type": "object",
   "properties": {"matched_count": {"type": "integer"},
                  "unmatched_bank": {"type": "array",
                                     "items": {"type": "object",
                                               "properties": {"date": "string",
                                                              "amount_usd": "number",
                                                              "memo": "string",
                                                              "reason_no_match": "string"}}},
                  "unmatched_ledger": {"type": "array", "items": {"type": "object"}},
                  "ending_balance_bank": {"type": "number"},
                  "ending_balance_ledger": {"type": "number"},
                  "difference": {"type": "number",
                                 "description": "bank - ledger; nonzero triggers exception narration"},
                  "exception_queue": {"type": "array",
                                      "description": "Items the node couldn't confidently match; flagged for human review"}}}

concept: |
  {"purpose":
   "Reconcile a bank statement against a ledger export for a given period. Match by date + amount within tolerance; surface unmatched items on both sides as an exception queue rather than silently dropping.",

   "steps": [
     "Parse bank statement rows from bank_statement_ref (PDF OCR or CSV columns auto-detected)",
     "Parse ledger rows from ledger_rows_ref (accounting-system-specific adapter)",
     "For each bank row: find ledger row with same date (+/- 3 days) and amount (+/- tolerance_cents). Match = both marked consumed.",
     "For each remaining bank row: scan for 'split transactions' (one bank row matching sum of N ledger rows). Match if sum + day-window check.",
     "Remaining unmatched on either side → exception_queue with reason_no_match ('no date+amount match', 'stale (possible float)', 'rounding drift > tolerance', 'possible duplicate', 'fee not in ledger').",
     "Return matched_count + both balances + difference + the exception queue."
   ],

   "technique_notes":
   "Day-window matching beats exact-date matching because posting dates often drift 1-3 days from transaction dates (ACH float, weekend processing). 3 days is a common default; tune per bank. Amount tolerance handles rounding drift in ledger exports from some accounting systems.",

   "privacy_posture":
   "Bank statements + ledger rows are high-sensitivity — account numbers, vendor payments, employee reimbursements, personal guarantees can all appear in memos. Instance-private via instance_ref; the CONCEPT (date-window + amount-tolerance + exception-queue pattern) is public + remixable. No statement content leaves the owner's host.",

   "connector_requirements":
   "None strictly required — this is a read-only node. Often chained downstream to an accounting-connector node that posts reconciliation entries.",

   "failure_modes": [
     "Bank statement OCR produces garbled amounts: flagged as 'could not parse' in exception queue with row raw-text preserved for human review.",
     "Ledger export is for a different period: mismatch caught in period_start/end validation; returns error before processing.",
     "High ratio of unmatched (>30% of rows): warning surfaced — suggests the two sources don't actually correspond (wrong accounts, wrong period, exported from wrong subset)."
   ],

   "maya_persona_use_case":
   "Maya's monthly close: bank reconcile is currently a Saturday-morning ritual. This node doesn't fully automate the judgment calls (those are the exception queue) but eliminates the 80% of obvious matches, freeing the Saturday for the 20% that need thought. Matches her 'automation handles the tail, humans handle material items' principle — same spirit as invoice-payables' threshold-based routing."}

