# Bookkeeping composite — second strict-bookkeeping branch (after
# invoice-batch-processor). Per §S-6 launch threshold: ≥3 branches per
# domain × 3 launch domains. Bookkeeping had 1; this + invoice-batch-
# processor = 2 (still need more if threshold strict, but brings parity
# with research+prose domains at ≥2).
#
# Demonstrates: (a) orchestrator pattern across 4+ sub-nodes, (b) human
# gate for exception-queue review (handoff-chain §2.9), (c) real-world
# artifact produced (close package PDF emailed to accountant) — maps
# directly to Maya's passion-project stretch goal.

license: CC0-1.0
schema_version: 1
branch_def_id: 22222222-2222-2222-2222-222222220104
slug: monthly-close-package
name: Monthly Close Package Generator
domain: accounting
primary_language: en
status: published
structural_hash: 4e9a1f72
version: 2
tags:
  - month-end
  - close-package
  - accountant-handoff
  - scenario-a
  - maya-persona
parents: []
primary_pattern: orchestrator
secondary_patterns:
  - handoff_chain
  - chain
usage_count: 217
upvote_count: 28
fork_count: 9
remix_count: 4
success_count: 204
fail_count: 13
last_edited_at: "2026-04-17T16:05:00Z"

input_schema: |
  {"type": "object", "required": ["period_start", "period_end", "accountant_email", "accounting_system"],
   "properties": {"period_start": {"type": "string", "format": "date"},
                  "period_end": {"type": "string", "format": "date"},
                  "accountant_email": {"type": "string", "format": "email"},
                  "accounting_system": {"type": "string",
                                        "enum": ["voyager", "quickbooks", "sage", "xero", "netsuite"]},
                  "bank_account_refs": {"type": "array",
                                        "items": {"type": "string"},
                                        "description": "instance_refs to each bank account statement for the period (can be multiple)"},
                  "skip_if_unresolved_exceptions": {"type": "boolean", "default": true,
                                                    "description": "If reconciliation exceptions remain > N after human review, halt before emailing accountant"},
                  "exception_threshold": {"type": "integer", "default": 5}}}
output_schema: |
  {"type": "object",
   "properties": {"package_pdf_ref": {"type": "string",
                                      "description": "instance_ref to generated close-package PDF"},
                  "email_sent": {"type": "boolean"},
                  "email_id": {"type": "string", "nullable": true},
                  "ap_aging_summary": {"type": "object"},
                  "cashflow_summary": {"type": "object"},
                  "exception_count_resolved": {"type": "integer"},
                  "exception_count_remaining": {"type": "integer"},
                  "halt_reason": {"type": "string", "nullable": true}}}

nodes:
  - id: ingest_ap
    node_ref: {source: standalone, node_id: invoice-payables}
    description: "Pull + post all invoices for the period; produces AP aging data."

  - id: reconcile_each_account
    node_ref: {source: standalone, node_id: bank-reconciliation}
    description: "Run bank-reconciliation for each bank_account_ref. Fan-out over accounts."

  - id: review_exceptions
    node_type: gate
    gate_kind: human_approval
    description: "Surface unmatched items from reconciliation + AP queued-for-review to user; await user disposition (resolve / dispute / carry-forward)."

  - id: ap_aging_report
    node_type: aggregator
    description: "Summarize AP by age buckets (current / 30 / 60 / 90+) + by vendor."

  - id: cashflow_summary
    node_type: aggregator
    description: "Period cashflow: inflows by source, outflows by category, net change."

  - id: generate_package
    node_type: transformer
    description: "Render close-package PDF: AP aging + cashflow + exception summary + reconciliation attestation."

  - id: email_to_accountant
    node_ref: {source: standalone, node_id: email-sender}
    description: "Send the close-package PDF to accountant_email with a period-labeled subject."

edges:
  - {from: START, to: ingest_ap}
  - {from: ingest_ap, to: reconcile_each_account}
  - {from: reconcile_each_account, to: review_exceptions}
  - {from: review_exceptions, to: ap_aging_report, condition: exception_count_remaining <= exception_threshold}
  - {from: review_exceptions, to: END, condition: skip_if_unresolved_exceptions AND exception_count_remaining > exception_threshold, reason: "halt_on_unresolved_exceptions"}
  - {from: ap_aging_report, to: cashflow_summary}
  - {from: cashflow_summary, to: generate_package}
  - {from: generate_package, to: email_to_accountant}
  - {from: email_to_accountant, to: END}

entry_point: ingest_ap

state_schema:
  - {field: period_start, type: string}
  - {field: period_end, type: string}
  - {field: invoice_batch_results, type: object}
  - {field: reconciliation_results_by_account, type: array, reducer: append}
  - {field: exception_queue, type: array, reducer: append}
  - {field: exception_count_resolved, type: integer, reducer: add}
  - {field: exception_count_remaining, type: integer}
  - {field: ap_aging_summary, type: object}
  - {field: cashflow_summary, type: object}
  - {field: package_pdf_ref, type: string}
  - {field: email_sent, type: boolean}
  - {field: email_id, type: string}

concept: |
  {"purpose":
   "End-to-end month-end close: ingest AP for the period → reconcile each bank account → gate on human review of exceptions → aggregate AP aging + cashflow → render close-package PDF → email to the accountant. Halts before emailing if too many exceptions remain unresolved.",

   "why_this_pattern":
   "Orchestrator over four sub-workflows (AP ingest, reconciliation fan-out, review gate, reporting chain). The gate is load-bearing — an auto-emailed close package with unresolved reconciliation exceptions is worse than a delayed package; the accountant bills more, the owners see bad numbers, Maya gets blamed for something she thought was automated. The halt-on-unresolved-exceptions path is the 'fail loud, not silent' guarantee that builds trust.",

   "maya_passion_project_fit":
   "Directly matches Maya Okafor's stated month-end goal: 'I want the first three days of the month to just happen on their own. I open the laptop on the 4th, invoices entered, payment schedule drafted, accountant's close package 80% done, I sanity-check + hit send.' This branch is the 80%. She runs it the 1st, reviews exception queue the 2nd, sends the package the 3rd. Saturday reclaimed.",

   "scale_concerns":
   "Reconciliation fan-out means per-account parallel work; for a small business with 2-3 accounts, fine. For a 20-account enterprise this branch doesn't fit without rewriting reconcile_each_account as a §2.5 fan-out-retriever pattern. Out of scope for Maya-scale.",

   "failure_modes": [
     "Exception threshold too low: legitimate exceptions always trip the halt; user tunes threshold up.",
     "Accountant email OAuth expired: email_to_accountant fails with auth_expired; branch state preserved; user re-auths + resumes.",
     "Bank statement for one account not yet available by close date: reconcile_each_account surfaces 'statement_missing' exception; user either waits or proceeds with a partial close."
   ]}

connector_requirements:
  - gmail               # or sendgrid as alternative
  - accounting_system (voyager / quickbooks / sage / xero / netsuite, per input)
