# Demonstrates host Scenario C3: end-to-end research-paper submission.
# Composition pattern: chain-then-gate-then-router-split (integration-
# patterns.md §2.1 chain + §2.4 router-split + §2.6 saga-adjacent).
# Extends the shorter research-paper-pipeline.yaml by adding the
# submission-gate + arXiv-vs-journal routing that full end-to-end
# submission requires.
#
# Distinct from research-paper-pipeline.yaml which only covers the
# hypothesis-to-citation generation half. This YAML covers draft →
# submission. In practice, a long-horizon research workflow would
# orchestrate BOTH (pipeline first, then submission).

license: CC0-1.0
schema_version: 1
branch_def_id: 22222222-2222-2222-2222-222222222204
slug: research-paper-submission
name: Research Paper Submission (draft → peer review → arXiv → journal)
domain: research-paper
primary_language: en
status: published
structural_hash: 7d6e9a82
version: 1
tags:
  - research
  - submission
  - arxiv
  - journal
  - real-world-handoff
  - scenario-c3
  - primary-pattern-chain
  - secondary-pattern-router-split

entry_point: draft_finalizer
primary_pattern: chain
secondary_patterns:
  - router-split
  - publish-to-external

concept: |
  {"purpose":
   "End-to-end submission pipeline for an academic paper: finalize draft →
    run peer-review-prep (critique + revision) → submit to arXiv preprint
    → gate on arXiv-accepted → route to journal submission.",

   "description":
   "5-node chain with an external-handoff gate. Each external-effect step
    requires per-invocation consent (privacy catalog §7.7); arXiv and journal
    submissions are irreversible in the wild so the chain surfaces explicit
    confirmation before each real-world action.",

   "intended_users":
   "Academic researchers ready to submit a paper. Runs on whichever daemon
    hosts the research-hypothesis-generator + research-paper-peer-review-prep
    capabilities; paid daemons common (specialized LLM work).",

   "privacy_posture":
   "Draft text + author identity are instance-layer (owner-local). The
    pipeline's CONCEPT (the critique methodology + submission routing) is
    public; the specific paper being submitted stays with the author."}

nodes:
  - node_ref:
      source: standalone
      node_id: 11111111-1111-1111-1111-111111111202  # research-paper-peer-review-prep
    phase: peer_review_prep
    input_mapping:
      draft_ref: "state.draft_ref"
      submission_target: "state.primary_target"
      author_identity_ref: "state.author_identity_ref"
      critique_intensity: "state.critique_intensity"
    output_mapping:
      critique_report: "state.critique_report"
      revised_draft_ref: "state.revised_draft_ref"
      submission_package_ref: "state.primary_submission_package_ref"
      submission_status: "state.arxiv_status"
      submission_receipt: "state.arxiv_receipt"

  # Placeholder for additional specialized nodes — see composes_branches
  # at bottom. v0 shows the shape; full node set lands at track-B build.

edges:
  - {from: START, to: draft_finalizer}
  - {from: draft_finalizer, to: research_paper_peer_review_prep}

  # arXiv submission
  - {from: research_paper_peer_review_prep, to: arxiv_submit_gate}
  - {from: arxiv_submit_gate, to: arxiv_connector,
     condition: "user_confirms_arxiv_submit AND arxiv_package.valid"}
  - {from: arxiv_submit_gate, to: revise_and_retry,
     condition: "arxiv_package.valid == false"}
  - {from: revise_and_retry, to: research_paper_peer_review_prep}

  # After arXiv, gate on "accepted" vs "rejected by arXiv moderation"
  - {from: arxiv_connector, to: arxiv_moderation_wait}
  - {from: arxiv_moderation_wait, to: journal_routing,
     condition: "arxiv_status == 'accepted'"}
  - {from: arxiv_moderation_wait, to: END,
     condition: "arxiv_status == 'rejected_by_moderation'"}

  # Journal submission (optional — user may stop at arXiv)
  - {from: journal_routing, to: journal_submission_connector,
     condition: "user_opts_in_to_journal"}
  - {from: journal_routing, to: END,
     condition: "user_opts_in_to_journal == false"}
  - {from: journal_submission_connector, to: END}

state_schema:
  - {field_name: draft_ref, field_type: string, required: true,
     description: "instance_ref to the near-final paper on owner's host"}
  - {field_name: author_identity_ref, field_type: string, required: true}
  - {field_name: primary_target, field_type: object,
     properties: {kind: "arxiv", identifier: "string",
                  submission_window_ends: "string"}}
  - {field_name: critique_intensity, field_type: string, default: "standard"}

  - {field_name: critique_report, field_type: string}
  - {field_name: revised_draft_ref, field_type: string}
  - {field_name: primary_submission_package_ref, field_type: string}
  - {field_name: arxiv_status, field_type: string,
     enum: ["pending_user_confirm", "submitted", "accepted",
            "rejected_by_moderation", "withdrawn"]}
  - {field_name: arxiv_receipt, field_type: object}

  - {field_name: journal_target, field_type: object, default: null,
     description: "Optional — set when user opts in to journal submission after arXiv accepted"}
  - {field_name: journal_status, field_type: string, default: null}
  - {field_name: journal_receipt, field_type: object, default: null}

  - {field_name: user_confirms_arxiv_submit, field_type: bool, default: false,
     description: "MUST be set true via explicit per-invocation confirmation before arxiv_connector fires"}
  - {field_name: user_opts_in_to_journal, field_type: bool, default: false}

failure_modes:
  - "arXiv moderation rejects (typically 1-5% of submissions): branch terminates at END with rejected state; user can revise + resubmit as new run"
  - "Journal submission rejected at format-gate: same behavior; user revises"
  - "Per-invocation consent refused: branch halts at the gate; no external-effect fires"
  - "arXiv submission window missed: hard-fail at arxiv_submit_gate; user reschedules"

suggested_followup_branches:
  - research-paper-pipeline  # upstream: runs draft-generation before this pipeline
  - citation-validation-pipeline  # optional sidecar: validates citations before submission

# Real-world-handoff discipline:
# This branch touches arxiv_connector + journal_submission_connector —
# BOTH are external-effect side-effecters per node-taxonomy §2.8.
# Per privacy catalog §7.7 + integration-connectors-catalog.md §2.3,
# each invocation requires explicit per-call user consent. The
# arxiv_submit_gate + journal_routing nodes exist specifically to
# enforce this — never bypass.
