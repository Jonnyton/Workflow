# Demonstrates host Scenario C4: book-level edit pipeline with fan-out
# parallelism. Composition pattern: fan-out-orchestrate (domain-patterns
# §2.7) + fork-join (integration-patterns §2.2) + saga-adjacent real-
# world-handoff at the end (publisher push).
#
# Distinct from fantasy-scene-chapter-loop.yaml which does single-scene
# iterative refine. This YAML is whole-book scale: fan N parallel
# editor-variants over a draft, pick best-per-chunk, merge into final,
# publish.
#
# Canonical use: author has first-draft novel + wants top-N editor passes
# over the same material + chatbot-mediated merge-best.

license: CC0-1.0
schema_version: 1
branch_def_id: 22222222-2222-2222-2222-222222222205
slug: book-edit-plus-variants
name: Book Edit Pipeline with Editor Variants (fan-out → merge-best → polish → publish)
domain: fantasy-authoring
primary_language: en
status: published
structural_hash: 3c8f2e91
version: 1
tags:
  - fantasy
  - book
  - fan-out
  - variants
  - publish-to-external
  - scenario-c4
  - primary-pattern-fan-out
  - secondary-pattern-saga

entry_point: draft_ingester
primary_pattern: fan-out-orchestrate
secondary_patterns:
  - fork-join
  - iterative-refine
  - publish-to-external

concept: |
  {"purpose":
   "Book-level edit pipeline: ingest a first-draft novel, fan out across
    N editor variants in parallel (each applying a different editorial
    philosophy), merge best-per-chunk into a consolidated edit, polish,
    hand off to publisher.",

   "description":
   "Canonical fan-out-orchestrate pattern. The N editor variants run
    independently against the same input chunks (chapter- or scene-sized).
    An aggregator compares per-chunk editor outputs + picks the strongest
    (scored by a rubric, tiebroken by user preference). Merged result
    runs through a single polish pass, then routes to publisher-handoff.",

   "intended_users":
   "Authors with near-final novel drafts + paid-market budget for multi-
    editor consensus. Each editor variant consumes ~10-30k tokens per
    chunk so N=10 editors × ~40 chapters gets expensive fast — chatbot
    should surface cost estimate at draft_ingester step.",

   "privacy_posture":
   "Draft text + author identity + publisher contract details stay in
    instance_ref. The CONCEPT (multi-editor variant + merge-best pattern)
    is public + remixable; any author can fork this branch + supply
    their own draft."}

nodes:
  - node_ref:
      source: standalone
      node_id: 11111111-1111-1111-1111-111111111203  # fantasy-scene-refinement
    phase: editor_variant
    input_mapping:
      scene_draft_ref: "state.chunk_draft_refs[i]"
      chapter_context: "state.chapter_context"
      refinement_focus: "state.editor_variants[i].focus_areas"
      preserve_style_from_ref: "state.author_voice_ref"
    output_mapping:
      refined_scene_ref: "state.editor_outputs[i][chunk_index]"
      changes_summary: "state.editor_summaries[i][chunk_index]"
      preservation_score: "state.editor_preservation_scores[i][chunk_index]"
    # Runs N times in parallel — one per editor_variants entry + per chunk

edges:
  - {from: START, to: draft_ingester}
  - {from: draft_ingester, to: chunker}  # splits draft into chapter or scene chunks

  # Fan out: for each chunk, run N editor variants in parallel
  - {from: chunker, to: editor_variant_fanout}
  - {from: editor_variant_fanout, to: fantasy_scene_refinement}  # N parallel instances
  - {from: fantasy_scene_refinement, to: merge_best_aggregator}

  # Aggregator compares editor outputs per chunk + picks strongest
  - {from: merge_best_aggregator, to: consolidated_draft_assembler}

  # Single polish pass over the assembled consolidated draft
  - {from: consolidated_draft_assembler, to: polish_transformer}

  # Publisher handoff (real-world-effect — explicit consent gate)
  - {from: polish_transformer, to: publisher_handoff_gate}
  - {from: publisher_handoff_gate, to: publisher_connector,
     condition: "user_confirms_publisher_handoff"}
  - {from: publisher_handoff_gate, to: END,
     condition: "user_confirms_publisher_handoff == false"}
  - {from: publisher_connector, to: END}

state_schema:
  - {field_name: draft_ref, field_type: string, required: true,
     description: "instance_ref to the first-draft novel on owner's host"}
  - {field_name: author_voice_ref, field_type: string, required: true}
  - {field_name: editor_variants, field_type: array, required: true,
     description: "N editor configs — each with focus_areas + style_bias + rubric_weights",
     default: []}

  - {field_name: chunk_draft_refs, field_type: array,
     description: "Set by chunker — one entry per chapter/scene",
     reducer: "append"}
  - {field_name: chapter_context, field_type: string}

  - {field_name: editor_outputs, field_type: object,
     description: "Indexed by [editor_index][chunk_index] — parallel writes",
     reducer: "deep-merge"}
  - {field_name: editor_summaries, field_type: object, reducer: "deep-merge"}
  - {field_name: editor_preservation_scores, field_type: object, reducer: "deep-merge"}

  - {field_name: best_per_chunk, field_type: array,
     description: "Set by merge_best_aggregator — indexed by chunk"}
  - {field_name: consolidated_draft_ref, field_type: string}
  - {field_name: polished_draft_ref, field_type: string}

  - {field_name: publisher_target, field_type: object,
     properties: {kind: "string", identifier: "string"}}
  - {field_name: user_confirms_publisher_handoff, field_type: bool, default: false,
     description: "MUST be set true via explicit per-invocation confirmation"}
  - {field_name: publisher_status, field_type: string}
  - {field_name: publisher_receipt, field_type: object}

failure_modes:
  - "Editor-variant fails on a chunk (LLM timeout / content-policy refusal): aggregator receives partial outputs; falls back to highest-score available editor + flags chunk for author review"
  - "Preservation-score drops below threshold on >30% of chunks: aggregator halts + surfaces to author — suggests different editor_variants configuration"
  - "Cost overrun (estimated at draft_ingester, tracked per chunk): branch halts when budget exceeded; user approves continuation"
  - "Publisher handoff consent refused: branch halts at gate; no external-effect; polished draft remains in instance_ref for later"

scale_primitives:
  # Per fan-out-orchestrate pattern + integration-patterns §2.2 fork-join,
  # parallelism is load-bearing here:
  - "Editor variants run in parallel across chunks (N editors × M chunks = N×M daemon tasks)"
  - "Aggregator's per-chunk best-picking is O(N) per chunk — cheap even at N=20"
  - "State schema uses reducer='append' + deep-merge to safely accumulate parallel outputs"

suggested_followup_branches:
  - fantasy-scene-chapter-loop  # per-scene iterative refinement (different pattern, same domain)
  - citation-validation-pipeline  # sidecar: checks factual references if book has non-fiction passages

# Why this branch is the canonical fan-out example:
# (a) Real use — multi-editor consensus on a novel is a pattern authors
#     actually want + hard to do manually.
# (b) Demonstrates fan-out-orchestrate cleanly — no nested loops.
# (c) Touches all 4 taxonomy axes: multiple node-types (extractor +
#     transformer + aggregator + side-effecter), fan-out-orchestrate
#     domain-pattern, fork-join composition pattern, publisher-connector
#     integration pattern.
# (d) Privacy-posture is realistic — author content stays instance-
#     layer, the pattern is public.
