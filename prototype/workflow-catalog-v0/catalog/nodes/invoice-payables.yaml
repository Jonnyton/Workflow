input_schema: |
  {"type": "object", "required": ["invoice_batch_ref", "accounting_system"],
   "properties": {"invoice_batch_ref": {"type": "string",
                                        "description": "instance_ref to a folder of invoice PDFs on the owner's host"},
                  "accounting_system": {"type": "string",
                                        "enum": ["voyager", "quickbooks", "sage", "xero", "netsuite"]},
                  "company_chart_ref": {"type": "string",
                                        "description": "instance_ref to company-specific charge-code mapping (vendor → GL account)"},
                  "auto_post_threshold_usd": {"type": "number", "default": 500,
                                              "description": "Above this amount, route to human review; below, auto-post"}}}
output_schema: |
  {"type": "object",
   "properties": {"processed": {"type": "array",
                                "items": {"type": "object",
                                          "properties": {"invoice_number": "string",
                                                         "vendor": "string",
                                                         "amount_usd": "number",
                                                         "gl_account": "string",
                                                         "disposition": {"type": "string",
                                                                         "enum": ["posted", "queued_for_review", "rejected"]},
                                                         "accounting_system_id": "string"}}},
                  "csv_export_ref": {"type": "string",
                                     "description": "instance_ref to generated CSV on owner's host"},
                  "posted_count": {"type": "integer"},
                  "review_count": {"type": "integer"},
                  "reject_count": {"type": "integer"}}}

concept: |
  {"purpose":
   "End-to-end A/P ingestion: OCR a batch of invoice PDFs, extract structured fields, match against company charge codes, route by amount threshold, push to accounting system.",

   "steps": [
     "Load invoice PDFs from invoice_batch_ref (owner-local folder; instance-layer)",
     "For each PDF: OCR + extract {invoice_number, vendor, amount_usd, date} via invoice-ocr child node",
     "Lookup vendor in company_chart_ref to resolve GL account (instance-layer; company-specific)",
     "Branch by auto_post_threshold_usd: below → auto-post via accounting connector; above → queued_for_review",
     "Generate individually-named PDFs (vendor + invoice# + date) for archival",
     "Emit CSV summary for audit trail",
     "Push posted rows to accounting_system via the matching connector"
   ],

   "technique_notes":
   "Threshold-based routing is the key durable pattern — humans review material amounts, automation handles the tail. 500 USD is a common starting point; tune per company. The CSV + individually-named PDFs serve both human audit + downstream automation (many accounting systems can re-import the CSV if the connector fails mid-batch).",

   "privacy_posture":
   "CRITICAL: actual invoice PDFs + company charge codes + vendor account numbers stay in instance_ref (owner-local). The CONCEPT (OCR → match → threshold → connector-push pattern) is public + remixable. Any AP team can fork this node, swap their own charge_ref + accounting_system, and run their own version without exposing their vendor list.",

   "connector_requirements":
   "Downstream accounting connector must be registered + OAuth'd separately. Each supported system (Voyager, QuickBooks, Sage, Xero, NetSuite) has its own connector node with its own posting RPC. This orchestrator calls whichever connector the accounting_system param specifies.",

   "failure_modes": [
     "OCR fails on poor-quality scan: disposition=rejected + reason logged; original PDF preserved for human review",
     "Vendor not in company_chart_ref: disposition=queued_for_review (can't auto-assign GL account)",
     "Connector outage: batch queued locally + retried on next run (idempotent via invoice_number dedup)",
     "Partial batch failure: does NOT rollback successful postings; caller sees per-invoice disposition"
   ]}

instance_ref: "host-local: C:\\Users\\[REDACTED]\\AP-Inbox\\{date}\\*.pdf + C:\\Users\\[REDACTED]\\company-gl-mapping.yaml"

