# Demonstrates host scenario A: end-to-end A/P ingestion workflow.
# Shows (a) two-way connector integration (reads invoice files from
# owner's host, pushes structured rows to Voyager-style accounting
# system), (b) private-instance guarantee (file paths + charge codes
# stay owner-local via instance_ref), (c) concept-public remixability
# (the capture+match+push pattern is generic; any AP team can remix).

