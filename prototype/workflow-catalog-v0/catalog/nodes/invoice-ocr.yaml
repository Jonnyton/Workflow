  {"purpose":
   "Extract the invoice number from OCR'd invoice text.",
   "steps": [
     "Find first regex match among candidates: /Invoice\\s*#?\\s*([A-Z0-9-]+)/i, /INV[-_]?\\d{4,}/, /Bill\\s+#\\s*(\\w+)/i",
