   "failure_modes": [
     "Beat-hitting at the cost of prose quality: over-literal scene_beats produce mechanical feel",
     "POV slippage: if multiple characters' thoughts bleed in, reject + redraft",
     "Word-count padding: producing bloat to hit a number is worse than delivering tight but short"
   ],
