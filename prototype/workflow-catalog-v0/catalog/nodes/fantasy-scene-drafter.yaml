concept: |
  {"purpose":
   "Draft a single fantasy scene with specified beats + POV + tone.",
   "steps": [
     "Load the POV character's voice + interiority patterns from universe canon",
     "Map each scene_beat to one paragraph/passage; order per input",
     "Draft prose hitting beats in order, in POV voice, at target tone",
     "Pass-2: tighten prose, strengthen specificity, cut exposition dumps",
     "Self-critique: what worked, what's weak, what beats under-delivered"
   ],
   "technique_notes":
