concept: |
  {"purpose":
   "Semantic search over a document corpus. Return top-K matches ranked by cosine similarity of embedding vectors.",
   "steps": [
     "Compute query embedding using the corpus's embedding model (cached at corpus-registration time)",
     "HNSW index query for approximate top_k * 2 candidates (overshoot to allow filter drop)",
     "Apply metadata filters if provided (date range, author, tags)",
     "Re-rank top_k final results by cosine similarity (exact, not approximate) to refine tie-breaks",
     "Return doc_id + title + excerpt (first ~200 chars) + score + full metadata"
   ],
   "technique_notes":
   "Hybrid = vector (semantic) + metadata (rule-based). Precision@10 is ~0.8-0.95 for well-formed corpora; drops on noisy documents or queries that are too abstract. The rerank step cheaply improves precision without doubling cost.",
   "failure_modes": [
     "Corpus not embedded: caller must pre-embed via a separate node before invoking this one",
     "Query embedding fails: LLM-down or rate-limited; return empty candidates + error metadata",
     "Filters too restrictive: fewer than top_k results returned (correct behavior, not an error)"
   ],
   "privacy_note":
   "When corpus_ref points at a private instance_ref, only the owning caller can invoke; RLS enforces owner-only corpus access. Public corpora are openly queryable."}
