concept: |
  {"purpose":
   "Synthesize N input sources into a single coherent output aligned to a stated synthesis_goal.",
   "steps": [
     "Read all sources; extract key claims + supporting evidence per source",
     "Identify overlaps (consensus) + conflicts (disagreements)",
     "Draft synthesis per synthesis_goal: consensus-focused or disagreement-mapping or timeline",
     "Cite each claim back to source_index (enables downstream validation)",
     "Surface unresolved disagreements explicitly — don't paper over them",
     "Confidence = function(source_count, source_agreement, LLM self-assessment)"
   ],
   "technique_notes":
   "Heaviest of the canonical aggregator patterns — LLM context must hold all N sources + produce synthesis. For >10 sources, switch to a two-level pattern: cluster sources first, synthesize per cluster, then synthesize across clusters. Hard to do well — expect 0.7-0.85 user-acceptance rate; pair with an evaluator node for quality-gate.",
   "failure_modes": [
     "Source contradictions not surfaced: synthesis reads coherent but hides disagreements; evaluator should catch + flag",
     "Hallucinated citations: citation to source_index that doesn't support the claim; mitigated by downstream citation-validator node",
     "Context overflow on >20 sources: fail fast, caller must chunk or cluster first",
     "Synthesis_goal ambiguity: results drift; prefer specific goals over 'summarize'"
   ],
   "suggested_followup_nodes":
   "citation-validator (downstream), disagreement-mapper (sibling), fact-check-judge (evaluator)"}
