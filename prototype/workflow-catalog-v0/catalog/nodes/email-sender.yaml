   "failure_modes": [
     "Provider rate-limited: treat as retriable; exponential backoff",
     "Invalid recipient: hard-fail; return delivery_status=rejected",
     "Consent refused / timeout: hard-fail; no email sent; caller's synthesis_goal may need replanning",
     "Attachment instance_ref inaccessible: hard-fail rather than send partial; email without attachments is a different email"
