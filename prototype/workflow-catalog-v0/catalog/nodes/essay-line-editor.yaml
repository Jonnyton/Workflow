input_schema: |
  {"type": "object", "required": ["draft_text", "voice_sample"],
   "properties": {"draft_text": {"type": "string",
                                 "description": "The essay draft to line-edit. Expected 500-3000 words."},
                  "voice_sample": {"type": "string",
                                   "description": "2-3 paragraphs of the author's prior published work; calibrates the edit to preserve voice."},
                  "register": {"type": "string",
                               "enum": ["academic", "journalistic", "conversational", "literary", "technical"],
                               "default": "journalistic"},
                  "edit_passes": {"type": "array",
                                  "items": {"type": "string",
                                            "enum": ["sentence-flow", "word-choice", "clarity", "concision", "hedging-reduction"]},
                                  "default": ["sentence-flow", "clarity", "concision"],
                                  "description": "Which dimensions to edit; omit 'hedging-reduction' for academic register where hedges are appropriate."}}}
output_schema: |
  {"type": "object",
   "properties": {"edited_text": {"type": "string",
                                  "description": "The revised draft."},
                  "diff_notes": {"type": "array",
                                 "items": {"type": "object",
                                           "properties": {"original": "string",
                                                          "revised": "string",
                                                          "rationale": "string",
                                                          "pass": "string"}},
                                 "description": "Per-change diff with rationale so author can approve/reject; not silent rewrites."},
                  "word_count_before": "integer",
                  "word_count_after": "integer",
                  "voice_drift_score": {"type": "number",
                                        "description": "0-1; 0 = voice fully preserved, 1 = heavy rewrite. Flag if > 0.4."}}}

concept: |
  {"purpose":
   "Line-edit a short-form non-fiction draft — essay, op-ed, long-form blog post, academic prose — while preserving the author's voice. Returns revised text PLUS a per-change diff with rationale, so the author approves each edit rather than getting a silent rewrite.",

   "steps": [
     "Prime the model with voice_sample to extract voice fingerprint: sentence rhythm, lexical preferences, formality baseline, idiom tolerance.",
     "Run the requested edit_passes in order. sentence-flow = reorder/combine/split for rhythm. word-choice = more precise verb/noun, remove throat-clearing adverbs. clarity = disentangle nested clauses. concision = remove redundancy. hedging-reduction = tighten 'perhaps', 'might', 'could possibly' where the claim is actually strong.",
     "For each suggested change, emit a diff_notes row with original/revised/rationale/pass so the author sees WHY.",
     "Compute voice_drift_score by comparing revised-text voice fingerprint vs the voice_sample fingerprint. High drift = warning; author reviews heavier edits first.",
     "Return edited_text for quick-accept + diff_notes for piece-by-piece review."
   ],

   "technique_notes":
   "Voice preservation is the distinguishing value prop vs generic grammar-check. Generic tools (Grammarly, Pro Writing Aid) flatten voice toward a normed style. This node does the opposite: it uses the author's OWN prior work as the voice reference. The diff_notes surface is equally load-bearing — line editors who silently rewrite get fired; line editors who explain their changes get hired back.",

   "privacy_posture":
   "Drafts and voice samples may be pre-publication sensitive (op-ed embargoed until publish date, dissertation chapter, client-confidential white paper). Keep draft_text + voice_sample in instance_ref if the author flags the work pre-publication. The concept (voice-preserving line edit) is fully public.",

   "connector_requirements":
   "None. Pure LLM transform. Optional downstream: push edited_text back to Google Docs / Notion / GitHub PR where the draft lives.",

   "failure_modes": [
     "Voice sample too short (<500 words): warning — voice fingerprint unreliable; edits will tend toward generic.",
     "Voice sample drift from draft: if sample is from 5 years ago and draft is current, author's voice may have naturally changed; voice_drift_score high even on light edits. Author reviews with that context.",
     "Register mismatch: if the draft is academic but register='conversational' was set, the edit will fight the source text. Node warns + suggests register correction."
   ],

   "author_persona_example":
   "Emma, freelance op-ed writer: drafts her Atlantic piece at 2,400 words in 2 hours, runs the line-editor, sees 37 diff notes. Accepts 31, rejects 6 (too aggressive on her signature em-dash usage). Final piece is 2,100 words + publishable in 20 minutes of review instead of a 2-hour self-edit pass."}

