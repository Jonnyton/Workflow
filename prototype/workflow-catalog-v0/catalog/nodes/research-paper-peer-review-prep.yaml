input_schema: |
  {"type": "object", "required": ["draft_ref", "submission_target"],
   "properties": {"draft_ref": {"type": "string",
                                "description": "instance_ref to the draft paper (PDF or LaTeX source) on the owner's host"},
                  "submission_target": {"type": "object",
                                        "properties": {"kind": {"type": "string",
                                                                "enum": ["arxiv", "journal", "workshop", "preprint-server"]},
                                                       "identifier": {"type": "string",
                                                                      "description": "arXiv subject class, journal slug, or workshop CFP ID"},
                                                       "submission_window_ends": {"type": "string", "format": "date-time"}}},
                  "author_identity_ref": {"type": "string",
                                          "description": "instance_ref to ORCID + affiliations + co-author list"},
                  "critique_intensity": {"type": "string",
                                         "enum": ["light", "standard", "adversarial"], "default": "standard"}}}
output_schema: |
  {"type": "object",
   "properties": {"critique_report": {"type": "string",
                                      "description": "Human-readable critique covering methodology, novelty, exposition, reproducibility"},
                  "revised_draft_ref": {"type": "string",
                                        "description": "instance_ref to the revised paper (owner-local)"},
                  "submission_package_ref": {"type": "string",
                                             "description": "instance_ref to the submission package (target-specific format)"},
                  "submission_status": {"type": "string",
                                        "enum": ["draft_ready", "submitted", "rejected_at_gate", "awaiting_user_approval"]},
                  "submission_receipt": {"type": "object",
                                         "description": "Target-specific confirmation (arxiv_id, journal_ms_id, etc.)"},
                  "confidence_to_submit": {"type": "number", "minimum": 0, "maximum": 1}}}

concept: |
  {"purpose":
   "Prepare a research paper for peer-review submission: generate a critique, apply revisions, package for the target venue, and optionally execute the submission.",

   "steps": [
     "Load draft from draft_ref (owner-local). NOTE: draft text is instance-layer; never exported to catalog.",
     "Run critique pass per critique_intensity: light = surface issues, standard = methodology + exposition + novelty, adversarial = simulate a hostile reviewer",
     "Generate revision_suggestions grouped by (blocking, major, minor); chatbot applies or surfaces per user preference",
     "Repackage for submission_target: arxiv wants .tex + figures + bib; journal has per-journal template; workshop has CFP-specific form",
     "Before submission: chatbot surfaces 'about-to-submit' confirmation. NEVER auto-submit to external-effect targets without explicit consent.",
     "On confirmation: call submission connector (arxiv, journal_submission, etc.); capture receipt.",
     "Return revised draft + submission package + receipt."
   ],

   "technique_notes":
   "The 'about-to-submit' confirmation gate is non-negotiable. arXiv submissions can be withdrawn but not silently — leaves a public trail. Journal submissions tie up a manuscript ID for months. Workshop submissions may be terminal. Treat every invocation as a real-world-effect event per node-taxonomy §2.8 + §3.1 effect_class='external-effect'.",

   "critique_intensity_tradeoffs":
   "Light catches only obvious issues; papers with deeper problems pass through. Adversarial surfaces issues the user may not agree with; produces noise. Standard is the default for most contexts; adversarial warranted for high-stakes submissions.",

   "privacy_posture":
   "Draft content + author identity + affiliations stay in instance_ref (owner-local). CONCEPT (critique methodology + revision protocol + submission-target routing) is public. This is the pattern thousands of researchers could benefit from; the user's specific paper is theirs.",

   "connector_requirements":
   "Separate connector node per submission target: arxiv-connector, journal-submission-connector (per-journal adapters), workshop-cfp-connector. Each maintains its own OAuth + submission API. This node dispatches by submission_target.kind to the right connector.",

   "failure_modes": [
     "Draft fails format validation at target: submission_status=rejected_at_gate; returns actionable errors (missing abstract, wrong template, etc.)",
     "Submission window already closed: hard-fail; don't waste the connector call",
     "Submission connector rate-limited (arxiv has ~daily submit limits for new authors): queue + retry tomorrow",
     "Partial submission: target accepted metadata but rejected PDF; returns submitted_partial + error; user resolves"
   ]}

instance_ref: "host-local: ~/papers/drafts/{project}/main.tex + ~/papers/orcid-profile.json"

suggested_followup_nodes:
