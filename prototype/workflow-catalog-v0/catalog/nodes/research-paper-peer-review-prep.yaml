# Demonstrates host scenario C3: real-world-handoff pipeline.
# Shows (a) multi-step chaining (critique → revision → submission prep
# → handoff), (b) external-effect class (submission is one-way; can't
# un-submit to arXiv), (c) journal-specific routing (single node
# handles arXiv + journal targets via the connector registry).

