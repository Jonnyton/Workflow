concept: |
  {"purpose":
   "Top-level orchestrator for drafting an entire fantasy chapter. Composes the scene-chapter-loop branch (§2.3 eval-loop pattern) scene-by-scene until the chapter is complete or halts. Example of node-taxonomy §2.10 orchestrator at the node level.",
   "steps": [
     "Parse chapter_outline; break narrative_arc into ordered scene_beats per scene",
     "For each scene: invoke the fantasy-scene-chapter-loop branch (fantasy-scene-drafter + scene-quality-evaluator + bounded-retry)",
     "Track evaluator verdicts; if 3 consecutive reverts → halt with halt_reason='RC-3 gate triggered' (per real fantasy-daemon RC-3 in the prior codebase)",
     "After each scene accepted: refresh chapter_word_count; advance to next scene",
     "On chapter complete: return all scenes + total word count; no halt_reason",
     "Never silently pad word count to hit target — if beats deliver short, ship short"
   ],
   "technique_notes":
   "Real-world orchestrator modeled on the fantasy-daemon's chapter-loop implementation. Demonstrates hierarchical composition per integration-pattern catalog §2.8 orchestrator. The RC-3 halt is load-bearing — without a bounded-retry + outer-halt, an eval-loop can run forever on a chapter the universe canon can't support.",
   "failure_modes": [
     "RC-3 gate trips: chapter halts; caller must consolidate (review what went wrong at the universe-state level before retrying)",
     "Universe canon conflicts between scenes: caught by scene-quality-evaluator POV-consistency scoring, but not perfectly",
     "Target word count overshoot/undershoot: log but don't retry; downstream editor/user can trim or expand"
   ],
   "composes_branches":
   "fantasy-scene-chapter-loop (see catalog/branches/fantasy-scene-chapter-loop.yaml)",
   "suggested_followup_nodes":
   "chapter-consolidator (on RC-3 halt), book-orchestrator (upstream, one level up the hierarchy)"}
