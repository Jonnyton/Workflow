name: Ingest merged catalog changes to Postgres

# Fires on merge-to-main. Reads the diff, calls the control-plane
# ingest_catalog_merge RPC. If RPC returns race_conflict, the
# revert-bot opens a counter-PR.

on:
  push:
    branches:
      - main
    paths:
      - 'catalog/**'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD + HEAD~1 for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml requests

      - name: Compute diff + call ingest RPC
        env:
          INGEST_URL: ${{ secrets.INGEST_RPC_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_RPC_TOKEN }}
          PR_AUTHOR: ${{ github.event.head_commit.author.username }}
          PR_SHA: ${{ github.sha }}
        run: python scripts/ingest-merged-changes.py

      - name: On conflict — open revert counter-PR
        if: failure()
        run: |
          # TODO: v1 — trigger revert-bot to open a counter-PR with rebase instructions
          echo "Ingest failed; revert-bot pipeline would run here"
