name: Validate catalog PR

# Runs on every PR push. Applies the 6-check validation from spec #32 §3.2.
# Labels the PR 'ready' on full pass; 'blocked' on any failure.

on:
  pull_request:
    paths:
      - 'catalog/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need base for structural-hash compare

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml jsonschema

      - name: Check 1 — YAML schema valid
        run: python scripts/validate-catalog-yaml.py

      - name: Check 2 — license is CC0-1.0
        run: python scripts/check-license.py

      - name: Check 3 — no private-instance fields
        run: python scripts/check-private-fields.py

      - name: Check 4 — structural hash matches base version
        run: python scripts/check-structural-hash.py

      - name: Check 5 — author identity linkable
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # v0: log the author; real build verifies against users.github_handle
          echo "PR author: $PR_AUTHOR"
          # TODO: POST to api.tinyassets.io/mcp/verify_contributor_identity

      - name: Check 6 — version = base + 1
        run: python scripts/check-version-bump.py

      - name: Label PR ready
        if: success()
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "ready"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label PR blocked
        if: failure()
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "blocked"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
