openapi: 3.1.0
info:
  title: Fantasy Author
  version: 0.3.0
  description: >
    Fantasy Author is a host-run shared universe server. The GPT is a
    control station that routes user intent to the server via these Actions.
    The GPT NEVER writes prose or story content itself.


    ROUTING: Writing direction and prose feedback (tone, style, pacing,
    revision requests, scene requests) go to addNote with category
    'direction'. Scene requests should use addNote by default. In multiplayer
    mode, prefer createRequest over addNote when the user is a regular
    collaborator, not the host.


    NEW UNIVERSE: Read user energy. Quick handoff: just go. Collaborative:
    engage first. Steps: createUniverse, setPremise if clear direction exists.
    Canon file upload and daemon control are currently host-side operations
    performed outside this interface.


    READING: Call getOverview for status + progress + files + activity in one
    call. For world state queries use getFacts, getCharacters, getPromises.
    Synthesize what is interesting.


    MULTIPLAYER DEFAULTS: Prefer collaborative actions first. Use listAuthors,
    listBranches, listRequests, createRequest, and getLedger for shared work.
    Reserve createUniverse, setPremise, and addNote for clear host/admin
    intent.


    WORK TARGETS: The writer chooses what to work on next via work targets.
    Call getWorkTargets to see what the writer is considering. Call
    getReviewState to see which review gate it's in and what blockers remain.


    CANCELLATIONS: To cancel a direction, call deleteNote with the note ID.
    To correct a fact, addNote with category 'direction' noting the
    correction.

servers:
  - url: https://leather-drum-coverage-conference.trycloudflare.com
    description: Local tunnel (update if URL changes)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        API key in format fa_{username}_sk_{random}.
        Pass as Bearer token in Authorization header.

  schemas:
    PremiseBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          description: Story premise text

    NoteBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          description: Writing direction or feedback text
        category:
          type: string
          enum: [protect, concern, direction, observation, error]
          default: direction
          description: >
            'direction' for tone/style/pacing/scene requests.
            'protect' for what's working. 'concern' for issues.
            'observation' for general notes. 'error' for mistakes.
        target:
          type: string
          nullable: true
          description: File path or scene reference (optional)
        clearly_wrong:
          type: boolean
          default: false
          description: For concerns — is this a provable error?
        quoted_passage:
          type: string
          default: ""
          description: Evidence quoted from prose
        tags:
          type: array
          items:
            type: string
          default: []
          description: Flexible note tags
        metadata:
          type: object
          additionalProperties: true
          default: {}
          description: Optional structured metadata

    Note:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
          description: Who created (user, editor, structural, system)
        text:
          type: string
        category:
          type: string
          enum: [protect, concern, direction, observation, error]
        status:
          type: string
          enum: [unread, read, acted_on, dismissed]
        clearly_wrong:
          type: boolean
        quoted_passage:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        timestamp:
          type: number

    CreateUniverseBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
          description: Display name (auto-generated if omitted)

    BranchCreateBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable branch name
        parent_branch_id:
          type: string
          nullable: true
          description: Optional parent branch to fork from
        is_public:
          type: boolean
          default: true

    RequestCreateBody:
      type: object
      required: [request_type, text]
      properties:
        request_type:
          type: string
          minLength: 1
          description: >
            Short class: scene_direction, canon_change,
            author_preference, branch_proposal
        text:
          type: string
          minLength: 1
          description: Full user request text
        branch_id:
          type: string
          nullable: true
          description: Optional branch to associate with
        preferred_author_id:
          type: string
          nullable: true
          description: Optional preferred Author

    NoteUpdateBody:
      type: object
      properties:
        status:
          type: string
          enum: [unread, read, acted_on, dismissed]
          description: New note status

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        universes:
          type: integer
        daemon:
          type: string
        active_universe:
          type: string
        providers:
          type: object
          additionalProperties:
            type: object
        unhealthy_roles:
          type: array
          items:
            type: string

    UniverseInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
        has_premise:
          type: boolean
        word_count:
          type: integer
        daemon_state:
          type: string

    OutputFile:
      type: object
      properties:
        path:
          type: string
          description: Path relative to output/
        size:
          type: integer

security:
  - BearerAuth: []

paths:
  /v1/health:
    get:
      operationId: getHealth
      summary: Health check
      description: >
        Returns API status, universe count, daemon state,
        and provider health. Call on every failure.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/me:
    get:
      operationId: getMe
      summary: Current session identity
      description: >
        Returns your user identity and capabilities. Call
        before assuming host/admin powers.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  username:
                    type: string
                  display_name:
                    type: string
                  is_host:
                    type: boolean
                  capabilities:
                    type: array
                    items:
                      type: string

  /v1/authors:
    get:
      operationId: listAuthors
      summary: List public Authors
      description: >
        Returns the Author registry with identities,
        soul-file hashes, and lineage metadata.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      type: object

  /v1/authors/{author_id}:
    get:
      operationId: getAuthor
      summary: Inspect one Author
      description: >
        Returns one Author's definition and lineage.
        Use when the user asks who an Author is.
      parameters:
        - name: author_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  author_id:
                    type: string
                  display_name:
                    type: string
                  soul_file_hash:
                    type: string
                  lineage:
                    type: object
                    additionalProperties: true
        "404":
          description: Author not found

  /v1/universes:
    get:
      operationId: listUniverses
      summary: List universes
      description: >
        Returns all universes with metadata, word count,
        and premise status.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  universes:
                    type: array
                    items:
                      $ref: "#/components/schemas/UniverseInfo"

    post:
      operationId: createUniverse
      x-openai-isConsequential: false
      summary: Create a new universe
      description: >
        Host/admin action. Creates a new universe. Then
        set premise and start working.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUniverseBody"
      responses:
        "201":
          description: Universe created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
        "409":
          description: Universe already exists

  /v1/universes/{uid}:
    delete:
      operationId: deleteUniverse
      x-openai-isConsequential: true
      summary: Delete a universe permanently
      description: >
        Permanently deletes a universe and all data.
        Cannot be undone.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Universe deleted
        "404":
          description: Universe not found

  /v1/universes/{uid}/premise:
    get:
      operationId: getPremise
      summary: Read story premise
      description: Reads the story premise from PROGRAM.md.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string

    post:
      operationId: setPremise
      x-openai-isConsequential: false
      summary: Set story premise
      description: >
        Write or overwrite the story premise. Host/admin
        action in multiplayer.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PremiseBody"
      responses:
        "200":
          description: OK

  /v1/universes/{uid}/notes:
    get:
      operationId: getNotes
      summary: List notes
      description: >
        Notes include user directions, editorial feedback,
        and system signals. Filter by source or category.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
            enum: [user, editor, structural, system]
          description: Filter by note source
        - name: category
          in: query
          schema:
            type: string
            enum: [protect, concern, direction, observation, error]
          description: Filter by note category
        - name: status
          in: query
          schema:
            type: string
            enum: [unread, read, acted_on, dismissed]
          description: Filter by note status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Note"

    post:
      operationId: addNote
      x-openai-isConsequential: false
      summary: Add a note
      description: >
        Direct writer-facing note. In multiplayer prefer
        createRequest first. Notes are the feedback path.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteBody"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  note:
                    $ref: "#/components/schemas/Note"

  /v1/universes/{uid}/notes/{note_id}:
    patch:
      operationId: updateNote
      x-openai-isConsequential: false
      summary: Update note status
      description: Mark a note as read, acted_on, or dismissed.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
        - name: note_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdateBody"
      responses:
        "200":
          description: OK
        "404":
          description: Note not found

    delete:
      operationId: deleteNote
      x-openai-isConsequential: false
      summary: Delete a note
      description: Cancel a direction by deleting its note.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
        - name: note_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Note not found

  /v1/universes/{uid}/overview:
    get:
      operationId: getOverview
      summary: Complete story overview
      description: >
        Returns status, progress, output files, activity,
        and readiness in one call. Start here.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                  progress:
                    type: string
                  output_files:
                    type: array
                    items:
                      $ref: "#/components/schemas/OutputFile"
                  recent_activity:
                    type: array
                    items:
                      type: string
                  readiness:
                    type: object

  /v1/universes/{uid}/work-targets:
    get:
      operationId: getWorkTargets
      summary: List work targets
      description: >
        What the writer may work on next. Each target has
        role, lifecycle, publish stage, and current intent.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  targets:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer

  /v1/universes/{uid}/review-state:
    get:
      operationId: getReviewState
      summary: Current review gate
      description: >
        Shows review stage (foundation or authorial),
        selected target, hard blockers, and latest artifact.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  review_stage:
                    type: string
                  selected_target_id:
                    type: string
                    nullable: true
                  hard_priorities:
                    type: array
                    items:
                      type: object

  /v1/universes/{uid}/branches:
    get:
      operationId: listBranches
      summary: List branches
      description: >
        Returns branches for a universe. Use when the user
        wants to inspect parallel paths.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  branch_mode:
                    type: string
                  branches:
                    type: array
                    items:
                      type: object

    post:
      operationId: createBranch
      x-openai-isConsequential: false
      summary: Create a branch
      description: >
        Fork a divergent idea. Prefer this over overwriting
        shared state for experiments.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchCreateBody"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  branch_id:
                    type: string
                  name:
                    type: string
                  created_at:
                    type: string

  /v1/universes/{uid}/requests:
    get:
      operationId: listRequests
      summary: List collaboration requests
      description: >
        Returns existing requests for the universe. Check
        before submitting a duplicate.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      type: object

    post:
      operationId: createRequest
      x-openai-isConsequential: false
      summary: Submit a collaboration request
      description: >
        Default multiplayer write path. Use for scene wishes,
        revisions, canon changes, and Author preferences.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCreateBody"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  request_type:
                    type: string
                  status:
                    type: string
                  created_at:
                    type: string

  /v1/universes/{uid}/ledger:
    get:
      operationId: getLedger
      summary: Public action ledger
      description: >
        Action history for the universe. Use when the user
        asks who changed what or what happened.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
          description: Max actions to return (default 100)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      type: object

  /v1/universes/{uid}/facts:
    get:
      operationId: getFacts
      summary: Query extracted facts
      description: >
        Facts extracted from prose with source_type,
        confidence, and originating scene. Filter by chapter.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
        - name: chapter
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by chapter number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  facts:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer

  /v1/universes/{uid}/characters:
    get:
      operationId: getCharacters
      summary: List tracked characters
      description: >
        Characters with location, emotional state, knowledge
        facts, and last scene. Use for catching up.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  characters:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer

  /v1/universes/{uid}/promises:
    get:
      operationId: getPromises
      summary: Query narrative promises
      description: >
        Foreshadowing, setups, unresolved threads. Filter by
        status to find open or fulfilled promises.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, fulfilled, abandoned]
          description: Filter by promise status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  promises:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
