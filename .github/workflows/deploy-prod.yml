name: Deploy prod

# Self-host migration Row M per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Fires after build-image.yml succeeds on main. SSH into the DigitalOcean
# Droplet, pull the freshly-published image tag, `docker compose up -d`,
# run a post-deploy canary against `tinyassets.io/mcp`, and on canary
# red, auto-rollback to the previous tag.
#
# Alarm hook: deploy failures open a GitHub issue labeled `deploy-failed`
# — distinct from the canary-triggered `p0-outage` issue shape from
# Row H. That way host can tell "deploy broke" from "daemon died
# spontaneously."
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DO_DROPLET_HOST  — Droplet public IP (e.g. 161.35.237.133)
#   DO_SSH_USER      — SSH user on the Droplet (e.g. root or deploy)
#   DO_SSH_KEY       — Private key PEM for the above user
#
# Optional subscription auth secret:
#   WORKFLOW_CODEX_AUTH_JSON_B64 - base64-encoded ~/.codex/auth.json.
#   When present, deploy syncs it into /etc/workflow/env without printing it
#   and forces WORKFLOW_ALLOW_API_KEY_PROVIDERS=0 for the public daemon.

on:
  workflow_run:
    workflows: ["Build and publish image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default = latest main commit short-SHA)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST }}
  DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
  # Canonical post-deploy probe URL.
  CANARY_URL: https://tinyassets.io/mcp
  DIRECT_URL: https://mcp.tinyassets.io/mcp

jobs:
  deploy:
    # Don't run on failed build-image runs. Manual dispatch always allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_CODEX_AUTH_BUNDLE: ${{ secrets.WORKFLOW_CODEX_AUTH_JSON_B64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Derive the image tag to deploy. workflow_dispatch override wins;
      # otherwise use the build-image run's head SHA.
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            full_sha="${{ github.event.workflow_run.head_sha }}"
            echo "tag=${full_sha:0:12}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          fi
          owner_lower="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner_lower}/workflow-daemon" >> "$GITHUB_OUTPUT"

      - name: Verify secrets present
        run: |
          missing=()
          [ -z "$DO_DROPLET_HOST" ] && missing+=("DO_DROPLET_HOST")
          [ -z "$DO_SSH_USER" ] && missing+=("DO_SSH_USER")
          [ -z "${{ secrets.DO_SSH_KEY }}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Configure at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Capture previous image tag (for rollback)
        id: prev
        run: |
          # Read current WORKFLOW_IMAGE from the running env file.
          prev=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo grep -E '^WORKFLOW_IMAGE=' /etc/workflow/env | head -1 | cut -d= -f2-" \
              || echo '')
          if [ -z "$prev" ]; then
            echo "::warning::no previous WORKFLOW_IMAGE found on box; rollback will use :latest fallback"
            prev="${{ steps.tag.outputs.image }}:latest"
          fi
          echo "previous=${prev}" >> "$GITHUB_OUTPUT"
          echo "Previous: ${prev}"

      # INVARIANT — /etc/workflow/env must stay root:workflow 640.
      # All env mutations route through `deploy/install-workflow-env.sh`
      # which uses `install -m 640 -o root -g workflow` for an atomic
      # write. The legacy `sed -i + chown + chmod` chain (root cause of
      # the 2026-04-21 P0 outage — see RC-1 in
      # docs/audits/2026-04-25-etc-workflow-env-mode-flip.md) is gone.
      # The helper asserts post-write readability by user=workflow, so
      # any mode-flip class is caught at the call site, not later by
      # systemd ExecStartPre.
      #
      # BUG-002 (2026-04-19): host's Windows wiki path leaked to the
      # droplet env file, making wiki_path() resolve to /app/C:\Users\...
      # Strip explicit WORKFLOW_WIKI_PATH so the resolver falls back to
      # $WORKFLOW_DATA_DIR/wiki (=/data/wiki).
      # Also strip WORKFLOW_UNIVERSE: it is a stdio-shim override, and
      # leaving it in the cloud env can bind workflow-worker to a
      # different universe than the public MCP default.
      - name: Scrub stale cloud env overrides
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s -- delete WORKFLOW_WIKI_PATH WORKFLOW_UNIVERSE' \
              < deploy/install-workflow-env.sh

      - name: Sync runtime deploy files
        run: |
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/compose.yml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/workflow-compose.yml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector.yaml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/workflow-vector.yaml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector-betterstack.yaml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/workflow-vector-betterstack.yaml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector-entrypoint.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/workflow-vector-entrypoint.sh"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/workflow-daemon.service \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/workflow-daemon.service"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; \
               sudo mkdir -p /opt/workflow/deploy; \
               sudo install -m 0644 -o workflow -g workflow /tmp/workflow-compose.yml /opt/workflow/compose.yml; \
               sudo install -m 0644 -o workflow -g workflow /tmp/workflow-compose.yml /opt/workflow/deploy/compose.yml; \
               sudo install -m 0644 -o workflow -g workflow /tmp/workflow-vector.yaml /opt/workflow/deploy/vector.yaml; \
               sudo install -m 0644 -o workflow -g workflow /tmp/workflow-vector-betterstack.yaml /opt/workflow/deploy/vector-betterstack.yaml; \
               sudo install -m 0755 -o workflow -g workflow /tmp/workflow-vector-entrypoint.sh /opt/workflow/deploy/vector-entrypoint.sh; \
               sudo install -m 0644 -o root -g root /tmp/workflow-daemon.service /etc/systemd/system/workflow-daemon.service; \
               sudo systemctl daemon-reload"

      - name: Deploy new image
        id: deploy
        env:
          WORKFLOW_CODEX_AUTH_JSON_B64: ${{ secrets.WORKFLOW_CODEX_AUTH_JSON_B64 }}
        run: |
          NEW_IMAGE="${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}"
          echo "Deploying: ${NEW_IMAGE}"
          # Pin the new tag in /etc/workflow/env via the atomic helper.
          # Helper enforces root:workflow 640 in a single install(1)
          # call + asserts post-write readability by user=workflow.
          # Replaces the legacy sed -i + chown + chmod chain that was
          # the 2026-04-21 P0 root cause.
          # First scp the helper to the droplet, then exec it with the
          # new value piped in via stdin. Two SSH round-trips, but
          # avoids stdin-multiplexing fragility on the runner shell.
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/install-workflow-env.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/install-workflow-env.sh"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '${NEW_IMAGE}' | sudo bash /tmp/install-workflow-env.sh set WORKFLOW_IMAGE"
          if [ "${HAS_CODEX_AUTH_BUNDLE}" = "true" ]; then
            echo "Deploy-visible WORKFLOW_CODEX_AUTH_JSON_B64 found; syncing subscription auth bundle."
            printf '%s' "${WORKFLOW_CODEX_AUTH_JSON_B64}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-workflow-env.sh set WORKFLOW_CODEX_AUTH_JSON_B64"
            printf '%s' '0' | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-workflow-env.sh set WORKFLOW_ALLOW_API_KEY_PROVIDERS"
          else
            echo "::warning::WORKFLOW_CODEX_AUTH_JSON_B64 is not visible to deploy; leaving any existing droplet subscription auth untouched."
          fi
          {
            echo "## Deploy subscription auth"
            echo ""
            echo "- WORKFLOW_CODEX_AUTH_JSON_B64 visible to deploy: \`${HAS_CODEX_AUTH_BUNDLE}\`"
            echo "- API-key providers forced off when the Codex subscription bundle is synced."
          } >> "$GITHUB_STEP_SUMMARY"
          # Pull + restart via the systemd unit (which runs docker
          # compose down + up with the new env).
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; sudo docker pull '${NEW_IMAGE}'; sudo systemctl restart workflow-daemon"

      # Independent of the helper's in-call readability assert: re-verify
      # after the systemd restart has settled. Steady-state canary that
      # catches any out-of-band perm drift between the env install and
      # the post-restart compose steady state (e.g. manual SSH edit
      # racing the deploy step — RC-2 in the env mode-flip audit).
      - name: Assert /etc/workflow/env readable by daemon user
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo -u workflow test -r /etc/workflow/env' || {
            echo "::error::ENV-UNREADABLE — /etc/workflow/env not readable by user 'workflow' after restart. cloudflared will silently fail to start."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                'sudo ls -l /etc/workflow/env' || true
            exit 1
          }

      - name: Wait for daemon health
        run: |
          # Give compose time to bring the new image up + healthcheck
          # to settle. Cold-start budget 90s.
          for i in $(seq 1 18); do
            if python scripts/mcp_public_canary.py \
                 --url "${CANARY_URL}" --timeout 10 >/dev/null 2>&1; then
              echo "canonical green after ${i} poll(s)"
              break
            fi
            sleep 5
            if [ "$i" = "18" ]; then
              echo "::error::canary still red after 90s — rolling back"
              exit 1
            fi
          done

      - name: Verify cloud worker is running
        run: |
          running=""
          for i in $(seq 1 30); do
            running=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo docker inspect -f '{{.State.Running}}' workflow-worker 2>/dev/null || true")
            if [ "${running}" = "true" ]; then
              echo "workflow-worker running after ${i} poll(s)"
              break
            fi
            sleep 2
          done
          if [ "${running}" != "true" ]; then
            echo "::error::workflow-worker is not running after deploy; node execution is not 24/7."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo docker compose -f /opt/workflow/compose.yml ps; sudo docker logs --tail 120 workflow-worker 2>&1 || true"
            exit 1
          fi
          if ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo docker exec workflow-worker env | grep -q '^WORKFLOW_UNIVERSE='"; then
            echo "::error::workflow-worker inherited WORKFLOW_UNIVERSE from /etc/workflow/env. That stdio-only override can bind the worker to a different universe than the public MCP default."
            exit 1
          fi
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo docker logs --tail 160 workflow-worker 2>&1 | grep -E 'cloud_worker:|Registered|Graph execution failed|subprocess exited|spawn failed|No module named|Traceback' || true"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo docker exec -i workflow-worker python -' <<'PY'
          import os
          from pathlib import Path
          from workflow.cloud_worker import _resolve_universe_path

          root = Path(os.environ.get("WORKFLOW_DATA_DIR", "/data"))
          active_marker = root / ".active_universe"
          try:
              active = active_marker.read_text(encoding="utf-8").strip()
          except OSError:
              active = ""

          universe = _resolve_universe_path()
          print(f"worker diagnostic: data_root={root}")
          print(f"worker diagnostic: active_marker={active or '<unset>'}")
          print(f"worker diagnostic: resolved_universe={universe}")
          for name in (
              ".runtime_status.json",
              "status.json",
              "activity.log",
              "worldbuild_signals.json",
              "work_targets.json",
          ):
              path = universe / name
              try:
                  size = path.stat().st_size if path.exists() else 0
              except OSError:
                  size = -1
              print(f"worker diagnostic: {name} exists={path.exists()} bytes={size}")
          PY

      - name: Post-deploy canary — canonical URL only
        id: canary
        run: |
          # Since CF Access Option-1 cutover, the direct URL (mcp.tinyassets.io)
          # correctly returns 403. Only the canonical URL is a valid health signal.
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Verify subscription LLM binding after synced Codex auth
        if: env.HAS_CODEX_AUTH_BUNDLE == 'true'
        run: |
          python scripts/verify_llm_binding.py \
              --url "${CANARY_URL}" --timeout 20 --require-sandbox \
              --retries 12 --retry-delay 10

      - name: Report subscription LLM binding when no deploy auth bundle is configured
        if: env.HAS_CODEX_AUTH_BUNDLE != 'true'
        run: |
          python scripts/verify_llm_binding.py \
              --url "${CANARY_URL}" --timeout 20 --require-sandbox \
              --retries 12 --retry-delay 10
          echo "Subscription LLM binding and sandbox runtime are already live."

      - name: Verify CF Access gates direct URL (expects 403/401)
        id: access-gate
        run: |
          # Confirm CF Access is still protecting the direct tunnel URL.
          # 403/401 = correct. 200 = Access accidentally disabled — FAIL deploy.
          # 000/timeout = tunnel down (advisory only — not a deploy blocker).
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${DIRECT_URL}" || echo "000")
          echo "direct URL HTTP status: ${http_code}"
          if [ "${http_code}" = "200" ]; then
            echo "::error::CF Access is OPEN on ${DIRECT_URL} (returned 200). Access policy may be disabled."
            echo "::error::Fix: Cloudflare dashboard → Access → Applications → confirm tunnel policy is active."
            exit 1
          elif [ "${http_code}" = "000" ]; then
            echo "::warning::Direct URL unreachable (${DIRECT_URL}) — tunnel may be down. Daemon is still live via canonical."
          else
            echo "Access gate confirmed: ${DIRECT_URL} → HTTP ${http_code} (expected 403/401)"
          fi

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        env:
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
        run: |
          echo "::warning::Rolling back to ${PREV_IMAGE}"
          # Restore previous tag via the atomic helper (same root:workflow
          # 640 invariant as the deploy step). The helper is already in
          # /tmp/install-workflow-env.sh from the deploy step's scp; if
          # the deploy step failed before scp, push it again here.
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/install-workflow-env.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/install-workflow-env.sh"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '${PREV_IMAGE}' | sudo bash /tmp/install-workflow-env.sh set WORKFLOW_IMAGE"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; sudo docker pull '${PREV_IMAGE}' || true; sudo systemctl restart workflow-daemon"
          # Confirm rollback restored green.
          sleep 30
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Open deploy-failed issue
        if: failure()
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.tag.outputs.tag }}
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
        with:
          script: |
            const label = "deploy-failed";
            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'fbca04',
                  description: 'CI deploy to DO Droplet failed; auto-rollback attempted.',
                });
              } else {
                throw e;
              }
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${process.env.NEW_TAG} @ ${new Date().toISOString()}`,
              labels: [label],
              body: [
                `Auto-opened by the deploy-prod workflow.`,
                ``,
                `- Attempted: \`${process.env.NEW_TAG}\``,
                `- Rolled back to: \`${process.env.PREV_IMAGE}\``,
                `- Run: ${runUrl}`,
                ``,
                `Check the run logs for the failing step (build, deploy, canary, or rollback).`,
                `If rollback canary is also red, the daemon is down — investigate urgently.`,
              ].join('\n'),
            });

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- **Target image:** \`${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}\`"
            echo "- **Previous image:** \`${{ steps.prev.outputs.previous }}\`"
            echo "- **Deploy step:** \`${{ steps.deploy.outcome }}\`"
            echo "- **Canary step:** \`${{ steps.canary.outcome }}\`"
            echo "- **Access gate step:** \`${{ steps.access-gate.outcome }}\`"
            echo "- **Overall:** \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
