name: Deploy prod

# Self-host migration Row M per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Fires after build-image.yml succeeds on main. SSH into the DigitalOcean
# Droplet, pull the freshly-published image tag, `docker compose up -d`,
# run a post-deploy canary against `tinyassets.io/mcp`, and on canary
# red, auto-rollback to the previous tag.
#
# Alarm hook: deploy failures open a GitHub issue labeled `deploy-failed`
# — distinct from the canary-triggered `p0-outage` issue shape from
# Row H. That way host can tell "deploy broke" from "daemon died
# spontaneously."
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DO_DROPLET_HOST  — Droplet public IP (e.g. 161.35.237.133)
#   DO_SSH_USER      — SSH user on the Droplet (e.g. root or deploy)
#   DO_SSH_KEY       — Private key PEM for the above user
#
# Optional subscription auth secret:
#   TINYASSETS_CODEX_AUTH_JSON_B64 - base64-encoded ~/.codex/auth.json.
#   When present, deploy syncs it into /etc/tinyassets/env without printing it
#   and forces TINYASSETS_ALLOW_API_KEY_PROVIDERS=0 for the public daemon.
#
# Optional PR-122 Phase 2 capability secret (PR-128):
#   TINYASSETS_GITHUB_PR_CAPABILITIES - JSON object mapping
#   "<owner>/<repo>" -> "<token>". Read by
#   tinyassets.effectors.github_pr at invocation time; never echoed
#   into branch-visible run state. When unset, the effector emits
#   error_kind="missing_capability" dry-run evidence on real-PR
#   attempts.

on:
  workflow_run:
    workflows: ["Build and publish image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default = current main commit short-SHA)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST }}
  DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
  # Canonical post-deploy probe URL.
  CANARY_URL: https://tinyassets.io/mcp
  DIRECT_URL: https://mcp.tinyassets.io/mcp

jobs:
  deploy:
    # Don't run on failed build-image runs. Manual dispatch always allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_CODEX_AUTH_BUNDLE: ${{ secrets.TINYASSETS_CODEX_AUTH_JSON_B64 != '' }}
      # Claude provider auth on the droplet. CLAUDE_CODE_OAUTH_TOKEN is a
      # `claude setup-token` long-lived token Claude Code reads from the env
      # (rotation-safe, no file). When set, the deploy syncs it into
      # /etc/tinyassets/env so a fresh /data volume is not left "Not logged in"
      # (the 2026-06-25 loop-wedge root cause). Same secret the CI workers use.
      HAS_CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      # Codex-style fallback: base64 of a subscription ~/.claude/.credentials.json.
      # The entrypoint seeds it to $CLAUDE_CONFIG_DIR/.credentials.json only when
      # missing. Preferred is CLAUDE_CODE_OAUTH_TOKEN above (rotation-safe); this
      # is the file path for hosts without a setup-token.
      HAS_CLAUDE_CREDENTIALS_BUNDLE: ${{ secrets.TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 != '' }}
      # PR-128 — PR-122 Phase 2 capability map sync. When the
      # TINYASSETS_GITHUB_PR_CAPABILITIES GH Actions secret is set
      # (JSON object keyed by "<owner>/<repo>" -> "<token>"), the
      # deploy step installs it into /etc/tinyassets/env so the Phase 2
      # effector can pass its capability gate. Without this the
      # effector emits error_kind="missing_capability" and stays in
      # dry-run for real-PR attempts.
      HAS_GITHUB_PR_CAPABILITY: ${{ secrets.TINYASSETS_GITHUB_PR_CAPABILITIES != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Derive the image tag to deploy. workflow_dispatch override wins;
      # otherwise use the build-image run's head SHA.
      #
      # Resolve the requested tag to an immutable digest before deploy.
      # Doc-only commits can skip build-image.yml, leaving no image for
      # that commit SHA; in that case fail before mutating production.
      - name: Resolve image tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            tag="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            full_sha="${{ github.event.workflow_run.head_sha }}"
            tag="${full_sha:0:12}"
          else
            tag="$(git rev-parse --short=12 HEAD)"
          fi
          owner_lower="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lower}/tinyassets-daemon"

          echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1 || true
          if docker manifest inspect "${image}:${tag}" >/dev/null 2>&1; then
            echo "::notice::image ${image}:${tag} exists in GHCR; deploying it"
          else
            echo "::error::${image}:${tag} not found in GHCR; refusing mutable image fallback"
            exit 1
          fi

          digest="$(docker buildx imagetools inspect "${image}:${tag}" | awk '/^Digest:/ {print $2; exit}')"
          if [ -z "${digest}" ]; then
            echo "::error::could not resolve digest for ${image}:${tag}"
            exit 1
          fi
          image_ref="${image}@${digest}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          {
            echo "## Image resolution"
            echo ""
            echo "- effective tag: \`${image}:${tag}\`"
            echo "- immutable ref: \`${image_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify secrets present
        run: |
          missing=()
          [ -z "$DO_DROPLET_HOST" ] && missing+=("DO_DROPLET_HOST")
          [ -z "$DO_SSH_USER" ] && missing+=("DO_SSH_USER")
          [ -z "${{ secrets.DO_SSH_KEY }}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Configure at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Capture previous image tag (for rollback)
        id: prev
        run: |
          # Read current TINYASSETS_IMAGE from the running env file.
          prev=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo grep -E '^TINYASSETS_IMAGE=' /etc/tinyassets/env | head -1 | cut -d= -f2-" \
              || echo '')
          if [ -z "$prev" ]; then
            echo "::warning::no previous TINYASSETS_IMAGE found on box; rollback unavailable for this deploy"
          elif [[ "${prev}" != *@sha256:* ]]; then
            prev_digest="$(docker buildx imagetools inspect "${prev}" | awk '/^Digest:/ {print $2; exit}' || true)"
            if [ -z "${prev_digest}" ]; then
              echo "::warning::previous TINYASSETS_IMAGE is not digest-pinned and could not be resolved; rollback unavailable"
              prev=""
            else
              prev_image="${prev%%:*}"
              prev="${prev_image}@${prev_digest}"
              echo "::notice::resolved previous TINYASSETS_IMAGE to immutable rollback ref: ${prev}"
            fi
          fi
          echo "previous=${prev}" >> "$GITHUB_OUTPUT"
          echo "Previous: ${prev}"

      # INVARIANT — /etc/tinyassets/env must stay root:tinyassets 640.
      # All env mutations route through `deploy/install-tinyassets-env.sh`
      # which uses `install -m 640 -o root -g tinyassets` for an atomic
      # write. The legacy `sed -i + chown + chmod` chain (root cause of
      # the 2026-04-21 P0 outage — see RC-1 in
      # docs/audits/2026-04-25-etc-workflow-env-mode-flip.md) is gone.
      # The helper asserts post-write readability by user=tinyassets, so
      # any mode-flip class is caught at the call site, not later by
      # systemd ExecStartPre.
      #
      # BUG-002 (2026-04-19): host's Windows wiki path leaked to the
      # droplet env file, making wiki_path() resolve to /app/C:\Users\...
      # Strip explicit TINYASSETS_WIKI_PATH so the resolver falls back to
      # $TINYASSETS_DATA_DIR/wiki (=/data/wiki).
      # Also strip TINYASSETS_UNIVERSE: it is a stdio-shim override, and
      # leaving it in the cloud env can bind tinyassets-worker to a
      # different universe than the public MCP default.
      - name: Scrub stale cloud env overrides
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s -- delete TINYASSETS_WIKI_PATH TINYASSETS_UNIVERSE' \
              < deploy/install-tinyassets-env.sh

      - name: Sync runtime deploy files
        run: |
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/compose.yml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-compose.yml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector.yaml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-vector.yaml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector-betterstack.yaml \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-vector-betterstack.yaml"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/vector-entrypoint.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-vector-entrypoint.sh"
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/tinyassets-daemon.service \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-daemon.service"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; \
               sudo mkdir -p /opt/tinyassets/deploy; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-compose.yml /opt/tinyassets/compose.yml; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-compose.yml /opt/tinyassets/deploy/compose.yml; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-vector.yaml /opt/tinyassets/deploy/vector.yaml; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-vector-betterstack.yaml /opt/tinyassets/deploy/vector-betterstack.yaml; \
               sudo install -m 0755 -o tinyassets -g tinyassets /tmp/tinyassets-vector-entrypoint.sh /opt/tinyassets/deploy/vector-entrypoint.sh; \
               sudo install -m 0644 -o root -g root /tmp/tinyassets-daemon.service /etc/systemd/system/tinyassets-daemon.service; \
               sudo systemctl daemon-reload"

      - name: Preflight droplet disk before image pull
        id: disk-preflight
        run: |
          # A full root volume can make both the forward deploy and the rollback
          # fail while the live daemon is already down. Reclaim disposable state
          # before touching TINYASSETS_IMAGE or pulling the new image.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s' <<'SH'
          set -euo pipefail

          threshold=85
          fail_threshold=90

          max_disk_pct() {
            max=0
            for path in / /var/lib/docker /data; do
              [ -e "$path" ] || continue
              pct="$(df -P "$path" | awk 'NR==2 {gsub("%", "", $5); print $5}')"
              case "$pct" in
                ''|*[!0-9]*) pct=0 ;;
              esac
              if [ "$pct" -gt "$max" ]; then
                max="$pct"
              fi
            done
            echo "$max"
          }

          echo "disk preflight before cleanup:"
          df -h / /var/lib/docker /data 2>&1 || true

          before="$(max_disk_pct)"
          if [ "$before" -ge "$threshold" ]; then
            echo "::warning::disk usage ${before}% >= ${threshold}%; pruning disposable Docker/build/journal state before deploy"
            docker system prune -af 2>&1 | tail -80 || true
            docker builder prune -af 2>&1 | tail -80 || true
            journalctl --vacuum-time=3d 2>&1 | tail -20 || true
          else
            echo "disk usage ${before}% < ${threshold}%; no pre-deploy prune needed"
          fi

          echo "disk preflight after cleanup:"
          df -h / /var/lib/docker /data 2>&1 || true

          after="$(max_disk_pct)"
          if [ "$after" -ge "$fail_threshold" ]; then
            echo "::error::disk usage still ${after}% >= ${fail_threshold}% after prune; refusing deploy before image pull/restart"
            exit 1
          fi
          SH

      # Codex CLI rotates single-use OAuth refresh tokens in-place inside
      # the container. compose.yml sets CODEX_HOME=/data/.codex and
      # CLAUDE_CONFIG_DIR=/data/.claude for daemon + worker, backed by the
      # shared tinyassets-data volume, so rotated subscription auth survives
      # container restart. This step makes those directories self-provisioning
      # on every deploy — idempotent, no host hands required, per the Forever
      # Rule (24/7 uptime, zero hosts online).
      #
      # Three idempotent branches:
      #   - tinyassets-data/.codex already present -> skip creation
      #   - /data/.codex/auth.json already in volume -> skip migration
      #   - no running container with /data/.codex/auth.json or legacy
      #     /app/.codex/auth.json -> skip migration
      #     (new container will seed from TINYASSETS_CODEX_AUTH_JSON_B64 on first boot)
      #   - /data/.claude already present -> preserve; otherwise migrate from
      #     a running container's /data/.claude or legacy /app/.claude.
      #
      # The migration branch only fires once: the first deploy after this
      # CODEX_HOME move onto a live droplet where tinyassets-worker has a
      # rotated auth.json at either the new or legacy location.
      - name: Prepare codex auth persistent volume
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s' <<'SH'
          set -euo pipefail

          VOLUME_NAME="tinyassets-data"
          TINYASSETS_UID=1001
          TINYASSETS_GID=1001

          docker volume create "$VOLUME_NAME" >/dev/null
          VOLUME_DIR="$(docker volume inspect "$VOLUME_NAME" --format '{{ .Mountpoint }}')"
          CODEX_DIR="$VOLUME_DIR/.codex"
          CLAUDE_DIR="$VOLUME_DIR/.claude"

          # Create the directory if missing. mkdir -p is itself a no-op
          # when the path already exists.
          if [ ! -d "$CODEX_DIR" ]; then
            echo "creating codex auth persistent directory at $CODEX_DIR"
            mkdir -p "$CODEX_DIR"
          fi

          # Ownership + mode are repaired UNCONDITIONALLY every deploy.
          # If a prior attempt left the dir root-owned, this heals the
          # posture so uid 1001 can write. Both chown and chmod are
          # themselves idempotent — no-op when state already matches.
          chown "$TINYASSETS_UID:$TINYASSETS_GID" "$CODEX_DIR"
          chmod 700 "$CODEX_DIR"

          # Migration: if the volume is empty but a tinyassets-worker container is
          # currently running with a Codex auth.json inside it, copy the live
          # refresh chain into /data/.codex so the new container preserves it
          # instead of falling back to the stale env-var secret.
          if [ ! -f "$CODEX_DIR/auth.json" ]; then
            tmp_dir="$(mktemp -d)"
            trap 'rm -rf "$tmp_dir"' EXIT
            if docker inspect tinyassets-worker >/dev/null 2>&1; then
              if docker exec tinyassets-worker test -f /data/.codex/auth.json 2>/dev/null; then
                echo "migrating live codex auth.json from tinyassets-worker:/data/.codex"
                docker cp tinyassets-worker:/data/.codex/auth.json "$tmp_dir/auth.json"
              elif docker exec tinyassets-worker test -f /app/.codex/auth.json 2>/dev/null; then
                echo "migrating legacy codex auth.json from tinyassets-worker:/app/.codex"
                docker cp tinyassets-worker:/app/.codex/auth.json "$tmp_dir/auth.json"
              fi
            fi
            if [ -s "$tmp_dir/auth.json" ]; then
              cp "$tmp_dir/auth.json" "$CODEX_DIR/auth.json"
              chown "$TINYASSETS_UID:$TINYASSETS_GID" "$CODEX_DIR/auth.json"
              chmod 600 "$CODEX_DIR/auth.json"
            fi
          fi

          # Confirm final state for the log.
          ls -la "$CODEX_DIR" || true

          if [ ! -d "$CLAUDE_DIR" ]; then
            echo "creating Claude auth persistent directory at $CLAUDE_DIR"
            mkdir -p "$CLAUDE_DIR"
          fi
          chown -R "$TINYASSETS_UID:$TINYASSETS_GID" "$CLAUDE_DIR"
          chmod 700 "$CLAUDE_DIR"

          if ! find "$CLAUDE_DIR" -mindepth 1 -maxdepth 1 | grep -q .; then
            tmp_claude="$(mktemp -d)"
            if docker inspect tinyassets-worker >/dev/null 2>&1; then
              if docker exec tinyassets-worker test -d /data/.claude 2>/dev/null; then
                echo "migrating live Claude config from tinyassets-worker:/data/.claude"
                docker cp tinyassets-worker:/data/.claude/. "$tmp_claude/" || true
              elif docker exec tinyassets-worker test -d /app/.claude 2>/dev/null; then
                echo "migrating legacy Claude config from tinyassets-worker:/app/.claude"
                docker cp tinyassets-worker:/app/.claude/. "$tmp_claude/" || true
              fi
            fi
            if find "$tmp_claude" -mindepth 1 -maxdepth 1 | grep -q .; then
              cp -a "$tmp_claude"/. "$CLAUDE_DIR"/
              chown -R "$TINYASSETS_UID:$TINYASSETS_GID" "$CLAUDE_DIR"
              find "$CLAUDE_DIR" -type d -exec chmod 700 {} +
              find "$CLAUDE_DIR" -type f -exec chmod 600 {} +
            fi
            rm -rf "$tmp_claude"
          fi

          ls -la "$CLAUDE_DIR" || true
          SH

      - name: Retire legacy Workflow service
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo bash -s' <<'SH'
          set -euo pipefail

          for unit in workflow-daemon.service workflow.service; do
            if systemctl list-unit-files "$unit" --no-legend 2>/dev/null | grep -q . \
              || systemctl list-units "$unit" --all --no-legend 2>/dev/null | grep -q .; then
              echo "retiring legacy unit ${unit}"
              systemctl stop "$unit" || true
              systemctl disable "$unit" || true
            fi
          done

          for compose_file in /opt/workflow/compose.yml /opt/workflow/deploy/compose.yml; do
            if [ -f "$compose_file" ]; then
              echo "bringing down legacy compose stack from ${compose_file}"
              if [ -f /etc/workflow/env ]; then
                docker compose --env-file /etc/workflow/env -f "$compose_file" down --timeout 30 || true
              else
                docker compose -f "$compose_file" down --timeout 30 || true
              fi
            fi
          done

          legacy_ids="$(docker ps -aq --filter 'name=^/workflow-' || true)"
          if [ -n "$legacy_ids" ]; then
            echo "removing legacy workflow containers: ${legacy_ids}"
            docker rm -f $legacy_ids || true
          fi
          for container in workflow-daemon workflow-tunnel workflow-logs workflow-worker; do
            docker rm -f "$container" >/dev/null 2>&1 || true
          done
          SH

      - name: Deploy new image
        id: deploy
        env:
          TINYASSETS_CODEX_AUTH_JSON_B64: ${{ secrets.TINYASSETS_CODEX_AUTH_JSON_B64 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64: ${{ secrets.TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 }}
          # PR-128 — Phase 2 effector capability map. JSON object
          # mapping "<owner>/<repo>" -> "<token>" (round-2 P1.2
          # shape). Read by tinyassets.effectors.github_pr at
          # invocation time; never echoed into branch-visible state.
          TINYASSETS_GITHUB_PR_CAPABILITIES: ${{ secrets.TINYASSETS_GITHUB_PR_CAPABILITIES }}
        run: |
          NEW_IMAGE="${{ steps.tag.outputs.image_ref }}"
          echo "Deploying: ${NEW_IMAGE}"
          # Pin the new tag in /etc/tinyassets/env via the atomic helper.
          # Helper enforces root:tinyassets 640 in a single install(1)
          # call + asserts post-write readability by user=tinyassets.
          # Replaces the legacy sed -i + chown + chmod chain that was
          # the 2026-04-21 P0 root cause.
          # First scp the helper to the droplet, then exec it with the
          # new value piped in via stdin. Two SSH round-trips, but
          # avoids stdin-multiplexing fragility on the runner shell.
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/install-tinyassets-env.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/install-tinyassets-env.sh"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '${NEW_IMAGE}' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_IMAGE"
          # Cutover (2026-05-29): route file_bug investigation requests to the
          # user-buildable patch-request loop instead of the legacy cheat branch.
          # patch_request_loop_v5 (branch_def_id 0ca6e9c97f65) localizes via
          # search_repo_files, reads existing files via read_repo_files, edits
          # via the github_pull_request effector's edits_json diff format, and
          # opens a real draft PR. Replaces fd5c66b1d87d, which produced only
          # analysis packets and was failing every run. Idempotent set; reverting
          # this block restores the prior handler on the next deploy.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '0ca6e9c97f65' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_BUG_INVESTIGATION_BRANCH_DEF_ID"
          # Enqueue go-live (2026-06-03): turn ON the in-node paced enqueue verb
          # so a user-built driver branch can append run-requests to its own
          # universe's dispatcher queue. The verb shipped dark in #1214 and was
          # hardened in #1221 (trusted-universe targeting, global + per-origin
          # queue caps, target-branch authority, forced request_type=branch_run).
          # Codex cleared the review gate round-3 APPROVE (2026-06-03).
          # ORDERING INVARIANT: this line is only safe once #1221 is merged AND
          # deployed — flipping it while prod runs the pre-#1221 (un-contained)
          # verb would enable the unguarded path. Do not merge this PR until the
          # release-state sha includes #1221. Idempotent set; reverting this
          # block returns the verb to fail-closed dark on the next deploy.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' 'on' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_NODE_ENQUEUE_ENABLED"
          # Soul-loop go-live (2026-06-03): turn ON soul-declared loop dispatch
          # so the daemon runs a souled universe's declared loop_branch_def_id
          # (a user-built branch) via execute_branch instead of the fantasy
          # cycle. Shipped dark in #1223, Codex round-2 APPROVE (2026-06-03).
          # SAFE because it is inert until a souled universe with a declared
          # loop exists; soulless/legacy universes are untouched. The pick is
          # active in this mode so child tasks the driver enqueues drain (no
          # starvation). ORDERING INVARIANT: only flip once #1223 is merged AND
          # deployed (release-state sha includes #1223). Idempotent set;
          # reverting returns soul-loop dispatch to fail-closed dark next deploy.
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' 'on' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_SOUL_LOOP_DISPATCH"
          # Identity activation (2026-06-04): set optional OAuth auth mode so the
          # daemon RESOLVES an authenticated Bearer subject into the request
          # identity (_current_actor) when one is present, while anonymous tier-1
          # traffic still passes unchanged (resolve-not-gate). Activates PR-165
          # (request-scoped _current_actor, #1248) + PR-167 (OptionalOAuthProvider,
          # #1252) end-to-end. SAFE: OptionalOAuthProvider.is_auth_required() is
          # False, so no anonymous request is 401'd — the zero-install Forever-Rule
          # contract is preserved. ORDERING INVARIANT: only flip once #1248 AND
          # #1252 are merged AND deployed (release-state sha includes both).
          # Founder/owner ENFORCEMENT is a separate follow-on (#1168 / PR-147) and
          # is intentionally NOT enabled here. Idempotent set. ROLLBACK is NOT a
          # plain PR revert: install-tinyassets-env.sh writes persistent state to
          # /etc/tinyassets/env, so removing this block only stops FUTURE writes —
          # the already-written UNIVERSE_SERVER_AUTH=optional entry persists. To
          # roll back, a follow-up deploy must explicitly
          # `install-tinyassets-env.sh set UNIVERSE_SERVER_AUTH false` (or
          # `delete UNIVERSE_SERVER_AUTH`).
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' 'optional' | sudo bash /tmp/install-tinyassets-env.sh set UNIVERSE_SERVER_AUTH"
          if [ "${HAS_CODEX_AUTH_BUNDLE}" = "true" ]; then
            echo "Deploy-visible TINYASSETS_CODEX_AUTH_JSON_B64 found; syncing subscription auth bundle."
            printf '%s' "${TINYASSETS_CODEX_AUTH_JSON_B64}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_CODEX_AUTH_JSON_B64"
            printf '%s' '0' | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_ALLOW_API_KEY_PROVIDERS"
          else
            echo "::warning::TINYASSETS_CODEX_AUTH_JSON_B64 is not visible to deploy; leaving any existing droplet subscription auth untouched."
          fi
          # Claude provider auth: sync CLAUDE_CODE_OAUTH_TOKEN into
          # /etc/tinyassets/env (same atomic helper) so claude-code workers
          # authenticate from the env on a fresh /data volume. Without it the
          # deploy could only migrate creds from a live container — a circular
          # dependency that fails once the credentials are gone (the 2026-06-25
          # loop-wedge root cause). The entrypoint also seeds a credentials file
          # from TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 when present; the env token
          # is preferred (rotation-safe).
          if [ "${HAS_CLAUDE_OAUTH_TOKEN}" = "true" ]; then
            echo "Deploy-visible CLAUDE_CODE_OAUTH_TOKEN found; syncing claude-code auth token."
            printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set CLAUDE_CODE_OAUTH_TOKEN"
          elif [ "${HAS_CLAUDE_CREDENTIALS_BUNDLE}" = "true" ]; then
            echo "Deploy-visible TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64 found; syncing claude credentials bundle."
            printf '%s' "${TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64"
          else
            echo "::warning::No claude auth (CLAUDE_CODE_OAUTH_TOKEN / TINYASSETS_CLAUDE_CREDENTIALS_JSON_B64) visible to deploy; leaving any existing droplet claude auth untouched."
          fi
          # PR-128 — sync the Phase 2 effector capability map. Same
          # install-tinyassets-env.sh helper, same atomic write
          # contract. The map MUST decode to a JSON object keyed by
          # "<owner>/<repo>" -> "<token>"; the effector
          # (tinyassets.effectors.github_pr) validates the shape and
          # logs loudly on malformed JSON. When the secret is unset,
          # the effector returns missing_capability dry-run evidence
          # — emit a deploy-time warning so the operator notices
          # before chatbots start filing for real-write attempts.
          if [ "${HAS_GITHUB_PR_CAPABILITY}" = "true" ]; then
            echo "Deploy-visible TINYASSETS_GITHUB_PR_CAPABILITIES found; syncing GitHub PR capability map."
            printf '%s' "${TINYASSETS_GITHUB_PR_CAPABILITIES}" | ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_GITHUB_PR_CAPABILITIES"
          else
            # Round-2 fix (Codex round-1 finding on PR #980): the
            # documented contract is "absence -> dry-run". Round-1
            # logged a warning but left any prior
            # TINYASSETS_GITHUB_PR_CAPABILITIES value in
            # /etc/tinyassets/env, which meant deleting the GH Actions
            # secret to revoke had no effect — the next deploy
            # restarted the daemon with the OLD capability still
            # active. Fix: when the secret is absent, explicitly
            # delete the key from the droplet env so the effector
            # observes "missing capability" on its next read. The
            # install-tinyassets-env.sh helper's `delete` subcommand is
            # a no-op when the key is already absent (assert_readable
            # still passes), so re-running this on a clean droplet
            # is safe.
            echo "::warning::TINYASSETS_GITHUB_PR_CAPABILITIES is not visible to deploy; removing any prior capability from /etc/tinyassets/env so effects emission stays dry-run with error_kind=missing_capability."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo bash /tmp/install-tinyassets-env.sh delete TINYASSETS_GITHUB_PR_CAPABILITIES"
          fi
          {
            echo "## Deploy subscription auth"
            echo ""
            echo "- TINYASSETS_CODEX_AUTH_JSON_B64 visible to deploy: \`${HAS_CODEX_AUTH_BUNDLE}\`"
            echo "- API-key providers forced off when the Codex subscription bundle is synced."
            echo "- TINYASSETS_GITHUB_PR_CAPABILITIES visible to deploy: \`${HAS_GITHUB_PR_CAPABILITY}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          # Pull + restart via the systemd unit (which runs docker
          # compose down + up with the new env).
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; sudo docker pull '${NEW_IMAGE}'; sudo systemctl restart tinyassets-daemon"

      # Independent of the helper's in-call readability assert: re-verify
      # after the systemd restart has settled. Steady-state canary that
      # catches any out-of-band perm drift between the env install and
      # the post-restart compose steady state (e.g. manual SSH edit
      # racing the deploy step — RC-2 in the env mode-flip audit).
      - name: Assert /etc/tinyassets/env readable by daemon user
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo -u tinyassets test -r /etc/tinyassets/env' || {
            echo "::error::ENV-UNREADABLE — /etc/tinyassets/env not readable by user 'tinyassets' after restart. cloudflared will silently fail to start."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                'sudo ls -l /etc/tinyassets/env' || true
            exit 1
          }

      - name: Wait for daemon health
        run: |
          # Give compose time to bring the new image up + healthcheck
          # to settle. Cold-start budget 90s.
          for i in $(seq 1 18); do
            if python scripts/mcp_public_canary.py \
                 --url "${CANARY_URL}" --timeout 10 >/dev/null 2>&1; then
              echo "canonical green after ${i} poll(s)"
              break
            fi
            sleep 5
            if [ "$i" = "18" ]; then
              echo "::error::canary still red after 90s — rolling back"
              exit 1
            fi
          done

      - name: Verify cloud worker is running
        run: |
          worker_containers="tinyassets-worker tinyassets-worker-codex-2 tinyassets-worker-claude-1 tinyassets-worker-claude-2"
          for container in ${worker_containers}; do
            running=""
            for i in $(seq 1 30); do
              running=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                  "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                  "sudo docker inspect -f '{{.State.Running}}' ${container} 2>/dev/null || true")
              if [ "${running}" = "true" ]; then
                echo "${container} running after ${i} poll(s)"
                break
              fi
              sleep 2
            done
            if [ "${running}" != "true" ]; then
              echo "::error::${container} is not running after deploy; node execution fleet is not 24/7."
              ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                  "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                  "sudo docker compose --env-file /etc/tinyassets/env -f /opt/tinyassets/compose.yml ps; sudo docker ps -a --filter name=${container}; sudo docker logs --tail 120 ${container} 2>&1 || true"
              exit 1
            fi
            if ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo docker exec ${container} env | grep -q '^TINYASSETS_UNIVERSE='"; then
              echo "::error::${container} inherited TINYASSETS_UNIVERSE from /etc/tinyassets/env. That stdio-only override can bind a worker to a different universe than the public MCP default."
              exit 1
            fi
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                "sudo docker logs --tail 160 ${container} 2>&1 | grep -E 'cloud_worker:|Registered|Graph execution failed|subprocess exited|spawn failed|No module named|Traceback' || true"
          done
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo docker exec -i tinyassets-worker python -' <<'PY'
          import os
          from pathlib import Path
          from tinyassets.cloud_worker import _resolve_universe_path

          root = Path(os.environ.get("TINYASSETS_DATA_DIR", "/data"))
          active_marker = root / ".active_universe"
          try:
              active = active_marker.read_text(encoding="utf-8").strip()
          except OSError:
              active = ""

          universe = _resolve_universe_path()
          print(f"worker diagnostic: data_root={root}")
          print(f"worker diagnostic: active_marker={active or '<unset>'}")
          print(f"worker diagnostic: resolved_universe={universe}")
          for name in (
              ".runtime_status.json",
              "status.json",
              "activity.log",
              "enrichment_signals.json",
              "worldbuild_signals.json",
              "work_targets.json",
          ):
              path = universe / name
              try:
                  size = path.stat().st_size if path.exists() else 0
              except OSError:
                  size = -1
              print(f"worker diagnostic: {name} exists={path.exists()} bytes={size}")
          PY

      - name: Post-deploy canary — canonical URL only
        id: canary
        run: |
          # Since CF Access Option-1 cutover, the direct URL (mcp.tinyassets.io)
          # correctly returns 403. Only the canonical URL is a valid health signal.
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Post-deploy 5-handle surface assertion (PR-178)
        run: |
          # Drift guard: the live /mcp must advertise exactly the five
          # canonical handles (read/write/run.graph + read/write.page, plus
          # optional get_status). Fails the deploy if the user surface
          # regresses to the legacy fat tools.
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --assert-handles --verbose

      - name: Verify subscription LLM binding after synced Codex auth
        if: env.HAS_CODEX_AUTH_BUNDLE == 'true'
        run: |
          python scripts/verify_llm_binding.py \
              --url "${CANARY_URL}" --timeout 20 --require-sandbox \
              --retries 12 --retry-delay 10

      - name: Report subscription LLM binding when no deploy auth bundle is configured
        if: env.HAS_CODEX_AUTH_BUNDLE != 'true'
        run: |
          python scripts/verify_llm_binding.py \
              --url "${CANARY_URL}" --timeout 20 --require-sandbox \
              --retries 12 --retry-delay 10
          echo "Subscription LLM binding and sandbox runtime are already live."

      - name: Verify CF Access gates direct URL (expects 403/401)
        id: access-gate
        run: |
          # Confirm CF Access is still protecting the direct tunnel URL.
          # 403/401 = correct. 200 = Access accidentally disabled — FAIL deploy.
          # 000/timeout = tunnel down (advisory only — not a deploy blocker).
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${DIRECT_URL}" || echo "000")
          echo "direct URL HTTP status: ${http_code}"
          if [ "${http_code}" = "200" ]; then
            echo "::error::CF Access is OPEN on ${DIRECT_URL} (returned 200). Access policy may be disabled."
            echo "::error::Fix: Cloudflare dashboard → Access → Applications → confirm tunnel policy is active."
            exit 1
          elif [ "${http_code}" = "000" ]; then
            echo "::warning::Direct URL unreachable (${DIRECT_URL}) — tunnel may be down. Daemon is still live via canonical."
          else
            echo "Access gate confirmed: ${DIRECT_URL} → HTTP ${http_code} (expected 403/401)"
          fi

      - name: Publish release-state receipt
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TARGET_IMAGE: ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          TARGET_IMAGE_REF: ${{ steps.tag.outputs.image_ref }}
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
          BUILD_RUN_ID: ${{ github.event.workflow_run.id }}
          BUILD_RUN_URL: ${{ github.event.workflow_run.html_url }}
          TINYASSETS_EVENT: ${{ github.event_name }}
        run: |
          DEPLOY_RUN_ID="${GITHUB_RUN_ID}"
          DEPLOY_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -z "${BUILD_RUN_ID}" ]; then
            BUILD_RUN_ID="manual:${GITHUB_RUN_ID}"
            BUILD_RUN_URL="${DEPLOY_RUN_URL}"
          fi

          image_digest="$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo docker image inspect '${TARGET_IMAGE_REF}' --format '{{index .RepoDigests 0}}' 2>/dev/null || true")"
          config_hash="$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo sha256sum /etc/tinyassets/env 2>/dev/null | awk '{print \$1}' || true")"
          if [ -n "${config_hash}" ]; then
            config_hash="sha256:${config_hash}"
          fi
          release_state_host_dir="$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo docker volume inspect tinyassets-data --format '{{ .Mountpoint }}' 2>/dev/null" || true)"
          if [ -z "${release_state_host_dir}" ]; then
            echo "::error::Could not resolve tinyassets-data Docker volume mountpoint"
            exit 1
          fi

          export image_digest config_hash BUILD_RUN_URL DEPLOY_RUN_ID DEPLOY_RUN_URL
          python - <<'PY' > /tmp/tinyassets-release-state.json
          import json
          import os
          from datetime import UTC, datetime

          receipt = {
              "git_sha": os.environ["SOURCE_SHA"],
              "image_tag": os.environ["TARGET_IMAGE"],
              "image_ref": os.environ["TARGET_IMAGE_REF"],
              "image_digest": os.environ.get("image_digest", ""),
              "build_run_id": os.environ["BUILD_RUN_ID"],
              "build_run_url": os.environ["BUILD_RUN_URL"],
              "deploy_run_id": os.environ["DEPLOY_RUN_ID"],
              "deploy_run_url": os.environ["DEPLOY_RUN_URL"],
              "config_hash": os.environ.get("config_hash", ""),
              "config_version": "tinyassets-env-v1",
              "schema_migration_rev": "not_applicable",
              "canary_bundle_status": "passed",
              "deployed_at": datetime.now(UTC).isoformat().replace("+00:00", "Z"),
              "rollback_target": os.environ["PREV_IMAGE"],
              "actor": os.environ["GITHUB_ACTOR"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "workflow_event": os.environ["TINYASSETS_EVENT"],
          }
          print(json.dumps(receipt, sort_keys=True, indent=2))
          PY

          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              /tmp/tinyassets-release-state.json \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/tinyassets-release-state.json"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; \
               sudo install -d -m 0755 -o tinyassets -g tinyassets '${release_state_host_dir}'; \
               sudo install -m 0644 -o tinyassets -g tinyassets /tmp/tinyassets-release-state.json '${release_state_host_dir}/release-state.json'"
          {
            echo "### Release-state receipt"
            echo ""
            echo "- Container path: \`/data/release-state.json\`"
            echo "- Host volume path: \`${release_state_host_dir}/release-state.json\`"
            echo "- Source SHA: \`${SOURCE_SHA}\`"
            echo "- Image: \`${TARGET_IMAGE}\`"
            echo "- Immutable ref: \`${TARGET_IMAGE_REF}\`"
            echo "- Digest: \`${image_digest:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success' && steps.prev.outputs.previous != ''
        env:
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
        run: |
          echo "::warning::Rolling back to ${PREV_IMAGE}"
          # Restore previous tag via the atomic helper (same root:tinyassets
          # 640 invariant as the deploy step). The helper is already in
          # /tmp/install-tinyassets-env.sh from the deploy step's scp; if
          # the deploy step failed before scp, push it again here.
          scp -i ~/.ssh/do_deploy -o BatchMode=yes \
              deploy/install-tinyassets-env.sh \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}:/tmp/install-tinyassets-env.sh"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "printf '%s' '${PREV_IMAGE}' | sudo bash /tmp/install-tinyassets-env.sh set TINYASSETS_IMAGE"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "set -e; sudo docker pull '${PREV_IMAGE}' || true; sudo systemctl restart tinyassets-daemon"
          # Confirm rollback restored green.
          sleep 30
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Open deploy-failed issue
        if: failure()
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.tag.outputs.tag }}
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
        with:
          script: |
            const label = "deploy-failed";
            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'fbca04',
                  description: 'CI deploy to DO Droplet failed; auto-rollback attempted.',
                });
              } else {
                throw e;
              }
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${process.env.NEW_TAG} @ ${new Date().toISOString()}`,
              labels: [label],
              body: [
                `Auto-opened by the deploy-prod tinyassets.`,
                ``,
                `- Attempted: \`${process.env.NEW_TAG}\``,
                `- Rolled back to: \`${process.env.PREV_IMAGE}\``,
                `- Run: ${runUrl}`,
                ``,
                `Check the run logs for the failing step (build, deploy, canary, or rollback).`,
                `If rollback canary is also red, the daemon is down — investigate urgently.`,
              ].join('\n'),
            });

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- **Target image:** \`${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}\`"
            echo "- **Previous image:** \`${{ steps.prev.outputs.previous }}\`"
            echo "- **Deploy step:** \`${{ steps.deploy.outcome }}\`"
            echo "- **Canary step:** \`${{ steps.canary.outcome }}\`"
            echo "- **Access gate step:** \`${{ steps.access-gate.outcome }}\`"
            echo "- **Overall:** \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
