name: Deploy prod

# Self-host migration Row M per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Fires after build-image.yml succeeds on main. SSH into the DigitalOcean
# Droplet, pull the freshly-published image tag, `docker compose up -d`,
# run a post-deploy canary against `tinyassets.io/mcp`, and on canary
# red, auto-rollback to the previous tag.
#
# Alarm hook: deploy failures open a GitHub issue labeled `deploy-failed`
# — distinct from the canary-triggered `p0-outage` issue shape from
# Row H. That way host can tell "deploy broke" from "daemon died
# spontaneously."
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DO_DROPLET_HOST  — Droplet public IP (e.g. 161.35.237.133)
#   DO_SSH_USER      — SSH user on the Droplet (e.g. root or deploy)
#   DO_SSH_KEY       — Private key PEM for the above user

on:
  workflow_run:
    workflows: ["Build and publish image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default = latest main commit short-SHA)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST }}
  DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
  # Canonical post-deploy probe URL.
  CANARY_URL: https://tinyassets.io/mcp
  DIRECT_URL: https://mcp.tinyassets.io/mcp

jobs:
  deploy:
    # Don't run on failed build-image runs. Manual dispatch always allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Derive the image tag to deploy. workflow_dispatch override wins;
      # otherwise use the build-image run's head SHA.
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            full_sha="${{ github.event.workflow_run.head_sha }}"
            echo "tag=${full_sha:0:12}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          fi
          owner_lower="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner_lower}/workflow-daemon" >> "$GITHUB_OUTPUT"

      - name: Verify secrets present
        run: |
          missing=()
          [ -z "$DO_DROPLET_HOST" ] && missing+=("DO_DROPLET_HOST")
          [ -z "$DO_SSH_USER" ] && missing+=("DO_SSH_USER")
          [ -z "${{ secrets.DO_SSH_KEY }}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Configure at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Capture previous image tag (for rollback)
        id: prev
        run: |
          # Read current WORKFLOW_IMAGE from the running env file.
          prev=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo grep -E '^WORKFLOW_IMAGE=' /etc/workflow/env | head -1 | cut -d= -f2-" \
              || echo '')
          if [ -z "$prev" ]; then
            echo "::warning::no previous WORKFLOW_IMAGE found on box; rollback will use :latest fallback"
            prev="${{ steps.tag.outputs.image }}:latest"
          fi
          echo "previous=${prev}" >> "$GITHUB_OUTPUT"
          echo "Previous: ${prev}"

      # INVARIANT — /etc/workflow/env must stay root:workflow 640.
      # Every `sudo sed -i` on it MUST be followed by `sudo chown
      # root:workflow ... && sudo chmod 640 ...`. `sed -i` writes to a
      # temp file and renames, which drops group ownership + resets
      # perms to umask (often 600). The systemd unit runs as
      # user=workflow, which cannot read 600 root files → docker
      # compose silently crash-loops → cloudflared never starts →
      # public endpoint dark. Root cause of the 2026-04-21 P0 outage.
      #
      # BUG-002 (2026-04-19): host's Windows WIKI_PATH leaked to the
      # droplet env file, making wiki_path() resolve to /app/C:\Users\...
      # Strip any legacy WIKI_PATH / WORKFLOW_WIKI_PATH lines so the
      # resolver falls back to $WORKFLOW_DATA_DIR/wiki (=/data/wiki).
      - name: Scrub legacy Windows WIKI_PATH env leakage
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo sed -i '/^WIKI_PATH=/d; /^WORKFLOW_WIKI_PATH=/d' /etc/workflow/env && sudo chown root:workflow /etc/workflow/env && sudo chmod 640 /etc/workflow/env && (sudo -u workflow test -r /etc/workflow/env || { echo 'ENV-UNREADABLE: scrub step left /etc/workflow/env unreadable by user workflow' >&2; sudo ls -l /etc/workflow/env >&2; exit 1; })"

      - name: Deploy new image
        id: deploy
        run: |
          NEW_IMAGE="${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}"
          echo "Deploying: ${NEW_IMAGE}"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" <<EOF
            set -e
            # Pin the new tag in /etc/workflow/env.
            sudo sed -i "s|^WORKFLOW_IMAGE=.*|WORKFLOW_IMAGE=${NEW_IMAGE}|" /etc/workflow/env
            # Restore owner/perms that sed -i clobbers (see P0 RCA comment above).
            sudo chown root:workflow /etc/workflow/env
            sudo chmod 640 /etc/workflow/env
            # Assert the systemd unit's user can actually read the file.
            # Without this, a perms regression silently bricks cloudflared.
            if ! sudo -u workflow test -r /etc/workflow/env; then
              # Canonical marker — greppable from journalctl, watchdog, and
              # p0-outage-triage so auto-triage can self-repair this class
              # without an SSH shell.
              echo "ENV-UNREADABLE: deploy step left /etc/workflow/env unreadable by user workflow" >&2
              sudo ls -l /etc/workflow/env >&2
              exit 1
            fi
            # Pull + restart via the systemd unit (which runs docker
            # compose down + up with the new env).
            sudo docker pull "${NEW_IMAGE}"
            sudo systemctl restart workflow-daemon
          EOF

      # Independent of the in-deploy assertion above: re-verify after the
      # systemd restart has settled. Catches any out-of-band perm drift
      # between the sed-and-restore and the post-restart steady state.
      - name: Assert /etc/workflow/env readable by daemon user
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              'sudo -u workflow test -r /etc/workflow/env' || {
            echo "::error::ENV-UNREADABLE — /etc/workflow/env not readable by user 'workflow' after restart. cloudflared will silently fail to start."
            ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
                "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
                'sudo ls -l /etc/workflow/env' || true
            exit 1
          }

      - name: Wait for daemon health
        run: |
          # Give compose time to bring the new image up + healthcheck
          # to settle. Cold-start budget 90s.
          for i in $(seq 1 18); do
            if python scripts/mcp_public_canary.py \
                 --url "${CANARY_URL}" --timeout 10 >/dev/null 2>&1; then
              echo "canonical green after ${i} poll(s)"
              break
            fi
            sleep 5
            if [ "$i" = "18" ]; then
              echo "::error::canary still red after 90s — rolling back"
              exit 1
            fi
          done

      - name: Post-deploy canary — canonical URL only
        id: canary
        run: |
          # Since CF Access Option-1 cutover, the direct URL (mcp.tinyassets.io)
          # correctly returns 403. Only the canonical URL is a valid health signal.
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Verify CF Access gates direct URL (expects 403/401)
        id: access-gate
        run: |
          # Confirm CF Access is still protecting the direct tunnel URL.
          # 403/401 = correct. 200 = Access accidentally disabled — FAIL deploy.
          # 000/timeout = tunnel down (advisory only — not a deploy blocker).
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${DIRECT_URL}" || echo "000")
          echo "direct URL HTTP status: ${http_code}"
          if [ "${http_code}" = "200" ]; then
            echo "::error::CF Access is OPEN on ${DIRECT_URL} (returned 200). Access policy may be disabled."
            echo "::error::Fix: Cloudflare dashboard → Access → Applications → confirm tunnel policy is active."
            exit 1
          elif [ "${http_code}" = "000" ]; then
            echo "::warning::Direct URL unreachable (${DIRECT_URL}) — tunnel may be down. Daemon is still live via canonical."
          else
            echo "Access gate confirmed: ${DIRECT_URL} → HTTP ${http_code} (expected 403/401)"
          fi

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          echo "::warning::Rolling back to ${{ steps.prev.outputs.previous }}"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" <<EOF
            set -e
            sudo sed -i "s|^WORKFLOW_IMAGE=.*|WORKFLOW_IMAGE=${{ steps.prev.outputs.previous }}|" /etc/workflow/env
            # Restore owner/perms that sed -i clobbers (see P0 RCA comment above).
            sudo chown root:workflow /etc/workflow/env
            sudo chmod 640 /etc/workflow/env
            if ! sudo -u workflow test -r /etc/workflow/env; then
              # Canonical marker — greppable from journalctl + p0-outage-triage.
              echo "ENV-UNREADABLE: rollback step left /etc/workflow/env unreadable by user workflow" >&2
              sudo ls -l /etc/workflow/env >&2
              exit 1
            fi
            sudo docker pull "${{ steps.prev.outputs.previous }}" || true
            sudo systemctl restart workflow-daemon
          EOF
          # Confirm rollback restored green.
          sleep 30
          python scripts/mcp_public_canary.py --url "${CANARY_URL}" --verbose

      - name: Open deploy-failed issue
        if: failure()
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.tag.outputs.tag }}
          PREV_IMAGE: ${{ steps.prev.outputs.previous }}
        with:
          script: |
            const label = "deploy-failed";
            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'fbca04',
                  description: 'CI deploy to DO Droplet failed; auto-rollback attempted.',
                });
              } else {
                throw e;
              }
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${process.env.NEW_TAG} @ ${new Date().toISOString()}`,
              labels: [label],
              body: [
                `Auto-opened by the deploy-prod workflow.`,
                ``,
                `- Attempted: \`${process.env.NEW_TAG}\``,
                `- Rolled back to: \`${process.env.PREV_IMAGE}\``,
                `- Run: ${runUrl}`,
                ``,
                `Check the run logs for the failing step (build, deploy, canary, or rollback).`,
                `If rollback canary is also red, the daemon is down — investigate urgently.`,
              ].join('\n'),
            });

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- **Target image:** \`${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}\`"
            echo "- **Previous image:** \`${{ steps.prev.outputs.previous }}\`"
            echo "- **Deploy step:** \`${{ steps.deploy.outcome }}\`"
            echo "- **Canary step:** \`${{ steps.canary.outcome }}\`"
            echo "- **Access gate step:** \`${{ steps.access-gate.outcome }}\`"
            echo "- **Overall:** \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
