name: Auto-fix change

# Reference free-claimant for the community daemon-request loop.
#
# Flow:
#   wiki request artifact -> wiki-bug-sync creates a `daemon-request` GH Issue
#   (`auto-bug` remains a compatibility label for BUG pages)
#   -> this workflow discovers pending issues
#   -> an automated writer attempts a change, or the issue is marked
#      `needs-human`.
#
# Why this has a backfill path:
#   wiki-bug-sync intentionally uses GITHUB_TOKEN. GitHub suppresses most
#   follow-on workflow runs caused by GITHUB_TOKEN events, so an issue label
#   created by wiki-bug-sync cannot be the only trigger for auto-fix.
#
# Auth priority for this reference writer:
#   1. CLAUDE_CODE_OAUTH_TOKEN (preferred Claude-family writer)
#   2. OPENAI_API_KEY          (Codex-family fallback via codex CLI)
#   3. ANTHROPIC_API_KEY       (Claude-family fallback when Codex absent)
#   4. None visible            -> graceful-skip: add `needs-human` label +
#                                comment explaining which writer auth is missing;
#                                exit 0.
#
# Acceptance policy for machine-authored code changes:
#   writer:claude requires checker:codex.
#   writer:codex requires checker:claude.
#
# Disable toggle: set repo variable AUTO_FIX_DISABLED=true (Settings ->
# Variables -> Actions -> New repository variable). Flip to false to re-enable.
# Variable-based toggle preserves the secrets; no data loss.
#
# Branch naming: auto-change/issue-<N>
# PR title/body are requested in the prompt because claude-code-action@v1 no
# longer accepts the v0 `pr_title` / `pr_body` inputs.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional single issue number to process. Empty backfills pending daemon requests.
        required: false
        type: string
  workflow_run:
    workflows: ["Wiki bug sync"]
    types: [completed]
  schedule:
    - cron: "7,22,37,52 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/auto-fix-bug.yml"

permissions:
  contents: write        # create branch + push commits
  issues: write          # add labels + comments
  pull-requests: write   # open PRs

jobs:
  discover:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Discover pending daemon requests
        id: discover
        uses: actions/github-script@v7
        env:
          HAS_WRITER_AUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.OPENAI_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '' }}
          AUTO_FIX_DISABLED: ${{ vars.AUTO_FIX_DISABLED }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxIssues = 3;
            const autoLabels = ['daemon-request', 'auto-change', 'auto-bug'];
            const hasWriterAuth = process.env.HAS_WRITER_AUTH === 'true';
            const autoFixDisabled = process.env.AUTO_FIX_DISABLED === 'true';

            function hasLabel(issue, name) {
              return (issue.labels || []).some((label) => label.name === name);
            }

            function issueRow(issue) {
              return {
                issue_number: issue.number,
                title: issue.title,
                body: issue.body || '',
                labels: (issue.labels || []).map((label) => label.name || label),
              };
            }

            async function issueFromNumber(issueNumber) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: Number(issueNumber),
              });
              return issue.pull_request ? null : issue;
            }

            const rows = [];
            const seenIssueNumbers = new Set();

            function pushIfPending(issue, options = {}) {
              if (!issue || issue.pull_request || seenIssueNumbers.has(issue.number)) {
                return;
              }
              const needsHuman = hasLabel(issue, 'needs-human');
              const attempted = hasLabel(issue, 'auto-fix-attempted');
              if (attempted && !options.retryAttempted) {
                return;
              }
              if (attempted) {
                core.info(`Retrying previously attempted issue #${issue.number} by explicit trigger.`);
              }
              if (needsHuman && (autoFixDisabled || !hasWriterAuth)) {
                return;
              }
              if (needsHuman) {
                core.info(
                  `Retrying needs-human issue #${issue.number} because writer auth is now visible.`
                );
              }
              rows.push(issueRow(issue));
              seenIssueNumbers.add(issue.number);
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              const label = context.payload.label;
              if (
                autoLabels.includes(label?.name) &&
                !issue.pull_request
              ) {
                pushIfPending(issue, { retryAttempted: true });
              }
            } else if (context.eventName === 'workflow_dispatch' && core.getInput('issue_number')) {
              const issue = await issueFromNumber(core.getInput('issue_number'));
              if (issue) {
                pushIfPending(issue, { retryAttempted: true });
              }
            } else {
              for (const labelName of autoLabels) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner,
                  repo,
                  state: 'open',
                  labels: labelName,
                  per_page: 100,
                });
                for (const issue of issues) {
                  pushIfPending(issue);
                  if (rows.length >= maxIssues) {
                    break;
                  }
                }
                if (rows.length >= maxIssues) {
                  break;
                }
              }
            }

            core.info(`Discovered ${rows.length} pending daemon request issue(s).`);
            core.setOutput('matrix', JSON.stringify(rows));

  fix:
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.matrix) }}

    concurrency:
      # One fix attempt per issue at a time.
      group: auto-fix-${{ matrix.issue.issue_number }}
      cancel-in-progress: false

    steps:
      - name: Ensure automation labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              {
                name: 'daemon-request',
                color: '0052cc',
                description: 'Public work order claimable by daemon hosts.',
              },
              {
                name: 'payment:free-ok',
                color: 'bfdadc',
                description: 'Request may be handled by a volunteer daemon without paid bounty.',
              },
              {
                name: 'writer-pool:claude-codex',
                color: '1d76db',
                description: 'Automated code-change writers must be Claude or Codex family.',
              },
              {
                name: 'checker:cross-family',
                color: 'b60205',
                description: 'Machine code changes require an opposite-family checker.',
              },
              {
                name: 'gate-required',
                color: 'fbca04',
                description: 'Branch/gate/bounty requirements are part of the request contract.',
              },
              {
                name: 'needs-human',
                color: 'ededed',
                description: 'Automation could not complete; human follow-up required.',
              },
              {
                name: 'auto-fix-auth-missing',
                color: 'cfd3d7',
                description: 'Automated writer auth was missing when the request was last checked.',
              },
              {
                name: 'auto-fix-attempted',
                color: 'fbca04',
                description: 'Automated fix workflow already attempted this issue.',
              },
              {
                name: 'writer:claude',
                color: '5319e7',
                description: 'Automated PR was written by a Claude-family model.',
              },
              {
                name: 'writer:codex',
                color: '1d76db',
                description: 'Automated PR was written by a Codex/OpenAI-family model.',
              },
              {
                name: 'checker:claude',
                color: 'b60205',
                description: 'PR requires checker/reviewer from the Claude-family.',
              },
              {
                name: 'checker:codex',
                color: '0052cc',
                description: 'PR requires checker/reviewer from the Codex/OpenAI-family.',
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              }
            }

      - name: Check disable flag
        id: check-disabled
        run: |
          if [[ "${{ vars.AUTO_FIX_DISABLED }}" == "true" ]]; then
            echo "disabled=true" >> "$GITHUB_OUTPUT"
            echo "Auto-fix is disabled (AUTO_FIX_DISABLED=true). Skipping."
          else
            echo "disabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add needs-human if disabled
        if: steps.check-disabled.outputs.disabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-human', 'auto-fix-auth-missing'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix skipped** - `AUTO_FIX_DISABLED` repo variable is `true`.',
                '',
                'To re-enable: Settings -> Variables -> Actions -> set `AUTO_FIX_DISABLED=false`.',
              ].join('\n'),
            });

      - name: Detect auth
        if: steps.check-disabled.outputs.disabled == 'false'
        id: auth
        env:
          HAS_CLAUDE_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_CODEX: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_CLAUDE_API: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [[ "${HAS_CLAUDE_OAUTH}" == "true" ]]; then
            mode="claude_oauth"
            writer_family="anthropic"
            checker_family="openai"
          elif [[ "${HAS_CODEX}" == "true" ]]; then
            mode="codex"
            writer_family="openai"
            checker_family="anthropic"
          elif [[ "${HAS_CLAUDE_API}" == "true" ]]; then
            mode="claude_api"
            writer_family="anthropic"
            checker_family="openai"
          else
            mode="none"
            writer_family="none"
            checker_family="none"
          fi

          {
            echo "has_claude_oauth=${HAS_CLAUDE_OAUTH}"
            echo "has_codex=${HAS_CODEX}"
            echo "has_claude_api=${HAS_CLAUDE_API}"
            echo "mode=${mode}"
            echo "writer_family=${writer_family}"
            echo "checker_family=${checker_family}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Auto-fix writer auth"
            echo ""
            echo "| Secret presence | Visible to GitHub Actions |"
            echo "|---|---|"
            echo "| CLAUDE_CODE_OAUTH_TOKEN | ${HAS_CLAUDE_OAUTH} |"
            echo "| OPENAI_API_KEY | ${HAS_CODEX} |"
            echo "| ANTHROPIC_API_KEY | ${HAS_CLAUDE_API} |"
            echo ""
            echo "- selected writer mode: \`${mode}\`"
            echo "- required checker family: \`${checker_family}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Graceful-skip if no auth
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-human'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix skipped** - no automated writer auth configured.',
                '',
                'GitHub Actions could not see any approved community-loop writer secret.',
                '',
                'Approved writer secrets:',
                '- `CLAUDE_CODE_OAUTH_TOKEN` *(preferred Claude-family writer)* - from https://claude.ai/settings',
                '- `OPENAI_API_KEY` *(Codex-family fallback)* - from https://platform.openai.com',
                '- `ANTHROPIC_API_KEY` *(Claude-family fallback)* - from https://console.anthropic.com',
                '',
                'Settings -> Secrets and variables -> Actions -> New repository secret.',
                '',
                'Once a secret is added, the scheduled backfill can retry this issue automatically.',
              ].join('\n'),
            });

      - name: Clear auth-missing block when auth is visible
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            for (const label of ['needs-human', 'auto-fix-auth-missing']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

      - name: Checkout
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract request metadata
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const issue = ${{ toJson(matrix.issue) }};
            const title = issue.title;
            const body = issue.body || '';

            function labelName(label) {
              return typeof label === 'string' ? label : label.name;
            }

            const labels = (issue.labels || []).map(labelName);
            const requestKindLabel = labels.find((name) => name?.startsWith('request:'));
            const requestKind = requestKindLabel ? requestKindLabel.replace('request:', '') : 'change';

            // Pull request id from titles like "[BUG-003] ..." or "[WIKI-FEATURE] ...".
            const bugMatch = title.match(/\[?(BUG-\d+)\]?/i);
            const wikiMatch = title.match(/\[?(WIKI-[A-Z-]+)\]?/i);
            const requestId = bugMatch
              ? bugMatch[1].toUpperCase()
              : wikiMatch
                ? wikiMatch[1].toUpperCase()
                : `ISSUE-${String(issue.issue_number).padStart(3, '0')}`;

            // Short title = everything after the bracketed request prefix, trimmed.
            const shortTitle = title.replace(/^\[?(BUG-\d+|WIKI-[A-Z-]+)\]?\s*/i, '').trim() || title;

            core.setOutput('issue_number', String(issue.issue_number));
            core.setOutput('request_id', requestId);
            core.setOutput('request_kind', requestKind);
            core.setOutput('short_title', shortTitle);
            core.setOutput('pr_title', `[auto-change] ${requestId}: ${shortTitle}`);
            core.setOutput('issue_body', body);

      - name: Mark auto-fix attempted
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ matrix.issue.issue_number }}'),
              labels: ['auto-fix-attempted'],
            });

      - name: Run Claude Code action (OAuth)
        id: claude-oauth
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'claude_oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: main
          branch_prefix: auto-change/
          branch_name_template: issue-${{ steps.meta.outputs.issue_number }}
          prompt: |
            You are handling a community change request in the Workflow repository.

            Request ID: ${{ steps.meta.outputs.request_id }}
            Request kind: ${{ steps.meta.outputs.request_kind }}
            Issue #${{ steps.meta.outputs.issue_number }}: ${{ steps.meta.outputs.short_title }}

            Issue body:
            ${{ steps.meta.outputs.issue_body }}

            Instructions:
            1. Read AGENTS.md and STATUS.md for project context.
            2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
            3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
            4. Implement a minimal, targeted change; no refactoring beyond what's needed.
            5. Add or update tests/docs/checks appropriate to the risk.
            6. Run `python -m ruff check` on touched files and fix any violations.
            7. If you make changes, open a pull request titled:
               ${{ steps.meta.outputs.pr_title }}
            8. The PR body must start with:
               Fixes #${{ steps.meta.outputs.issue_number }}
            9. Include `Writer family: Claude` and `Required checker family: Codex`.
            10. Include a short fix summary, tests run, and any remaining risks.
            11. Do not redesign community-authored branches unless the issue explicitly asks for that.

            If you cannot find a safe targeted change or are not confident, leave a
            comment in the code and exit gracefully. Do not guess.

      - name: Run Claude Code action (API key)
        id: claude-api
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          (
            steps.auth.outputs.mode == 'claude_api' ||
            (
              steps.auth.outputs.mode == 'claude_oauth' &&
              steps.claude-oauth.outcome == 'failure' &&
              steps.auth.outputs.has_codex != 'true' &&
              steps.auth.outputs.has_claude_api == 'true'
            )
          )
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          base_branch: main
          branch_prefix: auto-change/
          branch_name_template: issue-${{ steps.meta.outputs.issue_number }}
          prompt: |
            You are handling a community change request in the Workflow repository.

            Request ID: ${{ steps.meta.outputs.request_id }}
            Request kind: ${{ steps.meta.outputs.request_kind }}
            Issue #${{ steps.meta.outputs.issue_number }}: ${{ steps.meta.outputs.short_title }}

            Issue body:
            ${{ steps.meta.outputs.issue_body }}

            Instructions:
            1. Read AGENTS.md and STATUS.md for project context.
            2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
            3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
            4. Implement a minimal, targeted change; no refactoring beyond what's needed.
            5. Add or update tests/docs/checks appropriate to the risk.
            6. Run `python -m ruff check` on touched files and fix any violations.
            7. If you make changes, open a pull request titled:
               ${{ steps.meta.outputs.pr_title }}
            8. The PR body must start with:
               Fixes #${{ steps.meta.outputs.issue_number }}
            9. Include `Writer family: Claude` and `Required checker family: Codex`.
            10. Include a short fix summary, tests run, and any remaining risks.
            11. Do not redesign community-authored branches unless the issue explicitly asks for that.

            If you cannot find a safe targeted change or are not confident, leave a
            comment in the code and exit gracefully. Do not guess.

      - name: Find Claude PR and label checker policy
        id: claude-pr
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const branch = `auto-change/issue-${issueNumber}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            const pr = prs[0] || null;
            core.setOutput('found', pr ? 'true' : 'false');
            core.setOutput('number', pr ? String(pr.number) : '');
            if (!pr) {
              core.info(`No Claude-created PR found for ${branch}.`);
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['writer:claude', 'checker:codex'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '**Loop review policy**',
                '',
                '- Writer family: Claude',
                '- Required checker family: Codex',
                '',
                'Do not accept this PR with a same-family checker.',
              ].join('\n'),
            });

      - name: Set up Node for Codex
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.has_codex == 'true' &&
          (
            steps.auth.outputs.mode == 'codex' ||
            steps.claude-pr.outputs.found != 'true'
          )
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.has_codex == 'true' &&
          (
            steps.auth.outputs.mode == 'codex' ||
            steps.claude-pr.outputs.found != 'true'
          )
        run: |
          mkdir -p "${RUNNER_TEMP}/codex-install"
          npm install --prefix "${RUNNER_TEMP}/codex-install" @openai/codex
          echo "${RUNNER_TEMP}/codex-install/node_modules/.bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/codex-install/node_modules/.bin/codex" --version
          "${RUNNER_TEMP}/codex-install/node_modules/.bin/codex" exec --help | grep -F -- "--full-auto"

      - name: Run Codex CLI writer
        id: codex-write
        continue-on-error: true
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.has_codex == 'true' &&
          (
            steps.auth.outputs.mode == 'codex' ||
            steps.claude-pr.outputs.found != 'true'
          )
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_JSON: ${{ toJson(matrix.issue) }}
          REQUEST_ID: ${{ steps.meta.outputs.request_id }}
          REQUEST_KIND: ${{ steps.meta.outputs.request_kind }}
          SHORT_TITLE: ${{ steps.meta.outputs.short_title }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
        run: |
          set -euo pipefail
          printf '%s' "${OPENAI_API_KEY}" | codex login --with-api-key
          unset OPENAI_API_KEY

          branch="auto-change/issue-${ISSUE_NUMBER}"
          git switch -c "${branch}"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          issue = json.loads(os.environ["ISSUE_JSON"])
          issue_body = issue.get("body") or ""
          prompt = f"""You are handling a community change request in the Workflow repository.

          Request ID: {os.environ["REQUEST_ID"]}
          Request kind: {os.environ["REQUEST_KIND"]}
          Issue #{os.environ["ISSUE_NUMBER"]}: {os.environ["SHORT_TITLE"]}

          Issue body:
          {issue_body}

          Instructions:
          1. Read AGENTS.md and STATUS.md for project context.
          2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
          3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
          4. Implement a minimal, targeted change; no refactoring beyond what's needed.
          5. Add or update tests/docs/checks appropriate to the risk.
          6. Run focused checks appropriate to touched files. Run `python -m ruff check` on touched Python files.
          7. Do not commit, push, open a PR, or modify GitHub labels. The workflow will do that after you finish.
          8. Do not redesign community-authored branches unless the issue explicitly asks for that.
          9. If you cannot find a safe targeted change or are not confident, leave the worktree unchanged and explain why in your final message.

          Writer family: Codex
          Required checker family: Claude
          """
          path = Path(os.environ["RUNNER_TEMP"]) / "codex-auto-fix-prompt.md"
          path.write_text(prompt, encoding="utf-8")
          print(path)
          PY

          codex exec --full-auto --sandbox workspace-write --skip-git-repo-check -C "${GITHUB_WORKSPACE}" < "${RUNNER_TEMP}/codex-auto-fix-prompt.md"

          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Codex completed without worktree changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Codex PR
        id: codex-pr
        if: >
          steps.codex-write.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          REQUEST_ID: ${{ steps.meta.outputs.request_id }}
          REQUEST_KIND: ${{ steps.meta.outputs.request_kind }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
        run: |
          set -euo pipefail
          branch="auto-change/issue-${ISSUE_NUMBER}"
          git config user.name "workflow-auto-fix[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto-change: ${REQUEST_ID} from issue #${ISSUE_NUMBER}"
          git push --set-upstream origin "${branch}"

          body_file="${RUNNER_TEMP}/codex-pr-body.md"
          {
            echo "Fixes #${ISSUE_NUMBER}"
            echo ""
            echo "Writer family: Codex"
            echo "Required checker family: Claude"
            echo ""
            echo "Request kind: ${REQUEST_KIND}"
            echo "Request ID: ${REQUEST_ID}"
            echo ""
            echo "This PR was generated by the community-loop Codex writer path."
            echo "Do not accept it with a same-family checker."
          } > "${body_file}"

          pr_url=$(gh pr create \
            --base main \
            --head "${branch}" \
            --title "${PR_TITLE}" \
            --body-file "${body_file}" \
            --label "auto-change" \
            --label "writer:codex" \
            --label "checker:claude")
          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Mark needs-human if no PR opened
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const branch = `auto-change/issue-${issueNumber}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            if (prs.length) {
              core.info(`Auto-fix PR exists: #${prs[0].number}`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-human'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix failed** - approved writer auth was present, but no automated PR was opened.',
                '',
                `Detected auth mode: \`${{ steps.auth.outputs.mode }}\``,
                `Claude OAuth present: \`${{ steps.auth.outputs.has_claude_oauth }}\``,
                `Codex/OpenAI present: \`${{ steps.auth.outputs.has_codex }}\``,
                `Claude API present: \`${{ steps.auth.outputs.has_claude_api }}\``,
                '',
                `Claude OAuth outcome: \`${{ steps.claude-oauth.outcome }}\``,
                `Claude API outcome: \`${{ steps.claude-api.outcome }}\``,
                `Codex writer outcome: \`${{ steps.codex-write.outcome }}\``,
                '',
                'The issue is marked `needs-human` so it does not loop silently.',
              ].join('\n'),
            });
            core.setFailed('approved writer auth was present, but no auto-fix PR was opened');
