name: Auto-fix change

# Reference free-claimant for the community daemon-request loop.
#
# Flow:
#   wiki request artifact -> wiki-bug-sync creates a `daemon-request` GH Issue
#   (`auto-bug` remains a compatibility label for BUG pages)
#   -> this workflow discovers pending issues
#   -> an automated writer attempts a change, or the issue is marked
#      `needs-human`.
#
# Why this has a backfill path:
#   wiki-bug-sync intentionally uses GITHUB_TOKEN. GitHub suppresses most
#   follow-on workflow runs caused by GITHUB_TOKEN events, so an issue label
#   created by wiki-bug-sync cannot be the only trigger for auto-fix.
#
# Auth priority for this reference writer:
#   1. CLAUDE_CODE_OAUTH_TOKEN (primary subscription-backed Claude writer)
#   2. WORKFLOW_CODEX_AUTH_JSON_B64 (subscription-backed Codex writer)
#   3. None visible            -> graceful-skip: add `needs-human` label +
#                                comment explaining which writer auth is missing;
#                                exit 0.
#
# API-key billing lanes are intentionally not default daemon writer auth.
#
# Acceptance policy for machine-authored code changes:
#   writer:claude requires checker:codex.
#   writer:codex requires checker:claude.
#
# Disable toggle: set repo variable AUTO_FIX_DISABLED=true (Settings ->
# Variables -> Actions -> New repository variable). Flip to false to re-enable.
# Variable-based toggle preserves the secrets; no data loss.
#
# Branch naming: auto-change/issue-<N>
# PR title/body are requested in the prompt because claude-code-action@v1 no
# longer accepts the v0 `pr_title` / `pr_body` inputs.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional single issue number to process. Empty backfills pending daemon requests.
        required: false
        type: string
  workflow_run:
    workflows: ["Wiki bug sync", "Deploy prod"]
    types: [completed]
  schedule:
    - cron: "7,22,37,52 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/auto-fix-bug.yml"

permissions:
  contents: write        # create branch + push commits
  issues: write          # add labels + comments
  pull-requests: write   # open PRs

jobs:
  discover:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Discover pending daemon requests
        id: discover
        uses: actions/github-script@v7
        env:
          HAS_WRITER_AUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.WORKFLOW_CODEX_AUTH_JSON_B64 != '' }}
          AUTO_FIX_DISABLED: ${{ vars.AUTO_FIX_DISABLED }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxIssues = 1;
            const autoLabels = ['daemon-request', 'auto-change', 'auto-bug'];
            const hasWriterAuth = process.env.HAS_WRITER_AUTH === 'true';
            const autoFixDisabled = process.env.AUTO_FIX_DISABLED === 'true';

            function hasLabel(issue, name) {
              return (issue.labels || []).some((label) => label.name === name);
            }

            function issueRow(issue) {
              return {
                issue_number: issue.number,
                title: issue.title,
                body: issue.body || '',
                labels: (issue.labels || []).map((label) => label.name || label),
              };
            }

            async function issueFromNumber(issueNumber) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: Number(issueNumber),
              });
              return issue.pull_request ? null : issue;
            }

            const rows = [];
            const seenIssueNumbers = new Set();

            function pushIfPending(issue, options = {}) {
              if (!issue || issue.pull_request || seenIssueNumbers.has(issue.number)) {
                return;
              }
              const needsHuman = hasLabel(issue, 'needs-human');
              const attempted = hasLabel(issue, 'auto-fix-attempted');
              const reviewed = hasLabel(issue, 'auto-fix-reviewed');
              const retryAttempted = options.retryAttempted || (
                needsHuman && hasWriterAuth && !autoFixDisabled && !reviewed
              );
              if (attempted && !retryAttempted) {
                return;
              }
              if (attempted) {
                core.info(`Retrying previously attempted issue #${issue.number}.`);
              }
              if (needsHuman && (autoFixDisabled || !hasWriterAuth)) {
                return;
              }
              if (needsHuman) {
                core.info(
                  `Retrying needs-human issue #${issue.number} because writer auth is now visible.`
                );
              }
              rows.push(issueRow(issue));
              seenIssueNumbers.add(issue.number);
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              const label = context.payload.label;
              if (
                autoLabels.includes(label?.name) &&
                !issue.pull_request
              ) {
                pushIfPending(issue, { retryAttempted: true });
              }
            } else if (context.eventName === 'workflow_dispatch' && core.getInput('issue_number')) {
              const issue = await issueFromNumber(core.getInput('issue_number'));
              if (issue) {
                pushIfPending(issue, { retryAttempted: true });
              }
            } else {
              for (const labelName of autoLabels) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner,
                  repo,
                  state: 'open',
                  labels: labelName,
                  per_page: 100,
                });
                for (const issue of issues) {
                  pushIfPending(issue);
                  if (rows.length >= maxIssues) {
                    break;
                  }
                }
                if (rows.length >= maxIssues) {
                  break;
                }
              }
            }

            core.info(`Discovered ${rows.length} pending daemon request issue(s).`);
            core.setOutput('matrix', JSON.stringify(rows));

  fix:
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.matrix) }}

    concurrency:
      # One fix attempt per issue at a time.
      group: auto-fix-${{ matrix.issue.issue_number }}
      cancel-in-progress: false

    steps:
      - name: Ensure automation labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              {
                name: 'daemon-request',
                color: '0052cc',
                description: 'Public work order claimable by daemon hosts.',
              },
              {
                name: 'payment:free-ok',
                color: 'bfdadc',
                description: 'Request may be handled by a volunteer daemon without paid bounty.',
              },
              {
                name: 'writer-pool:claude-codex',
                color: '1d76db',
                description: 'Automated code-change writers must be Claude or Codex family.',
              },
              {
                name: 'checker:cross-family',
                color: 'b60205',
                description: 'Machine code changes require an opposite-family checker.',
              },
              {
                name: 'gate-required',
                color: 'fbca04',
                description: 'Branch/gate/bounty requirements are part of the request contract.',
              },
              {
                name: 'needs-human',
                color: 'ededed',
                description: 'Automation could not complete; human follow-up required.',
              },
              {
                name: 'auto-fix-auth-missing',
                color: 'cfd3d7',
                description: 'Automated writer auth was missing when the request was last checked.',
              },
              {
                name: 'auto-fix-provider-exhausted',
                color: 'd93f0b',
                description: 'Automated writer auth exists, but the selected provider returned quota/capacity exhaustion.',
              },
              {
                name: 'auto-fix-claude-subscription-missing',
                color: 'd93f0b',
                description: 'Preferred subscription-backed Claude Code OAuth token was not visible to GitHub Actions.',
              },
              {
                name: 'auto-fix-codex-subscription-missing',
                color: 'd93f0b',
                description: 'Subscription-backed Codex auth bundle was not visible to GitHub Actions.',
              },
              {
                name: 'auto-fix-attempted',
                color: 'fbca04',
                description: 'Automated fix workflow already attempted this issue.',
              },
              {
                name: 'auto-fix-reviewed',
                color: 'c2e0c6',
                description: 'Automated writer reached a final reviewed outcome; retry manually if needed.',
              },
              {
                name: 'auto-fix-already-fixed',
                color: '0e8a16',
                description: 'Automated writer found the request already addressed with no PR needed.',
              },
              {
                name: 'auto-fix-blocked',
                color: 'd93f0b',
                description: 'Automated writer inspected the request but found no safe autonomous patch.',
              },
              {
                name: 'auto-fix-pr-blocked',
                color: 'd93f0b',
                description: 'Automated writer pushed a branch, but GitHub blocked Actions from opening the PR.',
              },
              {
                name: 'writer:claude',
                color: '5319e7',
                description: 'Automated PR was written by a Claude-family model.',
              },
              {
                name: 'writer:codex',
                color: '1d76db',
                description: 'Automated PR was written by a Codex/OpenAI-family model.',
              },
              {
                name: 'checker:claude',
                color: 'b60205',
                description: 'PR requires checker/reviewer from the Claude-family.',
              },
              {
                name: 'checker:codex',
                color: '0052cc',
                description: 'PR requires checker/reviewer from the Codex/OpenAI-family.',
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              }
            }

      - name: Check disable flag
        id: check-disabled
        run: |
          if [[ "${{ vars.AUTO_FIX_DISABLED }}" == "true" ]]; then
            echo "disabled=true" >> "$GITHUB_OUTPUT"
            echo "Auto-fix is disabled (AUTO_FIX_DISABLED=true). Skipping."
          else
            echo "disabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add needs-human if disabled
        if: steps.check-disabled.outputs.disabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-human', 'auto-fix-auth-missing'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix skipped** - `AUTO_FIX_DISABLED` repo variable is `true`.',
                '',
                'To re-enable: Settings -> Variables -> Actions -> set `AUTO_FIX_DISABLED=false`.',
              ].join('\n'),
            });

      - name: Detect auth
        if: steps.check-disabled.outputs.disabled == 'false'
        id: auth
        env:
          HAS_CLAUDE_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_CODEX_AUTH_BUNDLE: ${{ secrets.WORKFLOW_CODEX_AUTH_JSON_B64 != '' }}
          HAS_OPENAI_API_KEY_CONFIGURED: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_ANTHROPIC_API_KEY_CONFIGURED: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [[ "${HAS_CLAUDE_OAUTH}" == "true" ]]; then
            mode="claude_oauth"
            writer_family="anthropic"
            checker_family="openai"
          elif [[ "${HAS_CODEX_AUTH_BUNDLE}" == "true" ]]; then
            mode="codex_subscription"
            writer_family="openai"
            checker_family="anthropic"
          else
            mode="none"
            writer_family="none"
            checker_family="none"
          fi

          {
            echo "has_claude_oauth=${HAS_CLAUDE_OAUTH}"
            echo "has_codex=${HAS_CODEX_AUTH_BUNDLE}"
            echo "has_claude_api=false"
            echo "has_openai_api_key_configured=${HAS_OPENAI_API_KEY_CONFIGURED}"
            echo "has_anthropic_api_key_configured=${HAS_ANTHROPIC_API_KEY_CONFIGURED}"
            echo "mode=${mode}"
            echo "writer_family=${writer_family}"
            echo "checker_family=${checker_family}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Auto-fix writer auth"
            echo ""
            echo "| Subscription daemon auth | Visible to GitHub Actions |"
            echo "|---|---|"
            echo "| CLAUDE_CODE_OAUTH_TOKEN | ${HAS_CLAUDE_OAUTH} |"
            echo "| WORKFLOW_CODEX_AUTH_JSON_B64 | ${HAS_CODEX_AUTH_BUNDLE} |"
            echo ""
            echo "- selected writer mode: \`${mode}\`"
            echo "- required checker family: \`${checker_family}\`"
            echo "- API-key secrets are intentionally ignored for default daemon writers."
            echo "- OPENAI_API_KEY configured: \`${HAS_OPENAI_API_KEY_CONFIGURED}\`"
            echo "- ANTHROPIC_API_KEY configured: \`${HAS_ANTHROPIC_API_KEY_CONFIGURED}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Graceful-skip if no auth
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [
                'needs-human',
                'auto-fix-auth-missing',
                'auto-fix-claude-subscription-missing',
                'auto-fix-codex-subscription-missing',
              ],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix skipped** - no automated writer auth configured.',
                '',
                'GitHub Actions could not see any approved subscription-backed community-loop writer secret.',
                '',
                'Approved subscription writer secrets:',
                '- `CLAUDE_CODE_OAUTH_TOKEN` *(primary subscription-backed Claude writer)* - from https://claude.ai/settings',
                '- `WORKFLOW_CODEX_AUTH_JSON_B64` *(subscription-backed Codex writer)* - base64 of subscription `~/.codex/auth.json`',
                '',
                '`OPENAI_API_KEY` and `ANTHROPIC_API_KEY` are intentionally ignored for default daemon writers under the subscription-only policy.',
                '',
                'Settings -> Secrets and variables -> Actions -> New repository secret.',
                '',
                'Once a secret is added, the scheduled backfill can retry this issue automatically.',
              ].join('\n'),
            });

      - name: Clear auth-missing block when auth is visible
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const labelsToClear = ['needs-human', 'auto-fix-auth-missing', 'auto-fix-provider-exhausted'];
            if ('${{ steps.auth.outputs.has_claude_oauth }}' === 'true') {
              labelsToClear.push('auto-fix-claude-subscription-missing');
            }
            if ('${{ steps.auth.outputs.has_codex }}' === 'true') {
              labelsToClear.push('auto-fix-codex-subscription-missing');
            }
            for (const label of labelsToClear) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

      - name: Checkout
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract request metadata
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const issue = ${{ toJson(matrix.issue) }};
            const title = issue.title;
            const body = issue.body || '';

            function labelName(label) {
              return typeof label === 'string' ? label : label.name;
            }

            const labels = (issue.labels || []).map(labelName);
            const requestKindLabel = labels.find((name) => name?.startsWith('request:'));
            const requestKind = requestKindLabel ? requestKindLabel.replace('request:', '') : 'change';

            // Pull request id from titles like "[BUG-003] ..." or "[WIKI-FEATURE] ...".
            const bugMatch = title.match(/\[?(BUG-\d+)\]?/i);
            const wikiMatch = title.match(/\[?(WIKI-[A-Z-]+)\]?/i);
            const requestId = bugMatch
              ? bugMatch[1].toUpperCase()
              : wikiMatch
                ? wikiMatch[1].toUpperCase()
                : `ISSUE-${String(issue.issue_number).padStart(3, '0')}`;

            // Short title = everything after the bracketed request prefix, trimmed.
            const shortTitle = title.replace(/^\[?(BUG-\d+|WIKI-[A-Z-]+)\]?\s*/i, '').trim() || title;

            core.setOutput('issue_number', String(issue.issue_number));
            core.setOutput('request_id', requestId);
            core.setOutput('request_kind', requestKind);
            core.setOutput('short_title', shortTitle);
            core.setOutput('pr_title', `[auto-change] ${requestId}: ${shortTitle}`);
            core.setOutput('issue_body', body);

      - name: Mark auto-fix attempted
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ matrix.issue.issue_number }}'),
              labels: ['auto-fix-attempted'],
            });

      - name: Run Claude Code action (OAuth)
        id: claude-oauth
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'claude_oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: main
          branch_prefix: auto-change/
          branch_name_template: issue-${{ steps.meta.outputs.issue_number }}
          prompt: |
            You are handling a community change request in the Workflow repository.

            Request ID: ${{ steps.meta.outputs.request_id }}
            Request kind: ${{ steps.meta.outputs.request_kind }}
            Issue #${{ steps.meta.outputs.issue_number }}: ${{ steps.meta.outputs.short_title }}

            Issue body:
            ${{ steps.meta.outputs.issue_body }}

            Instructions:
            1. Read AGENTS.md and STATUS.md for project context.
            2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
            3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
            4. Implement a minimal, targeted change; no refactoring beyond what's needed.
            5. Add or update tests/docs/checks appropriate to the risk.
            6. Run `python -m ruff check` on touched files and fix any violations.
            7. If you edit canonical `workflow/*` runtime files, run `python packaging/claude-plugin/build_plugin.py` and commit the plugin mirror changes.
            8. If you make changes, open a pull request titled:
               ${{ steps.meta.outputs.pr_title }}
            9. The PR body must start with:
               Fixes #${{ steps.meta.outputs.issue_number }}
            10. Include `Writer family: Claude` and `Required checker family: Codex`.
            11. Include a short fix summary, tests run, and any remaining risks.
            12. Do not redesign community-authored branches unless the issue explicitly asks for that.

            If you cannot find a safe targeted change or are not confident, leave a
            comment in the code and exit gracefully. Do not guess.

      - name: Run Codex CLI (subscription)
        id: codex-subscription
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription'
        env:
          WORKFLOW_CODEX_AUTH_JSON_B64: ${{ secrets.WORKFLOW_CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          branch="auto-change/issue-${{ steps.meta.outputs.issue_number }}-codex-${GITHUB_RUN_ID}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

          mkdir -p "$HOME/.codex"
          printf '%s' "${WORKFLOW_CODEX_AUTH_JSON_B64}" | base64 -d > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          unset WORKFLOW_CODEX_AUTH_JSON_B64
          unset OPENAI_API_KEY ANTHROPIC_API_KEY ANTHROPIC_BASE_URL GEMINI_API_KEY GROQ_API_KEY XAI_API_KEY

          npm install -g @openai/codex
          git checkout -B "$branch"

          codex exec --dangerously-bypass-approvals-and-sandbox --skip-git-repo-check --cd "$GITHUB_WORKSPACE" --output-last-message "$RUNNER_TEMP/codex-last-message.md" - <<'PROMPT'
          You are handling a community change request in the Workflow repository.

          Request ID: ${{ steps.meta.outputs.request_id }}
          Request kind: ${{ steps.meta.outputs.request_kind }}
          Issue #${{ steps.meta.outputs.issue_number }}: ${{ steps.meta.outputs.short_title }}

          Issue body:
          ${{ steps.meta.outputs.issue_body }}

          Instructions:
          1. Read AGENTS.md and STATUS.md for project context.
          2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
          3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
          4. Implement a minimal, targeted change; no refactoring beyond what's needed.
          5. Add or update tests/docs/checks appropriate to the risk.
          6. Run `python -m ruff check` on touched files and fix any violations.
          7. If you edit canonical `workflow/*` runtime files, run `python packaging/claude-plugin/build_plugin.py` and leave the plugin mirror changes in the working tree.
          8. Do not commit, push, or open a PR. Leave any changes in the working tree for this workflow to commit.
          9. Do not redesign community-authored branches unless the issue explicitly asks for that.

          If you cannot find a safe targeted change or are not confident, leave the
          working tree unchanged and explain why in your final message. Do not guess.
          PROMPT

          if [ -z "$(git status --porcelain)" ]; then
            reason="blocked"
            message_file="$RUNNER_TEMP/codex-last-message.md"
            if [ -s "$message_file" ]; then
              message_lower="$(tr '[:upper:]' '[:lower:]' < "$message_file")"
              if printf '%s' "$message_lower" | grep -Eq 'already (fixed|implemented|covered|contains|addressed|present)|current checkout already|repository already|stale bug report|no repository change was needed'; then
                reason="already_fixed"
              fi
            fi
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no_change_reason=${reason}" >> "$GITHUB_OUTPUT"
            _delim="EOF_$(tr -d '-' < /proc/sys/kernel/random/uuid)"
            {
              echo "last_message<<${_delim}"
              if [ -s "$message_file" ]; then
                head -c 4000 "$message_file"
              else
                echo "(Codex left no final message.)"
              fi
              echo
              echo "${_delim}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git status --short
          git config user.name "workflow-daemon[bot]"
          git config user.email "workflow-daemon[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ steps.meta.outputs.pr_title }}" \
            -m "Fixes #${{ steps.meta.outputs.issue_number }}" \
            -m "Writer family: Codex" \
            -m "Required checker family: Claude"
          git push --set-upstream origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "no_change_reason=" >> "$GITHUB_OUTPUT"

      - name: Create Codex PR
        id: codex-pr-create
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription' &&
          steps.codex-subscription.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          CODEX_BRANCH: ${{ steps.codex-subscription.outputs.branch }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
        with:
          script: |
            const branch = process.env.CODEX_BRANCH;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            let pr = existing[0] || null;
            if (!pr) {
              try {
                pr = (await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: process.env.PR_TITLE,
                  head: branch,
                  base: 'main',
                  body: [
                    `Fixes #${issueNumber}`,
                    '',
                    'Writer family: Codex',
                    'Required checker family: Claude',
                    '',
                    'Automated community-loop change produced by the subscription-backed Codex lane.',
                  ].join('\n'),
                })).data;
              } catch (error) {
                const message = String(error?.message || error);
                if (
                  error?.status === 403 &&
                  message.includes('not permitted to create or approve pull requests')
                ) {
                  core.setOutput('blocked', 'true');
                  core.setOutput('block_reason', 'github_actions_pr_creation_disabled');
                  core.warning(
                    'Codex pushed a branch, but GitHub repository policy blocked Actions from opening the PR.'
                  );
                  return;
                }
                throw error;
              }
            }
            core.setOutput('blocked', 'false');
            core.setOutput('block_reason', '');
            core.setOutput('number', String(pr.number));
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['writer:codex', 'checker:claude'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '**Loop review policy**',
                '',
                '- Writer family: Codex',
                '- Required checker family: Claude',
                '',
                'Do not accept this PR with a same-family checker.',
              ].join('\n'),
            });

      - name: Close already-fixed issue when no repo change is needed
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription' &&
          steps.codex-subscription.outputs.changed == 'false' &&
          steps.codex-subscription.outputs.no_change_reason == 'already_fixed'
        uses: actions/github-script@v7
        env:
          CODEX_LAST_MESSAGE: ${{ steps.codex-subscription.outputs.last_message }}
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const labelsToClear = [
              'needs-human',
              'auto-fix-auth-missing',
              'auto-fix-provider-exhausted',
              'auto-fix-claude-subscription-missing',
              'auto-fix-codex-subscription-missing',
            ];
            for (const label of labelsToClear) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['auto-fix-reviewed', 'auto-fix-already-fixed'],
            });
            const finalMessage = (process.env.CODEX_LAST_MESSAGE || '(Codex left no final message.)')
              .slice(0, 3500);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix closed as already fixed** - the subscription-backed Codex writer inspected the request and found no repository change was needed.',
                '',
                'Codex final message:',
                '```text',
                finalMessage,
                '```',
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Find Claude PR and label checker policy
        id: claude-pr
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'claude_oauth'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const mode = '${{ steps.auth.outputs.mode }}';
            const branch = mode === 'codex_subscription'
              ? '${{ steps.codex-subscription.outputs.branch }}'
              : `auto-change/issue-${issueNumber}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            const pr = prs[0] || null;
            core.setOutput('found', pr ? 'true' : 'false');
            core.setOutput('number', pr ? String(pr.number) : '');
            if (!pr) {
              core.info(`No Claude-created PR found for ${branch}.`);
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['writer:claude', 'checker:codex'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '**Loop review policy**',
                '',
                '- Writer family: Claude',
                '- Required checker family: Codex',
                '',
                'Do not accept this PR with a same-family checker.',
              ].join('\n'),
            });

      - name: Mark needs-human if no PR opened
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none' &&
          steps.codex-subscription.outputs.no_change_reason != 'already_fixed'
        uses: actions/github-script@v7
        env:
          CODEX_BRANCH: ${{ steps.codex-subscription.outputs.branch }}
          CODEX_NO_CHANGE_REASON: ${{ steps.codex-subscription.outputs.no_change_reason }}
          CODEX_LAST_MESSAGE: ${{ steps.codex-subscription.outputs.last_message }}
          CODEX_PR_BLOCKED: ${{ steps.codex-pr-create.outputs.blocked }}
          CODEX_PR_BLOCK_REASON: ${{ steps.codex-pr-create.outputs.block_reason }}
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const mode = '${{ steps.auth.outputs.mode }}';
            const codexBranch = process.env.CODEX_BRANCH || '';
            const branch = mode === 'codex_subscription' && codexBranch
              ? codexBranch
              : `auto-change/issue-${issueNumber}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            if (prs.length) {
              core.info(`Auto-fix PR exists: #${prs[0].number}`);
              return;
            }

            const claudeSubscriptionVisible = '${{ steps.auth.outputs.has_claude_oauth }}' === 'true';
            const codexSubscriptionVisible = '${{ steps.auth.outputs.has_codex }}' === 'true';
            const codexNoChangeReason = process.env.CODEX_NO_CHANGE_REASON || '';
            const codexPrBlocked = process.env.CODEX_PR_BLOCKED === 'true';
            const codexPrBlockReason = process.env.CODEX_PR_BLOCK_REASON || '';
            const labels = ['needs-human'];
            if (codexNoChangeReason || codexPrBlocked) {
              labels.push('auto-fix-reviewed');
            }
            if (codexNoChangeReason) {
              labels.push('auto-fix-blocked');
            }
            if (codexPrBlocked) {
              labels.push('auto-fix-pr-blocked');
            }
            if (!claudeSubscriptionVisible && !codexSubscriptionVisible) {
              labels.push('auto-fix-claude-subscription-missing');
              labels.push('auto-fix-codex-subscription-missing');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix needs human review** - approved writer auth was present, but no automated PR was opened.',
                '',
                `Detected auth mode: \`${{ steps.auth.outputs.mode }}\``,
                `Claude OAuth present: \`${{ steps.auth.outputs.has_claude_oauth }}\``,
                `Codex subscription present: \`${{ steps.auth.outputs.has_codex }}\``,
                `OpenAI API key configured but ignored: \`${{ steps.auth.outputs.has_openai_api_key_configured }}\``,
                `Anthropic API key configured but ignored: \`${{ steps.auth.outputs.has_anthropic_api_key_configured }}\``,
                '',
                `Claude OAuth outcome: \`${{ steps.claude-oauth.outcome }}\``,
                `Codex subscription outcome: \`${{ steps.codex-subscription.outcome }}\``,
                codexNoChangeReason ? `Codex no-change reason: \`${codexNoChangeReason}\`` : '',
                codexPrBlocked
                  ? `PR creation blocked: \`${codexPrBlockReason || 'unknown'}\``
                  : '',
                codexPrBlocked && branch
                  ? `Auto-fix branch: https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${branch}`
                  : '',
                process.env.CODEX_LAST_MESSAGE
                  ? [
                      '',
                      'Codex final message:',
                      '```text',
                      process.env.CODEX_LAST_MESSAGE.slice(0, 3500),
                      '```',
                    ].join('\n')
                  : '',
                '',
                !claudeSubscriptionVisible && !codexSubscriptionVisible
                  ? 'No approved subscription-backed daemon lane was visible to GitHub Actions.'
                  : '',
                'API-key billing lanes are intentionally not used for default daemon writers.',
                'The issue is marked `needs-human` so it does not loop silently.',
              ].filter(Boolean).join('\n'),
            });
            core.warning('approved writer auth was present, but no auto-fix PR was opened');
