name: Auto-fix change

# Reference free-claimant for the community daemon-request loop.
#
# Flow:
#   wiki request artifact -> wiki-bug-sync creates a `daemon-request` GH Issue
#   (`auto-bug` remains a compatibility label for BUG pages)
#   -> this workflow discovers pending issues
#   -> an automated writer attempts a change, or the issue is marked
#      `needs-human`.
#
# Lost-work guard:
#   once an issue is labeled `auto-fix-attempted`, it must eventually gain a
#   terminal receipt: PR artifact, `auto-fix-reviewed`, or `needs-human`.
#   Attempted issues without a terminal receipt are treated as interrupted and
#   retried instead of skipped.
#
# Why this has a backfill path:
#   wiki-bug-sync intentionally uses GITHUB_TOKEN. GitHub suppresses most
#   follow-on workflow runs caused by GITHUB_TOKEN events, so an issue label
#   created by wiki-bug-sync cannot be the only trigger for auto-fix.
#
# Auth priority for this reference writer:
#   1. CLAUDE_CODE_OAUTH_TOKEN (primary subscription-backed Claude writer)
#   2. WORKFLOW_CODEX_AUTH_JSON_B64 (subscription-backed Codex writer)
#   3. None visible            -> graceful-skip: add `needs-human` label +
#                                comment explaining which writer auth is missing;
#                                exit 0.
#
# API-key billing lanes are intentionally not default daemon writer auth.
#
# Acceptance policy for machine-authored code changes:
#   writer:claude requires checker:codex.
#   writer:codex requires checker:claude.
#
# Disable toggle: set repo variable AUTO_FIX_DISABLED=true (Settings ->
# Variables -> Actions -> New repository variable). Flip to false to re-enable.
# Variable-based toggle preserves the secrets; no data loss.
#
# Branch naming:
#   mechanical filings:    auto-change/issue-<N>
#   architectural filings: design-note-draft/issue-<N>
# PR title/body are requested in the prompt because claude-code-action@v1 no
# longer accepts the v0 `pr_title` / `pr_body` inputs.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional single issue number to process. Empty backfills pending daemon requests.
        required: false
        type: string
  workflow_run:
    workflows: ["Wiki bug sync", "Deploy prod"]
    types: [completed]
  schedule:
    - cron: "7,22,37,52 * * * *"

concurrency:
  # Subscription-backed writer sessions are a shared daemon lane. Queue triggers
  # instead of overlapping writers and burning through subscription rate limits.
  group: auto-fix-subscription-writer
  cancel-in-progress: false

permissions:
  contents: write        # create branch + push commits
  issues: write          # add labels + comments
  pull-requests: write   # open PRs

jobs:
  discover:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Discover pending daemon requests
        id: discover
        uses: actions/github-script@v7
        env:
          HAS_WRITER_AUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.WORKFLOW_CODEX_AUTH_JSON_B64 != '' }}
          HAS_WORKFLOW_PUSH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN != '' }}
          AUTO_FIX_DISABLED: ${{ vars.AUTO_FIX_DISABLED }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxIssues = 1;
            const autoLabels = ['daemon-request', 'auto-change', 'auto-bug'];
            const staleGateLabel = 'auto-fix-stale-gate';
            const priorityLabelOrder = [
              'priority:loop-discipline',
              'priority:primitive-layer',
              'priority:primitive-surface',
            ];
            const skipLabels = ['await-primitive-layer', 'complete'];
            const hasWriterAuth = process.env.HAS_WRITER_AUTH === 'true';
            const hasWorkflowPushToken = process.env.HAS_WORKFLOW_PUSH_TOKEN === 'true';
            const autoFixDisabled = process.env.AUTO_FIX_DISABLED === 'true';
            const dispatchIssueNumber = (
              core.getInput('issue_number') ||
              context.payload.inputs?.issue_number ||
              ''
            ).trim();

            function hasLabel(issue, name) {
              return (issue.labels || []).some((label) => label.name === name);
            }

            function shouldSkipIssue(issue, options = {}) {
              return !options.ignoreSkip && skipLabels.some((name) => hasLabel(issue, name));
            }

            function prerequisitePrNumbers(issue) {
              const labels = (issue.labels || []).map((label) => label.name || label);
              const text = [
                issue.title || '',
                issue.body || '',
                labels.join('\n'),
              ].join('\n');
              const patterns = [
                /sequenced[-_ ]after[^\n#]{0,120}#(\d+)/gi,
                /sequenced[-_ ]after[^\n]{0,120}PR\s*#?(\d+)/gi,
                /sequenced[-_ ]after[-_: ]*pr[-_: ]*(\d+)/gi,
                /prerequisite[-_ ]pr[^\n0-9]{0,80}(\d+)/gi,
                /depends[-_ ]on[^\n#]{0,120}PR\s*#?(\d+)/gi,
                /blocked[^\n]{0,80}(?:by|on)[^\n#]{0,80}PR\s*#?(\d+)/gi,
              ];
              const numbers = new Set();
              for (const pattern of patterns) {
                for (const match of text.matchAll(pattern)) {
                  numbers.add(Number(match[1]));
                }
              }
              return [...numbers].filter((number) => Number.isInteger(number) && number > 0);
            }

            async function hasUnlandedPrerequisitePr(issue) {
              const prNumbers = prerequisitePrNumbers(issue);
              for (const prNumber of prNumbers) {
                try {
                  const { data: pull } = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: prNumber,
                  });
                  if (!pull.merged_at) {
                    core.info(
                      `Skipping issue #${issue.number} because it has an unlanded prerequisite PR #${prNumber}.`
                    );
                    return true;
                  }
                } catch (error) {
                  core.warning(
                    `Skipping issue #${issue.number} because prerequisite PR #${prNumber} could not be verified: ${error.message}`
                  );
                  return true;
                }
              }
              return false;
            }

            function issueRow(issue) {
              return {
                issue_number: issue.number,
                title: issue.title,
                body: issue.body || '',
                labels: (issue.labels || []).map((label) => label.name || label),
              };
            }

            async function issueFromNumber(issueNumber) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: Number(issueNumber),
              });
              return issue.pull_request ? null : issue;
            }

            const rows = [];
            const seenIssueNumbers = new Set();

            async function pushIfPending(issue, options = {}) {
              if (!issue || issue.pull_request || seenIssueNumbers.has(issue.number)) {
                return;
              }
              if (shouldSkipIssue(issue, options)) {
                core.info(`Skipping issue #${issue.number} because it is deferred or complete.`);
                return;
              }
              if (await hasUnlandedPrerequisitePr(issue)) {
                return;
              }
              const needsHuman = hasLabel(issue, 'needs-human');
              const attempted = hasLabel(issue, 'auto-fix-attempted');
              const reviewed = hasLabel(issue, 'auto-fix-reviewed');
              const incompleteAttempt = attempted && !reviewed && !needsHuman;
              const staleGate = hasLabel(issue, staleGateLabel);
              const retryPermissionBlocked = (
                (
                  hasLabel(issue, 'auto-fix-branch-push-blocked') ||
                  hasLabel(issue, 'auto-fix-pr-blocked')
                ) &&
                hasWriterAuth &&
                hasWorkflowPushToken &&
                !autoFixDisabled
              );
              const retryAttempted = options.retryAttempted || incompleteAttempt || (
                needsHuman && hasWriterAuth && !autoFixDisabled && !reviewed
              ) || retryPermissionBlocked || staleGate;
              if (attempted && !retryAttempted) {
                return;
              }
              if (incompleteAttempt) {
                core.info(
                  `Retrying issue #${issue.number} because auto-fix-attempted has no terminal receipt.`
                );
              }
              if (attempted) {
                core.info(`Retrying previously attempted issue #${issue.number}.`);
              }
              if (needsHuman && (autoFixDisabled || !hasWriterAuth)) {
                return;
              }
              if (needsHuman) {
                const reason = retryPermissionBlocked
                  ? 'workflow push token is now visible'
                  : 'writer auth is now visible';
                core.info(`Retrying needs-human issue #${issue.number} because ${reason}.`);
              }
              if (staleGate) {
                core.info(`Retrying stale-gate issue #${issue.number}.`);
              }
              rows.push(issueRow(issue));
              seenIssueNumbers.add(issue.number);
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              const label = context.payload.label;
              if (
                autoLabels.includes(label?.name) &&
                !issue.pull_request
              ) {
                await pushIfPending(issue, { retryAttempted: true });
              }
            } else if (context.eventName === 'workflow_dispatch' && dispatchIssueNumber) {
              core.info(`Workflow dispatch requested issue #${dispatchIssueNumber}.`);
              const issue = await issueFromNumber(dispatchIssueNumber);
              if (issue) {
                await pushIfPending(issue, { retryAttempted: true });
              }
            } else {
              if (context.eventName === 'workflow_dispatch') {
                core.info('Workflow dispatch did not include issue_number; scanning pending daemon requests.');
              }
              async function scanAutoLabels(options = {}) {
                const onlyPermissionBlocked = options.onlyPermissionBlocked || false;
                const onlyStaleGate = options.onlyStaleGate || false;
                async function scanLabelQuery(labelNames) {
                  const issues = await github.paginate(github.rest.issues.listForRepo, {
                    owner,
                    repo,
                    state: 'open',
                    labels: labelNames.join(','),
                    sort: 'created',
                    direction: 'asc',
                    per_page: 100,
                  });
                  core.info(`Scanning ${issues.length} open issue(s) for labels ${labelNames.join(',')}.`);
                  for (const issue of issues) {
                    if (
                      onlyPermissionBlocked &&
                      !hasLabel(issue, 'auto-fix-branch-push-blocked') &&
                      !hasLabel(issue, 'auto-fix-pr-blocked')
                    ) {
                      continue;
                    }
                    if (onlyStaleGate && !hasLabel(issue, staleGateLabel)) {
                      continue;
                    }
                    await pushIfPending(issue, { ignoreSkip: onlyPermissionBlocked });
                    if (rows.length >= maxIssues) {
                      return true;
                    }
                  }
                  return false;
                }

                for (const priorityLabel of priorityLabelOrder) {
                  for (const autoLabel of autoLabels) {
                    if (await scanLabelQuery([autoLabel, priorityLabel])) {
                      return;
                    }
                  }
                }
                for (const labelName of autoLabels) {
                  if (await scanLabelQuery([labelName])) {
                    return;
                  }
                }
              }

              await scanAutoLabels({ onlyStaleGate: true });
              if (rows.length >= maxIssues) {
                core.info('Prioritized stale-gate issue before normal queue discovery.');
              }
              if (rows.length < maxIssues) {
                await scanAutoLabels({ onlyPermissionBlocked: true });
              }
              if (rows.length >= maxIssues) {
                core.info('Prioritized retryable permission-blocked issue before normal queue discovery.');
              }
              if (rows.length < maxIssues) {
                await scanAutoLabels();
              }
            }

            core.info(`Discovered ${rows.length} pending daemon request issue(s).`);
            core.setOutput('matrix', JSON.stringify(rows));

  fix:
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.matrix) }}

    concurrency:
      # One fix attempt per issue at a time.
      group: auto-fix-${{ matrix.issue.issue_number }}
      cancel-in-progress: false

    steps:
      - name: Ensure automation labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              {
                name: 'daemon-request',
                color: '0052cc',
                description: 'Public work order claimable by daemon hosts.',
              },
              {
                name: 'payment:free-ok',
                color: 'bfdadc',
                description: 'Request may be handled by a volunteer daemon without paid bounty.',
              },
              {
                name: 'writer-pool:claude-codex',
                color: '1d76db',
                description: 'Automated code-change writers must be Claude or Codex family.',
              },
              {
                name: 'checker:cross-family',
                color: 'b60205',
                description: 'Machine code changes require an opposite-family checker.',
              },
              {
                name: 'gate-required',
                color: 'fbca04',
                description: 'Branch/gate/bounty requirements are part of the request contract.',
              },
              {
                name: 'needs-human',
                color: 'ededed',
                description: 'Automation could not complete; human follow-up required.',
              },
              {
                name: 'auto-fix-auth-missing',
                color: 'cfd3d7',
                description: 'Automated writer auth was missing when the request was last checked.',
              },
              {
                name: 'auto-fix-provider-exhausted',
                color: 'd93f0b',
                description: 'Automated writer auth exists, but the selected provider returned quota/capacity exhaustion.',
              },
              {
                name: 'auto-fix-writer-failed',
                color: 'd93f0b',
                description: 'Automated writer auth existed, but the selected writer failed before opening a PR.',
              },
              {
                name: 'auto-fix-claude-subscription-missing',
                color: 'd93f0b',
                description: 'Preferred subscription-backed Claude Code OAuth token was not visible to GitHub Actions.',
              },
              {
                name: 'auto-fix-codex-subscription-missing',
                color: 'd93f0b',
                description: 'Subscription-backed Codex auth bundle was not visible to GitHub Actions.',
              },
              {
                name: 'auto-fix-attempted',
                color: 'fbca04',
                description: 'Automated fix workflow already attempted this issue.',
              },
              {
                name: 'auto-fix-stale-gate',
                color: 'd93f0b',
                description: 'Attempted request has no terminal review label and is blocking the gated queue.',
              },
              {
                name: 'auto-fix-reviewed',
                color: 'c2e0c6',
                description: 'Automated writer reached a final reviewed outcome; retry manually if needed.',
              },
              {
                name: 'auto-fix-already-fixed',
                color: '0e8a16',
                description: 'Automated writer found the request already addressed with no PR needed.',
              },
              {
                name: 'auto-fix-blocked',
                color: 'd93f0b',
                description: 'Automated writer inspected the request but found no safe autonomous patch.',
              },
              {
                name: 'auto-fix-pr-blocked',
                color: 'd93f0b',
                description: 'Automated writer pushed a branch, but GitHub blocked Actions from opening the PR.',
              },
              {
                name: 'auto-fix-branch-push-blocked',
                color: 'd93f0b',
                description: 'Automated writer produced a patch, but GitHub blocked Actions from pushing the branch.',
              },
              {
                name: 'needs_source_read',
                color: 'd93f0b',
                description: 'Automated writer could not prove live MCP wiki source-read before closing or checker routing.',
              },
              {
                name: 'auto-fix-superseded',
                color: 'cfd3d7',
                description: 'Older auto-change PR was closed because a newer branch superseded it.',
              },
              {
                name: 'ready_for_checker',
                color: '0e8a16',
                description: 'Loop PR matured through source, duplicate, stale-base, and scope-split pre-checks before checker escalation.',
              },
              {
                name: 'writer:claude',
                color: '5319e7',
                description: 'Automated PR was written by a Claude-family model.',
              },
              {
                name: 'writer:codex',
                color: '1d76db',
                description: 'Automated PR was written by a Codex/OpenAI-family model.',
              },
              {
                name: 'checker:claude',
                color: 'b60205',
                description: 'PR requires checker/reviewer from the Claude-family.',
              },
              {
                name: 'checker:codex',
                color: '0052cc',
                description: 'PR requires checker/reviewer from the Codex/OpenAI-family.',
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              }
            }

      - name: Check disable flag
        id: check-disabled
        run: |
          if [[ "${{ vars.AUTO_FIX_DISABLED }}" == "true" ]]; then
            echo "disabled=true" >> "$GITHUB_OUTPUT"
            echo "Auto-fix is disabled (AUTO_FIX_DISABLED=true). Skipping."
          else
            echo "disabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add needs-human if disabled
        if: steps.check-disabled.outputs.disabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-human', 'auto-fix-auth-missing'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix skipped** - `AUTO_FIX_DISABLED` repo variable is `true`.',
                '',
                'To re-enable: Settings -> Variables -> Actions -> set `AUTO_FIX_DISABLED=false`.',
              ].join('\n'),
            });

      - name: Detect auth
        if: steps.check-disabled.outputs.disabled == 'false'
        id: auth
        env:
          HAS_CLAUDE_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_CODEX_AUTH_BUNDLE: ${{ secrets.WORKFLOW_CODEX_AUTH_JSON_B64 != '' }}
          HAS_WORKFLOW_PUSH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN != '' }}
          HAS_OPENAI_API_KEY_CONFIGURED: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_ANTHROPIC_API_KEY_CONFIGURED: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [[ "${HAS_CLAUDE_OAUTH}" == "true" ]]; then
            mode="claude_oauth"
            writer_family="anthropic"
            checker_family="openai"
          elif [[ "${HAS_CODEX_AUTH_BUNDLE}" == "true" ]]; then
            mode="codex_subscription"
            writer_family="openai"
            checker_family="anthropic"
          else
            mode="none"
            writer_family="none"
            checker_family="none"
          fi

          {
            echo "has_claude_oauth=${HAS_CLAUDE_OAUTH}"
            echo "has_codex=${HAS_CODEX_AUTH_BUNDLE}"
            echo "has_workflow_push_token=${HAS_WORKFLOW_PUSH_TOKEN}"
            echo "has_claude_api=false"
            echo "has_openai_api_key_configured=${HAS_OPENAI_API_KEY_CONFIGURED}"
            echo "has_anthropic_api_key_configured=${HAS_ANTHROPIC_API_KEY_CONFIGURED}"
            echo "mode=${mode}"
            echo "writer_family=${writer_family}"
            echo "checker_family=${checker_family}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Auto-fix writer auth"
            echo ""
            echo "| Subscription daemon auth | Visible to GitHub Actions |"
            echo "|---|---|"
            echo "| CLAUDE_CODE_OAUTH_TOKEN | ${HAS_CLAUDE_OAUTH} |"
            echo "| WORKFLOW_CODEX_AUTH_JSON_B64 | ${HAS_CODEX_AUTH_BUNDLE} |"
            echo "| WORKFLOW_PUSH_TOKEN | ${HAS_WORKFLOW_PUSH_TOKEN} |"
            echo ""
            echo "- selected writer mode: \`${mode}\`"
            echo "- required checker family: \`${checker_family}\`"
            echo "- WORKFLOW_PUSH_TOKEN is optional, but required for automated branches that edit .github/workflows/* and for loop-created PRs to trigger pull_request checks."
            echo "- API-key secrets are intentionally ignored for default daemon writers."
            echo "- OPENAI_API_KEY configured: \`${HAS_OPENAI_API_KEY_CONFIGURED}\`"
            echo "- ANTHROPIC_API_KEY configured: \`${HAS_ANTHROPIC_API_KEY_CONFIGURED}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Graceful-skip if no auth
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [
                'needs-human',
                'auto-fix-auth-missing',
                'auto-fix-claude-subscription-missing',
                'auto-fix-codex-subscription-missing',
              ],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix skipped** - no automated writer auth configured.',
                '',
                'GitHub Actions could not see any approved subscription-backed community-loop writer secret.',
                '',
                'Approved subscription writer secrets:',
                '- `CLAUDE_CODE_OAUTH_TOKEN` *(primary subscription-backed Claude writer)* - from https://claude.ai/settings',
                '- `WORKFLOW_CODEX_AUTH_JSON_B64` *(subscription-backed Codex writer)* - base64 of subscription `~/.codex/auth.json`',
                '',
                '`OPENAI_API_KEY` and `ANTHROPIC_API_KEY` are intentionally ignored for default daemon writers under the subscription-only policy.',
                '',
                'Settings -> Secrets and variables -> Actions -> New repository secret.',
                '',
                'Once a secret is added, the scheduled backfill can retry this issue automatically.',
              ].join('\n'),
            });

      - name: Clear auth-missing block when auth is visible
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const issue = ${{ toJson(matrix.issue) }};
            const issueLabels = (issue.labels || []).map((label) => (
              typeof label === 'string' ? label : label.name
            ));
            const labelsToClear = ['needs-human', 'auto-fix-auth-missing', 'auto-fix-provider-exhausted'];
            if ('${{ steps.auth.outputs.has_claude_oauth }}' === 'true') {
              labelsToClear.push('auto-fix-claude-subscription-missing');
            }
            if ('${{ steps.auth.outputs.has_codex }}' === 'true') {
              labelsToClear.push('auto-fix-codex-subscription-missing');
            }
            if (
              '${{ steps.auth.outputs.has_workflow_push_token }}' === 'true' &&
              (
                issueLabels.includes('auto-fix-branch-push-blocked') ||
                issueLabels.includes('auto-fix-pr-blocked')
              )
            ) {
              labelsToClear.push(
                'auto-fix-reviewed',
                'auto-fix-branch-push-blocked',
                'auto-fix-pr-blocked',
              );
            }
            for (const label of labelsToClear) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

      - name: Checkout
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Install Python dev dependencies
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Extract request metadata
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const issue = ${{ toJson(matrix.issue) }};
            const title = issue.title;
            const body = issue.body || '';

            function labelName(label) {
              return typeof label === 'string' ? label : label.name;
            }

            const labels = (issue.labels || []).map(labelName);
            const requestKindLabel = labels.find((name) => name?.startsWith('request:'));
            const requestKind = requestKindLabel ? requestKindLabel.replace('request:', '') : 'change';
            const architecturalKinds = new Set(['project-design']);
            const filingShape = architecturalKinds.has(requestKind) ? 'architectural' : 'mechanical';
            const branchPrefix = filingShape === 'architectural' ? 'design-note-draft/' : 'auto-change/';
            const prTitlePrefix = filingShape === 'architectural' ? '[design-note]' : '[auto-change]';
            const wikiPathMatch = body.match(/\*\*Wiki path:\*\*\s*`([^`]+)`/i);
            const wikiPath = wikiPathMatch ? wikiPathMatch[1] : '';

            function issueLinkKeyword(requestKind, body) {
              if (requestKind !== 'patch') {
                return 'Fixes';
              }
              const text = String(body || '').toLowerCase();
              const hasFinalMarker = [
                /(^|\n)\s*(final|final_phase|is_final_phase)\s*:\s*true\b/,
                /(^|\n)\s*phase\s*:\s*final\b/,
                /(^|\n)\s*(?:the\s+)?final\s+phase\b/,
                /\blast\s+phase\b/,
              ].some((pattern) => pattern.test(text));
              if (hasFinalMarker) {
                return 'Fixes';
              }
              const hasNonFinalMarker = [
                /(^|\n)\s*(final|final_phase|is_final_phase)\s*:\s*false\b/,
                /\bnon[- ]final\b/,
                /\bnot\s+(?:the\s+)?final\b/,
                /\bintermediate\s+phase\b/,
              ].some((pattern) => pattern.test(text));
              const hasEarlierNumberedPhase = Array.from(
                text.matchAll(/\bphase\s+(\d+)\s*(?:of|\/)\s*(\d+)\b/g)
              ).some((match) => Number(match[1]) < Number(match[2]));
              return hasNonFinalMarker || hasEarlierNumberedPhase ? 'Part of' : 'Fixes';
            }

            // Pull request id from titles like "[BUG-003] ..." or "[WIKI-FEATURE] ...".
            const bugMatch = title.match(/\[?(BUG-\d+)\]?/i);
            const wikiMatch = title.match(/\[?(WIKI-[A-Z-]+)\]?/i);
            const requestId = bugMatch
              ? bugMatch[1].toUpperCase()
              : wikiMatch
                ? wikiMatch[1].toUpperCase()
                : `ISSUE-${String(issue.issue_number).padStart(3, '0')}`;
            const expectedBranchTask = `${branchPrefix}issue-${issue.issue_number}`;

            // Short title = everything after the bracketed request prefix, trimmed.
            const shortTitle = title.replace(/^\[?(BUG-\d+|WIKI-[A-Z-]+)\]?\s*/i, '').trim() || title;

            core.setOutput('issue_number', String(issue.issue_number));
            core.setOutput('request_id', requestId);
            core.setOutput('request_kind', requestKind);
            core.setOutput('filing_shape', filingShape);
            core.setOutput('branch_prefix', branchPrefix);
            core.setOutput('wiki_path', wikiPath);
            core.setOutput('expected_branch_task', expectedBranchTask);
            core.setOutput('short_title', shortTitle);
            core.setOutput('pr_title', `${prTitlePrefix} ${requestId}: ${shortTitle}`);
            core.setOutput('issue_link_line', `${issueLinkKeyword(requestKind, body)} #${issue.issue_number}`);
            core.setOutput('issue_body', body);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.issue_number,
              per_page: 10,
            });
            const recentComments = comments
              .slice(-5)
              .map((comment) => [
                `Comment by @${comment.user?.login || 'unknown'} at ${comment.created_at}:`,
                comment.body || '',
              ].join('\n'))
              .join('\n\n---\n\n')
              .slice(0, 8000);
            core.setOutput('issue_comments', recentComments);

      - name: Mark auto-fix attempted
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ matrix.issue.issue_number }}'),
              labels: ['auto-fix-attempted'],
            });

      - name: Run Claude Code action (OAuth)
        id: claude-oauth
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'claude_oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: main
          branch_prefix: ${{ steps.meta.outputs.branch_prefix }}
          branch_name_template: issue-${{ steps.meta.outputs.issue_number }}
          prompt: |
            You are handling a community change request in the Workflow repository.

            Request ID: ${{ steps.meta.outputs.request_id }}
            Request kind: ${{ steps.meta.outputs.request_kind }}
            Filing shape: ${{ steps.meta.outputs.filing_shape }}
            Issue #${{ steps.meta.outputs.issue_number }}: ${{ steps.meta.outputs.short_title }}

            Issue body:
            ${{ steps.meta.outputs.issue_body }}

            Recent issue comments and loop feedback:
            ${{ steps.meta.outputs.issue_comments }}

            Instructions:
            1. Read AGENTS.md and STATUS.md for project context.
            2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
            3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
            3a. For architectural/project-design filings, draft or update a design note under `docs/design-notes/proposed/`; do not make runtime code changes unless the issue explicitly asks for implementation.
            4. Implement a minimal, targeted change; no refactoring beyond what's needed.
            5. Add or update tests/docs/checks appropriate to the risk.
            6. If recent comments mention verification failures or review blockers, address those failures first.
            7. Run `python -m ruff check` on touched Python files and the relevant focused tests for changed test files; fix failures before finishing.
            8. If you edit canonical `workflow/*` runtime files, run `python packaging/claude-plugin/build_plugin.py` and commit the plugin mirror changes.
            9. If you make changes, open a pull request titled:
               ${{ steps.meta.outputs.pr_title }}
            10. The PR body must start with:
               ${{ steps.meta.outputs.issue_link_line }}
            11. Include a `Request artifact reconciliation` section that lists:
               - Wiki page: `${{ steps.meta.outputs.wiki_path || 'not declared' }}`
               - GitHub issue: `#${{ steps.meta.outputs.issue_number }}`
               - Branch task: `${{ steps.meta.outputs.expected_branch_task }}`
               - PR artifact: this PR
            12. Include `Writer family: Claude` and `Required checker family: Codex`.
            13. Include a short fix summary, tests run, and any remaining risks.
            14. Do not redesign community-authored branches unless the issue explicitly asks for that.

            If you cannot find a safe targeted change or are not confident, leave a
            comment in the code and exit gracefully. Do not guess.

      - name: Run Codex CLI (subscription)
        id: codex-subscription
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription'
        env:
          WORKFLOW_CODEX_AUTH_JSON_B64: ${{ secrets.WORKFLOW_CODEX_AUTH_JSON_B64 }}
          WORKFLOW_PUSH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          BRANCH_PREFIX: ${{ steps.meta.outputs.branch_prefix }}
          ISSUE_LINK_LINE: ${{ steps.meta.outputs.issue_link_line }}
        run: |
          set -euo pipefail
          branch="${BRANCH_PREFIX}issue-${{ steps.meta.outputs.issue_number }}-codex-${GITHUB_RUN_ID}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

          mkdir -p "$HOME/.codex"
          printf '%s' "${WORKFLOW_CODEX_AUTH_JSON_B64}" | base64 -d > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          unset WORKFLOW_CODEX_AUTH_JSON_B64
          unset OPENAI_API_KEY ANTHROPIC_API_KEY ANTHROPIC_BASE_URL GEMINI_API_KEY GROQ_API_KEY XAI_API_KEY

          npm install -g @openai/codex
          git fetch origin main --prune
          git checkout -B "$branch" "origin/main"
          if [[ -n "${WORKFLOW_PUSH_TOKEN:-}" ]]; then
            git remote set-url origin "https://x-access-token:${WORKFLOW_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git config --local --unset-all "http.https://github.com/.extraheader" || true
            git config --local --unset-all "http.https://github.com/${GITHUB_REPOSITORY}.extraheader" || true
          fi
          unset WORKFLOW_PUSH_TOKEN

          codex exec --dangerously-bypass-approvals-and-sandbox --skip-git-repo-check --cd "$GITHUB_WORKSPACE" --output-last-message "$RUNNER_TEMP/codex-last-message.md" - <<'PROMPT'
          You are handling a community change request in the Workflow repository.

          Request ID: ${{ steps.meta.outputs.request_id }}
          Request kind: ${{ steps.meta.outputs.request_kind }}
          Filing shape: ${{ steps.meta.outputs.filing_shape }}
          Issue #${{ steps.meta.outputs.issue_number }}: ${{ steps.meta.outputs.short_title }}

          Issue body:
          ${{ steps.meta.outputs.issue_body }}

          Recent issue comments and loop feedback:
          ${{ steps.meta.outputs.issue_comments }}

          Instructions:
          1. Read AGENTS.md and STATUS.md for project context.
          2. Classify the request as bug, patch, feature, docs/ops, branch refinement, or project design.
          3. For bugs, reproduce or reason about the root cause. For non-bug requests, identify the smallest useful project change.
          3a. For architectural/project-design filings, draft or update a design note under `docs/design-notes/proposed/`; do not make runtime code changes unless the issue explicitly asks for implementation.
          4. Implement a minimal, targeted change; no refactoring beyond what's needed.
          5. Add or update tests/docs/checks appropriate to the risk.
          6. If recent comments mention verification failures or review blockers, address those failures first.
          7. Run `python -m ruff check` on touched Python files and the relevant focused tests for changed test files; fix failures before finishing.
          8. If you edit canonical `workflow/*` runtime files, run `python packaging/claude-plugin/build_plugin.py` and leave the plugin mirror changes in the working tree.
          9. Do not commit, push, or open a PR. Leave any changes in the working tree for this workflow to commit.
          10. Do not redesign community-authored branches unless the issue explicitly asks for that.

          If you cannot find a safe targeted change or are not confident, leave the
          working tree unchanged and explain why in your final message. Do not guess.
          PROMPT

          if [ -z "$(git status --porcelain)" ]; then
            reason="blocked"
            message_file="$RUNNER_TEMP/codex-last-message.md"
            if [ -s "$message_file" ]; then
              message_lower="$(tr '[:upper:]' '[:lower:]' < "$message_file")"
              if printf '%s' "$message_lower" | grep -Eq 'already (fixed|implemented|covered|contains|addressed|present)|current checkout already|repository already|stale bug report|no repository change was needed'; then
                reason="already_fixed"
              fi
            fi
            _delim="EOF_$(tr -d '-' < /proc/sys/kernel/random/uuid)"
            {
              echo "changed=false"
              echo "no_change_reason=${reason}"
              echo "last_message<<${_delim}"
              if [ -s "$message_file" ]; then
                head -c 4000 "$message_file"
              else
                echo "(Codex left no final message.)"
              fi
              echo
              echo "${_delim}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          verification_log="$RUNNER_TEMP/codex-verification.log"
          mapfile -t changed_files < <(git diff --name-only)
          py_files=()
          test_files=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              *.py) py_files+=("$file") ;;
            esac
            case "$file" in
              tests/*.py) test_files+=("$file") ;;
            esac
          done

          {
            echo "Post-Codex verification"
            echo ""
            echo "Changed files:"
            printf -- "- %s\n" "${changed_files[@]}"
          } > "$verification_log"

          verification_status=0
          set +e
          if ((${#py_files[@]})); then
            {
              echo ""
              echo "python -m ruff check ${py_files[*]}"
            } >> "$verification_log"
            python -m ruff check "${py_files[@]}" 2>&1 | tee -a "$verification_log"
            status=${PIPESTATUS[0]}
            if [[ "$status" -ne 0 ]]; then
              verification_status=$status
            fi
          fi
          if ((${#test_files[@]})); then
            {
              echo ""
              echo "python -m pytest ${test_files[*]} -q"
            } >> "$verification_log"
            python -m pytest "${test_files[@]}" -q 2>&1 | tee -a "$verification_log"
            status=${PIPESTATUS[0]}
            if [[ "$status" -ne 0 ]]; then
              verification_status=$status
            fi
          fi
          set -e

          if [[ "$verification_status" -ne 0 ]]; then
            _delim="EOF_$(tr -d '-' < /proc/sys/kernel/random/uuid)"
            {
              echo "changed=false"
              echo "no_change_reason="
              echo "push_blocked=false"
              echo "push_block_reason="
              echo "last_message<<${_delim}"
              head -c 4000 "$verification_log"
              echo
              echo "${_delim}"
            } >> "$GITHUB_OUTPUT"
            echo "::error::Post-Codex verification failed; leaving request retryable."
            exit "$verification_status"
          fi

          git status --short
          git config user.name "workflow-daemon[bot]"
          git config user.email "workflow-daemon[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$PR_TITLE" \
            -m "$ISSUE_LINK_LINE" \
            -m "Writer family: Codex" \
            -m "Required checker family: Claude"
          push_log="$RUNNER_TEMP/codex-git-push.log"
          if ! git push --set-upstream origin "$branch" 2>&1 | tee "$push_log"; then
            if grep -q "refusing to allow a GitHub App to create or update workflow" "$push_log"; then
              {
                echo "changed=false"
                echo "no_change_reason="
                echo "push_blocked=true"
                echo "push_block_reason=github_actions_workflow_permission_missing"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit 1
          fi
          {
            echo "changed=true"
            echo "no_change_reason="
            echo "push_blocked=false"
            echo "push_block_reason="
          } >> "$GITHUB_OUTPUT"

      - name: Read live MCP brain source before closing wiki-origin request
        id: live-brain-source-read
        continue-on-error: true
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription' &&
          (
            steps.codex-subscription.outputs.changed == 'true' ||
            steps.codex-subscription.outputs.no_change_reason == 'already_fixed'
          )
        env:
          WIKI_PATH: ${{ steps.meta.outputs.wiki_path }}
        run: |
          set -euo pipefail
          if [[ -z "${WIKI_PATH:-}" || "${WIKI_PATH}" == "not declared" ]]; then
            echo "::error::Wiki-origin issue has no wiki_path metadata; refusing to prove live brain source-read."
            exit 1
          fi
          proof_file="$RUNNER_TEMP/live-brain-source-read.json"
          python - "$proof_file" "$WIKI_PATH" <<'PY'
          import json
          import subprocess
          import sys

          proof_path, wiki_path = sys.argv[1], sys.argv[2]
          args = {
              "action": "read",
              "page": wiki_path,
              "query": "auto-change PR close wiki-origin issue source-read proof",
              "max_results": 5,
          }
          completed = subprocess.run(
              [
                  "python",
                  "scripts/mcp_probe.py",
                  "--url",
                  "https://tinyassets.io/mcp",
                  "--tool",
                  "wiki",
                  "--args",
                  json.dumps(args),
              ],
              check=True,
              text=True,
              stdout=subprocess.PIPE,
          )
          open(proof_path, "w", encoding="utf-8").write(completed.stdout)
          PY
          python - "$proof_file" "$WIKI_PATH" <<'PY' >> "$GITHUB_OUTPUT"
          import hashlib
          import json
          import sys

          proof_path, wiki_path = sys.argv[1], sys.argv[2]
          payload = json.loads(open(proof_path, encoding="utf-8").read())
          proof = payload.get("source_read_proof")
          if not isinstance(proof, dict):
              raise SystemExit("live wiki read response did not include source_read_proof")
          path = str(proof.get("path") or "")
          sha256 = str(proof.get("sha256") or "")
          if path != wiki_path:
              raise SystemExit(f"unexpected source proof path: {path!r}; expected {wiki_path!r}")
          if len(sha256) != 64:
              raise SystemExit("live source_read_proof sha256 is missing or malformed")
          compact = {
              "endpoint": "https://tinyassets.io/mcp",
              "tool": "wiki",
              "action": "read",
              "path": path,
              "sha256": sha256,
              "title": proof.get("title") or "",
              "updated": proof.get("updated") or "",
          }
          digest = hashlib.sha256(json.dumps(compact, sort_keys=True).encode()).hexdigest()
          print(f"path={path}")
          print(f"sha256={sha256}")
          print(f"receipt_sha256={digest}")
          print("receipt_json=" + json.dumps(compact, sort_keys=True))
          PY

      - name: Mark wiki-origin request blocked on live source-read proof
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription' &&
          steps.live-brain-source-read.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const wikiPath = '${{ steps.meta.outputs.wiki_path }}' || 'not declared';
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-human', 'auto-fix-reviewed', 'needs_source_read'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix blocked on live MCP source-read proof**',
                '',
                `The Codex writer produced a terminal path, but the workflow could not read \`${wikiPath}\` through \`https://tinyassets.io/mcp\` and validate a matching \`source_read_proof\`.`,
                'The issue was left open and no auto-change PR was marked `ready_for_checker`.',
              ].join('\n'),
            });

      - name: Create Codex PR
        id: codex-pr-create
        if: >
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription' &&
          steps.codex-subscription.outputs.changed == 'true' &&
          steps.live-brain-source-read.outputs.sha256 != ''
        uses: actions/github-script@v7
        env:
          CODEX_BRANCH: ${{ steps.codex-subscription.outputs.branch }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          ISSUE_LINK_LINE: ${{ steps.meta.outputs.issue_link_line }}
          WIKI_PATH: ${{ steps.meta.outputs.wiki_path }}
          EXPECTED_BRANCH_TASK: ${{ steps.meta.outputs.expected_branch_task }}
          LIVE_BRAIN_PROOF_PATH: ${{ steps.live-brain-source-read.outputs.path }}
          LIVE_BRAIN_PROOF_SHA256: ${{ steps.live-brain-source-read.outputs.sha256 }}
          LIVE_BRAIN_PROOF_RECEIPT_SHA256: ${{ steps.live-brain-source-read.outputs.receipt_sha256 }}
        with:
          # PAT-created PRs fire pull_request checks; GITHUB_TOKEN-created PRs do not.
          github-token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}
          script: |
            const branch = process.env.CODEX_BRANCH;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueLinkLine = process.env.ISSUE_LINK_LINE || `Fixes #${issueNumber}`;
            const filingShape = '${{ steps.meta.outputs.filing_shape }}';
            const branchPrefix = '${{ steps.meta.outputs.branch_prefix }}';
            const wikiPath = process.env.WIKI_PATH || 'not declared';
            const expectedBranchTask = process.env.EXPECTED_BRANCH_TASK || `${branchPrefix}issue-${issueNumber}`;
            const liveBrainProofPath = process.env.LIVE_BRAIN_PROOF_PATH || '';
            const liveBrainProofSha256 = process.env.LIVE_BRAIN_PROOF_SHA256 || '';
            const liveBrainReceiptSha256 = process.env.LIVE_BRAIN_PROOF_RECEIPT_SHA256 || '';
            async function selfReviewLoopPr(pr) {
              const failures = [];
              const headRef = pr.head?.ref || '';
              const headRepo = pr.head?.repo?.full_name || '';
              const expectedRepo = `${context.repo.owner}/${context.repo.repo}`;
              const expectedRoot = `${branchPrefix}issue-${issueNumber}`;
              const expectedPrefix = `${expectedRoot}-`;
              if (headRef !== branch || headRepo !== expectedRepo) {
                failures.push(`source check failed: expected ${expectedRepo}:${branch}, got ${headRepo}:${headRef}`);
              }
              if (pr.base?.ref !== 'main') {
                failures.push(`source check failed: expected base main, got ${pr.base?.ref || '(unknown)'}`);
              }
              if (headRef !== expectedRoot && !headRef.startsWith(expectedPrefix)) {
                failures.push(`scope-split check failed: branch ${headRef} does not match ${expectedRoot}*`);
              }
              if (
                (filingShape === 'mechanical' && branchPrefix !== 'auto-change/') ||
                (filingShape === 'architectural' && branchPrefix !== 'design-note-draft/')
              ) {
                failures.push(`scope-split check failed: filing shape ${filingShape} uses branch prefix ${branchPrefix}`);
              }
              try {
                const { data: compare } = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `main...${headRef}`,
                });
                if (
                  Number(compare.behind_by || 0) > 0 ||
                  !['ahead', 'identical'].includes(String(compare.status || ''))
                ) {
                  failures.push(
                    `stale-base check failed: status=${compare.status || '(unknown)'} behind_by=${compare.behind_by || 0}`
                  );
                }
              } catch (error) {
                failures.push(`stale-base check failed: ${error.message}`);
              }
              const { data: openPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                base: 'main',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              });
              const duplicates = openPrs
                .filter((candidate) => candidate.number !== pr.number)
                .filter((candidate) => {
                  const candidateHead = candidate.head?.ref || '';
                  return candidateHead === expectedRoot || candidateHead.startsWith(expectedPrefix);
                })
                .map((candidate) => `#${candidate.number}`);
              if (duplicates.length) {
                failures.push(`duplicate check failed: still-open issue PR(s) ${duplicates.join(', ')}`);
              }
              return failures;
            }
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            let pr = existing[0] || null;
            if (!pr) {
              try {
                pr = (await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: process.env.PR_TITLE,
                  head: branch,
                  base: 'main',
                  body: [
                    issueLinkLine,
                    '',
                    '## Request artifact reconciliation',
                    '',
                    `- Wiki page: \`${wikiPath}\``,
                    `- GitHub issue: #${issueNumber}`,
                    `- Branch task: \`${expectedBranchTask}\``,
                    '- PR artifact: this PR',
                    '',
                    '## Live MCP brain source-read proof',
                    '',
                    '- Endpoint: `https://tinyassets.io/mcp`',
                    `- Tool call: \`wiki action=read page=${wikiPath}\``,
                    `- Source path: \`${liveBrainProofPath}\``,
                    `- Source sha256: \`${liveBrainProofSha256}\``,
                    `- Receipt sha256: \`${liveBrainReceiptSha256}\``,
                    '',
                    'Writer family: Codex',
                    'Required checker family: Claude',
                    '',
                    'Automated community-loop change produced by the subscription-backed Codex lane.',
                  ].join('\n'),
                })).data;
              } catch (error) {
                const message = String(error?.message || error);
                if (
                  error?.status === 403 &&
                  message.includes('not permitted to create or approve pull requests')
                ) {
                  core.setOutput('blocked', 'true');
                  core.setOutput('block_reason', 'github_actions_pr_creation_disabled');
                  core.warning(
                    'Codex pushed a branch, but GitHub repository policy blocked Actions from opening the PR.'
                  );
                  return;
                }
                throw error;
              }
            }
            core.setOutput('blocked', 'false');
            core.setOutput('block_reason', '');
            core.setOutput('number', String(pr.number));
            const issueBranchRoot = `${branchPrefix}issue-${issueNumber}`;
            const issueBranchPrefix = `${issueBranchRoot}-`;
            const { data: issuePrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });
            for (const candidate of issuePrs) {
              const headRef = candidate.head?.ref || '';
              if (
                candidate.number === pr.number ||
                (headRef !== issueBranchRoot && !headRef.startsWith(issueBranchPrefix)) ||
                !headRef.startsWith(branchPrefix)
              ) {
                continue;
              }
              let staleBase = false;
              try {
                const { data: compare } = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `main...${headRef}`,
                });
                staleBase = Number(compare.behind_by || 0) > 0 ||
                  !['ahead', 'identical'].includes(String(compare.status || ''));
              } catch (error) {
                core.warning(
                  `Could not compare stale-base state for PR #${candidate.number} (${headRef}): ${error.message}`
                );
                continue;
              }
              if (!staleBase) {
                continue;
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: candidate.number,
                labels: ['auto-fix-reviewed', 'auto-fix-superseded'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: candidate.number,
                body: [
                  '**Auto-change PR closed as superseded**',
                  '',
                  `This stale-base PR from \`${headRef}\` was superseded by #${pr.number} from \`${branch}\`.`,
                  'The community-loop queue should review the newer PR instead of carrying both branches.',
                ].join('\n'),
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: candidate.number,
                state: 'closed',
              });
            }
            const selfReviewFailures = await selfReviewLoopPr(pr);
            if (selfReviewFailures.length) {
              core.warning(`Loop PR #${pr.number} is not ready_for_checker: ${selfReviewFailures.join('; ')}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '**Pre-checker self-review blocked `ready_for_checker`**',
                  '',
                  ...selfReviewFailures.map((failure) => `- ${failure}`),
                  '',
                  'Fix the pre-check failure before routing this loop PR to a checker.',
                ].join('\n'),
              });
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['writer:codex', 'checker:claude'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '**Loop review policy**',
                '',
                '- Writer family: Codex',
                '- Required checker family: Claude',
                '',
                'Do not accept this PR with a same-family checker.',
              ].join('\n'),
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix artifact receipt**',
                '',
                `- Wiki page: \`${wikiPath}\``,
                `- GitHub issue: #${issueNumber}`,
                `- Branch task: \`${expectedBranchTask}\``,
                `- PR artifact: #${pr.number} (${pr.html_url})`,
                `- Child invocation receipt: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '- Terminal outcome: `pr-opened`',
              ].join('\n'),
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['auto-fix-reviewed'],
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['ready_for_checker'],
            });

      - name: Close already-fixed issue when no repo change is needed
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'codex_subscription' &&
          steps.codex-subscription.outputs.changed == 'false' &&
          steps.codex-subscription.outputs.no_change_reason == 'already_fixed' &&
          steps.live-brain-source-read.outputs.sha256 != ''
        uses: actions/github-script@v7
        env:
          CODEX_LAST_MESSAGE: ${{ steps.codex-subscription.outputs.last_message }}
          WIKI_PATH: ${{ steps.meta.outputs.wiki_path }}
          LIVE_BRAIN_PROOF_PATH: ${{ steps.live-brain-source-read.outputs.path }}
          LIVE_BRAIN_PROOF_SHA256: ${{ steps.live-brain-source-read.outputs.sha256 }}
          LIVE_BRAIN_PROOF_RECEIPT_SHA256: ${{ steps.live-brain-source-read.outputs.receipt_sha256 }}
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const labelsToClear = [
              'needs-human',
              'auto-fix-auth-missing',
              'auto-fix-provider-exhausted',
              'auto-fix-claude-subscription-missing',
              'auto-fix-codex-subscription-missing',
            ];
            for (const label of labelsToClear) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['auto-fix-reviewed', 'auto-fix-already-fixed'],
            });
            const finalMessage = (process.env.CODEX_LAST_MESSAGE || '(Codex left no final message.)')
              .slice(0, 3500);
            const liveBrainProofPath = process.env.LIVE_BRAIN_PROOF_PATH || '';
            const liveBrainProofSha256 = process.env.LIVE_BRAIN_PROOF_SHA256 || '';
            const liveBrainReceiptSha256 = process.env.LIVE_BRAIN_PROOF_RECEIPT_SHA256 || '';
            const wikiPath = process.env.WIKI_PATH || 'not declared';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix closed as already fixed** - the subscription-backed Codex writer inspected the request and found no repository change was needed.',
                '',
                'Live MCP brain source-read proof:',
                '- Endpoint: `https://tinyassets.io/mcp`',
                `- Tool call: \`wiki action=read page=${wikiPath}\``,
                `- Source path: \`${liveBrainProofPath}\``,
                `- Source sha256: \`${liveBrainProofSha256}\``,
                `- Receipt sha256: \`${liveBrainReceiptSha256}\``,
                '',
                'Codex final message:',
                '```text',
                finalMessage,
                '```',
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Find Claude PR and label checker policy
        id: claude-pr
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode == 'claude_oauth'
        uses: actions/github-script@v7
        env:
          WIKI_PATH: ${{ steps.meta.outputs.wiki_path }}
          EXPECTED_BRANCH_TASK: ${{ steps.meta.outputs.expected_branch_task }}
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const mode = '${{ steps.auth.outputs.mode }}';
            const branchPrefix = '${{ steps.meta.outputs.branch_prefix }}';
            const filingShape = '${{ steps.meta.outputs.filing_shape }}';
            const branch = mode === 'codex_subscription'
              ? '${{ steps.codex-subscription.outputs.branch }}'
              : `${branchPrefix}issue-${issueNumber}`;
            async function selfReviewLoopPr(pr) {
              const failures = [];
              const headRef = pr.head?.ref || '';
              const headRepo = pr.head?.repo?.full_name || '';
              const expectedRepo = `${context.repo.owner}/${context.repo.repo}`;
              const expectedRoot = `${branchPrefix}issue-${issueNumber}`;
              const expectedPrefix = `${expectedRoot}-`;
              if (headRef !== branch || headRepo !== expectedRepo) {
                failures.push(`source check failed: expected ${expectedRepo}:${branch}, got ${headRepo}:${headRef}`);
              }
              if (pr.base?.ref !== 'main') {
                failures.push(`source check failed: expected base main, got ${pr.base?.ref || '(unknown)'}`);
              }
              if (headRef !== expectedRoot && !headRef.startsWith(expectedPrefix)) {
                failures.push(`scope-split check failed: branch ${headRef} does not match ${expectedRoot}*`);
              }
              if (
                (filingShape === 'mechanical' && branchPrefix !== 'auto-change/') ||
                (filingShape === 'architectural' && branchPrefix !== 'design-note-draft/')
              ) {
                failures.push(`scope-split check failed: filing shape ${filingShape} uses branch prefix ${branchPrefix}`);
              }
              try {
                const { data: compare } = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `main...${headRef}`,
                });
                if (
                  Number(compare.behind_by || 0) > 0 ||
                  !['ahead', 'identical'].includes(String(compare.status || ''))
                ) {
                  failures.push(
                    `stale-base check failed: status=${compare.status || '(unknown)'} behind_by=${compare.behind_by || 0}`
                  );
                }
              } catch (error) {
                failures.push(`stale-base check failed: ${error.message}`);
              }
              const { data: openPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                base: 'main',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              });
              const duplicates = openPrs
                .filter((candidate) => candidate.number !== pr.number)
                .filter((candidate) => {
                  const candidateHead = candidate.head?.ref || '';
                  return candidateHead === expectedRoot || candidateHead.startsWith(expectedPrefix);
                })
                .map((candidate) => `#${candidate.number}`);
              if (duplicates.length) {
                failures.push(`duplicate check failed: still-open issue PR(s) ${duplicates.join(', ')}`);
              }
              return failures;
            }
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            const pr = prs[0] || null;
            core.setOutput('found', pr ? 'true' : 'false');
            core.setOutput('number', pr ? String(pr.number) : '');
            if (!pr) {
              core.info(`No Claude-created PR found for ${branch}.`);
              return;
            }
            const selfReviewFailures = await selfReviewLoopPr(pr);
            if (selfReviewFailures.length) {
              core.warning(`Loop PR #${pr.number} is not ready_for_checker: ${selfReviewFailures.join('; ')}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '**Pre-checker self-review blocked `ready_for_checker`**',
                  '',
                  ...selfReviewFailures.map((failure) => `- ${failure}`),
                  '',
                  'Fix the pre-check failure before routing this loop PR to a checker.',
                ].join('\n'),
              });
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['writer:claude', 'checker:codex'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '**Loop review policy**',
                '',
                '- Writer family: Claude',
                '- Required checker family: Codex',
                '',
                'Do not accept this PR with a same-family checker.',
              ].join('\n'),
            });
            const wikiPath = process.env.WIKI_PATH || 'not declared';
            const expectedBranchTask = process.env.EXPECTED_BRANCH_TASK || `${branchPrefix}issue-${issueNumber}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix artifact receipt**',
                '',
                `- Wiki page: \`${wikiPath}\``,
                `- GitHub issue: #${issueNumber}`,
                `- Branch task: \`${expectedBranchTask}\``,
                `- PR artifact: #${pr.number} (${pr.html_url})`,
                `- Child invocation receipt: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '- Terminal outcome: `pr-opened`',
              ].join('\n'),
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['auto-fix-reviewed'],
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['ready_for_checker'],
            });

      - name: Mark needs-human if no PR opened
        if: >
          always() &&
          steps.check-disabled.outputs.disabled == 'false' &&
          steps.auth.outputs.mode != 'none' &&
          steps.codex-subscription.outputs.no_change_reason != 'already_fixed'
        uses: actions/github-script@v7
        env:
          CODEX_BRANCH: ${{ steps.codex-subscription.outputs.branch }}
          CODEX_NO_CHANGE_REASON: ${{ steps.codex-subscription.outputs.no_change_reason }}
          CODEX_LAST_MESSAGE: ${{ steps.codex-subscription.outputs.last_message }}
          CODEX_PR_BLOCKED: ${{ steps.codex-pr-create.outputs.blocked }}
          CODEX_PR_BLOCK_REASON: ${{ steps.codex-pr-create.outputs.block_reason }}
          CODEX_PUSH_BLOCKED: ${{ steps.codex-subscription.outputs.push_blocked }}
          CODEX_PUSH_BLOCK_REASON: ${{ steps.codex-subscription.outputs.push_block_reason }}
          WIKI_PATH: ${{ steps.meta.outputs.wiki_path }}
          EXPECTED_BRANCH_TASK: ${{ steps.meta.outputs.expected_branch_task }}
          CLAUDE_OUTCOME: ${{ steps.claude-oauth.outcome }}
          CODEX_OUTCOME: ${{ steps.codex-subscription.outcome }}
        with:
          script: |
            const issueNumber = Number('${{ matrix.issue.issue_number }}');
            const mode = '${{ steps.auth.outputs.mode }}';
            const branchPrefix = '${{ steps.meta.outputs.branch_prefix }}';
            const codexBranch = process.env.CODEX_BRANCH || '';
            const branch = mode === 'codex_subscription' && codexBranch
              ? codexBranch
              : `${branchPrefix}issue-${issueNumber}`;
            const wikiPath = process.env.WIKI_PATH || 'not declared';
            const expectedBranchTask = process.env.EXPECTED_BRANCH_TASK || `${branchPrefix}issue-${issueNumber}`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 5,
            });
            if (prs.length) {
              const pr = prs[0];
              core.info(`Auto-fix PR exists: #${pr.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  '**Auto-fix artifact receipt**',
                  '',
                  `- Wiki page: \`${wikiPath}\``,
                  `- GitHub issue: #${issueNumber}`,
                  `- Branch task: \`${expectedBranchTask}\``,
                  `- PR artifact: #${pr.number} (${pr.html_url})`,
                  `- Child invocation receipt: ${runUrl}`,
                  '- Terminal outcome: `pr-opened-existing`',
                ].join('\n'),
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['auto-fix-reviewed'],
              });
              return;
            }

            const claudeSubscriptionVisible = '${{ steps.auth.outputs.has_claude_oauth }}' === 'true';
            const codexSubscriptionVisible = '${{ steps.auth.outputs.has_codex }}' === 'true';
            const codexNoChangeReason = process.env.CODEX_NO_CHANGE_REASON || '';
            const codexPrBlocked = process.env.CODEX_PR_BLOCKED === 'true';
            const codexPrBlockReason = process.env.CODEX_PR_BLOCK_REASON || '';
            const codexPushBlocked = process.env.CODEX_PUSH_BLOCKED === 'true';
            const codexPushBlockReason = process.env.CODEX_PUSH_BLOCK_REASON || '';
            const claudeWriterFailed = mode === 'claude_oauth' && process.env.CLAUDE_OUTCOME === 'failure';
            const codexWriterFailed = mode === 'codex_subscription' && process.env.CODEX_OUTCOME === 'failure';
            const writerFailed = claudeWriterFailed || codexWriterFailed;
            const terminalOutcome = writerFailed
              ? 'writer-failed-before-pr'
              : codexPushBlocked
                ? 'branch-push-blocked'
                : codexPrBlocked
                  ? 'pr-creation-blocked'
                  : codexNoChangeReason
                    ? `no-change-${codexNoChangeReason}`
                    : 'no-pr-artifact-created';
            const labels = ['needs-human'];
            if (codexNoChangeReason || codexPrBlocked || codexPushBlocked || writerFailed) {
              labels.push('auto-fix-reviewed');
            }
            if (writerFailed) {
              labels.push('auto-fix-writer-failed');
            }
            if (codexNoChangeReason) {
              labels.push('auto-fix-blocked');
            }
            if (codexPrBlocked) {
              labels.push('auto-fix-pr-blocked');
            }
            if (codexPushBlocked) {
              labels.push('auto-fix-branch-push-blocked');
            }
            if (!claudeSubscriptionVisible && !codexSubscriptionVisible) {
              labels.push('auto-fix-claude-subscription-missing');
              labels.push('auto-fix-codex-subscription-missing');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '**Auto-fix needs human review** - approved writer auth was present, but no automated PR was opened.',
                '',
                '## Request artifact reconciliation',
                '',
                `- Wiki page: \`${wikiPath}\``,
                `- GitHub issue: #${issueNumber}`,
                `- Branch task: \`${expectedBranchTask}\``,
                '- PR artifact: `not created`',
                `- Child invocation receipt: ${runUrl}`,
                `- Terminal outcome: \`${terminalOutcome}\``,
                '',
                `Detected auth mode: \`${{ steps.auth.outputs.mode }}\``,
                `Claude OAuth present: \`${{ steps.auth.outputs.has_claude_oauth }}\``,
                `Codex subscription present: \`${{ steps.auth.outputs.has_codex }}\``,
                `Workflow push token present: \`${{ steps.auth.outputs.has_workflow_push_token }}\``,
                `OpenAI API key configured but ignored: \`${{ steps.auth.outputs.has_openai_api_key_configured }}\``,
                `Anthropic API key configured but ignored: \`${{ steps.auth.outputs.has_anthropic_api_key_configured }}\``,
                '',
                `Claude OAuth outcome: \`${{ steps.claude-oauth.outcome }}\``,
                `Codex subscription outcome: \`${{ steps.codex-subscription.outcome }}\``,
                mode === 'codex_subscription' && process.env.CODEX_OUTCOME === 'success'
                  ? 'Writer child invocation: `succeeded`'
                  : '',
                mode === 'codex_subscription' && codexBranch
                  ? 'Auto-fix branch pushed: `true`'
                  : '',
                codexNoChangeReason ? `Codex no-change reason: \`${codexNoChangeReason}\`` : '',
                codexPrBlocked
                  ? `PR creation blocked: \`${codexPrBlockReason || 'unknown'}\``
                  : '',
                codexPrBlocked
                  ? 'Remaining blocker: GitHub Actions PR creation policy. Do not treat this as a failed child invocation.'
                  : '',
                codexPushBlocked
                  ? `Branch push blocked: \`${codexPushBlockReason || 'unknown'}\``
                  : '',
                codexPushBlocked && codexPushBlockReason === 'github_actions_workflow_permission_missing'
                  ? 'Configure `WORKFLOW_PUSH_TOKEN` with repo Contents write, Workflows write, and Pull requests write so automated workflow-file branches can push and loop-created PRs can trigger checks.'
                  : '',
                codexPrBlocked && branch
                  ? `Auto-fix branch: https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${branch}`
                  : '',
                process.env.CODEX_LAST_MESSAGE
                  ? [
                      '',
                      'Codex final message:',
                      '```text',
                      process.env.CODEX_LAST_MESSAGE.slice(0, 3500),
                      '```',
                    ].join('\n')
                  : '',
                '',
                !claudeSubscriptionVisible && !codexSubscriptionVisible
                  ? 'No approved subscription-backed daemon lane was visible to GitHub Actions.'
                  : '',
                'API-key billing lanes are intentionally not used for default daemon writers.',
                'The issue is marked `needs-human` so it does not loop silently.',
              ].filter(Boolean).join('\n'),
            });
            core.warning('approved writer auth was present, but no auto-fix PR was opened');
