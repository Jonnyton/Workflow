name: tier3-oss-clone-nightly

# Nightly tier-3 OSS clone smoke per AGENTS.md Forever Rule:
# "tier-3 OSS contributors `git clone` and run cleanly" is a P0 uptime
# surface. Spec: docs/design-notes/2026-04-19-tier3-oss-clone-nightly-gha.md.

on:
  schedule:
    - cron: '17 7 * * *'  # 07:17 UTC daily — avoid top-of-hour contention
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  fresh-clone-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fresh clone (simulate OSS contributor path)
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }} /tmp/workflow-fresh
          cd /tmp/workflow-fresh
          git rev-parse HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv
        working-directory: /tmp/workflow-fresh
        run: python -m venv .venv

      - name: pip install -e .
        working-directory: /tmp/workflow-fresh
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e .

      - name: Top-level import smoke
        working-directory: /tmp/workflow-fresh
        run: |
          source .venv/bin/activate
          python -c "import workflow; print('workflow imported from', workflow.__file__ if hasattr(workflow, '__file__') else '<namespace>')"

      - name: Structural smoke script
        working-directory: /tmp/workflow-fresh
        run: |
          source .venv/bin/activate
          python scripts/tier3_smoke.py

      - name: Import-graph smoke
        working-directory: /tmp/workflow-fresh
        run: |
          source .venv/bin/activate
          # Catches the 2026-04-19 P0 class — missing-symbol regressions
          # at package import time. Checks primary targets (workflow.storage
          # + consumer surfaces) + every workflow/** package that declares
          # __all__.
          python scripts/import_graph_smoke.py --verbose

      - name: Smoke pytest
        working-directory: /tmp/workflow-fresh
        run: |
          source .venv/bin/activate
          pip install pytest
          pytest tests/smoke/ -x --no-header -q

      - name: Capture failing commit SHA
        id: commit
        if: failure()
        working-directory: /tmp/workflow-fresh
        run: |
          sha=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Alarm on failure
        if: failure()
        run: |
          echo "::error::Tier-3 OSS clone smoke FAILED on commit ${{ steps.commit.outputs.sha }}"

      - name: Open tier3-broken issue
        if: failure()
        uses: actions/github-script@v7
        env:
          FAILING_SHA: ${{ steps.commit.outputs.sha }}
        with:
          script: |
            const label = "tier3-broken";
            // Ensure label exists (first failure bootstraps it).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'b60205',
                  description: 'Tier-3 OSS clone nightly smoke failed; fresh-clone install or smoke tests broken on main.',
                });
              } else {
                throw e;
              }
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sha = process.env.FAILING_SHA || 'unknown';
            const shortSha = sha !== 'unknown' ? sha.substring(0, 12) : sha;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Tier-3 OSS clone smoke failed — ${shortSha} @ ${new Date().toISOString()}`,
              labels: [label],
              body: [
                `Auto-opened by the tier3-oss-clone-nightly workflow.`,
                ``,
                `- **Failing commit:** \`${sha}\``,
                `- **Run:** ${runUrl}`,
                ``,
                `A fresh \`git clone\` + \`pip install -e .\` + smoke pytest path is broken on main. This is a Forever Rule (AGENTS.md) P0: tier-3 OSS contributors clone the repo and run it cleanly — that surface is currently red.`,
                ``,
                `Debug order: (1) check the last commit's diff for dirty-tree artifacts or dropped files; (2) re-run the workflow locally via the clone steps in \`docs/design-notes/2026-04-19-tier3-oss-clone-nightly-gha.md\`; (3) fix forward.`,
              ].join('\n'),
            });

      - name: Fail the job
        if: failure()
        run: exit 1
