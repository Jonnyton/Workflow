name: Site DNS cutover (apex → GitHub Pages)

# One-shot workflow that swaps tinyassets.io apex from the legacy GoDaddy
# hosted-site IPs to GitHub Pages' four canonical IPs, while preserving
# the path-based /mcp* Cloudflare Worker route.
#
# Always dry-runs first (apply=false default). Re-run with apply=true to
# mutate. The script is idempotent — re-running on an already-cutover
# apex is a no-op.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Mutate Cloudflare. False runs a dry-run only.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  cutover:
    name: Run apex DNS cutover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run site_apex_cutover
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          APPLY: ${{ inputs.apply }}
        run: |
          set -euo pipefail
          if [[ "$APPLY" == "true" ]]; then
            python scripts/site_apex_cutover.py --apply
          else
            python scripts/site_apex_cutover.py
          fi

      - name: Probe public surfaces (apply only)
        if: inputs.apply == true
        run: |
          set -euo pipefail
          echo "Waiting 30s for Cloudflare to propagate edge config..."
          sleep 30
          echo "--- HEAD https://tinyassets.io/ ---"
          curl -sI https://tinyassets.io/ | head -10 || true
          echo
          echo "--- HEAD https://tinyassets.io/mcp ---"
          curl -sI https://tinyassets.io/mcp | head -10 || true
          echo
          echo "--- mcp_public_canary ---"
          python scripts/mcp_public_canary.py --url https://tinyassets.io/mcp --timeout 20 --verbose
