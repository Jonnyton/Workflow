name: P0 outage auto-triage

# Triggered when uptime-canary opens a p0-outage issue (via labels event).
# Attempts a non-destructive compose restart on the Droplet, re-probes,
# and either closes the issue (auto-recovered) or adds needs-human label.
#
# Flow:
#   1. SSH in, restart daemon container (non-destructive --force-recreate).
#   2. Wait 30s for startup.
#   3. Re-probe canonical URL.
#   4. GREEN → comment auto-recovered + close issue.
#   5. RED  → comment diag output + add needs-human label.
#
# Required secrets:
#   DO_SSH_KEY       — private key PEM for the Droplet
#   DO_DROPLET_HOST  — Droplet public IP
#   DO_SSH_USER      — SSH user (root / deploy)
#
# Alarm hook: distinct from deploy-prod.yml's deploy-failed label.
# This workflow is only for spontaneous outages, not deploy regressions.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  # One triage run per issue — prevents concurrent restarts on the same box.
  group: p0-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  CANARY_URL: https://tinyassets.io/mcp
  DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST }}
  DO_SSH_USER: ${{ secrets.DO_SSH_USER }}

jobs:
  triage:
    # Only run when the p0-outage label is applied.
    if: github.event.label.name == 'p0-outage'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify secrets present
        run: |
          missing=()
          [ -z "$DO_DROPLET_HOST" ] && missing+=("DO_DROPLET_HOST")
          [ -z "$DO_SSH_USER" ] && missing+=("DO_SSH_USER")
          [ -z "${{ secrets.DO_SSH_KEY }}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]} — cannot attempt auto-triage"
            echo "::error::Add needs-human label manually and SSH to investigate."
            exit 1
          fi

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Capture pre-restart diag
        id: prediag
        run: |
          # Bundle docker + compose + journalctl + df + systemctl status
          # + activity.log tail so the classifier sees all signals at once.
          # df is needed for disk-full; systemctl for watchdog-hotloop;
          # activity.log tail for provider_exhaustion (Lane 4b — spec
          # §Q6: classifier needs the REVERT-verdict shape that only
          # lands in the daemon's activity log, not journalctl).
          diag=$(ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>&1; \
               echo '---'; \
               docker compose -f /opt/workflow/deploy/compose.yml ps 2>&1 | head -20; \
               echo '--- journalctl workflow-daemon ---'; \
               journalctl -u workflow-daemon --no-pager -n 80 2>&1 || true; \
               echo '--- df -h ---'; \
               df -h 2>&1 || true; \
               echo '--- systemctl status workflow-daemon ---'; \
               systemctl status workflow-daemon --no-pager 2>&1 | head -30 || true; \
               echo '--- cloudflared logs ---'; \
               docker logs workflow-tunnel --tail 30 2>&1 || true; \
               echo '--- activity.log tail (provider_exhaustion signal) ---'; \
               for udir in /var/lib/docker/volumes/workflow-data/_data/*/; do \
                 [ -f \"\$udir/activity.log\" ] && \
                   echo \"# \$udir/activity.log:\" && \
                   tail -n 100 \"\$udir/activity.log\" 2>&1 || true; \
               done || true" \
              2>&1 || echo "(SSH failed)")
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "diag<<${_delim}"
            echo "$diag"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== pre-restart diag ==="
          echo "$diag"

      # Narrow-by-design classifier — each class has ONE regex, priority
      # ordered (root-cause classes beat cascading symptoms). Delegates
      # to scripts/triage_classify.py so regex logic is unit-testable
      # without firing a real drill. Classes (task #11 spec):
      #   env_unreadable       — chown+chmod repair (Task #3 class)
      #   tunnel_token         — MANUAL ONLY (token rotation); opens
      #                          dedicated issue + pages priority=2
      #   oom                  — compose restart (memory ratchet NOT auto)
      #   disk_full            — docker system prune -af
      #   image_pull_failure   — fall back to :latest in /etc/workflow/env
      #   watchdog_hotloop     — stop → sleep 60 → start (reset limit)
      #   provider_exhaustion  — stop worker + write .pause sentinel;
      #                          page host priority=2 (Lane 4b)
      #   unknown              — generic compose restart (legacy behavior)
      - name: Classify outage
        id: classify
        run: |
          result=$(printf '%s' "${{ steps.prediag.outputs.diag }}" \
              | python scripts/triage_classify.py)
          echo "classifier output: ${result}"
          klass=$(printf '%s' "${result}" | python -c "import json,sys; print(json.load(sys.stdin)['class'])")
          auto=$(printf '%s' "${result}" | python -c "import json,sys; print(str(json.load(sys.stdin)['auto_repairable']).lower())")
          manual=$(printf '%s' "${result}" | python -c "import json,sys; print(str(json.load(sys.stdin)['manual_only']).lower())")
          evidence=$(printf '%s' "${result}" | python -c "import json,sys; print(json.load(sys.stdin)['evidence'])")
          {
            echo "class=${klass}"
            echo "auto_repairable=${auto}"
            echo "manual_only=${manual}"
            _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
            echo "evidence<<${_delim}"
            echo "${evidence}"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"

      # --- Repair branch 1: ENV-UNREADABLE -----------------------------
      - name: Repair — ENV-UNREADABLE (chown + chmod)
        id: repair_env
        if: steps.classify.outputs.class == 'env_unreadable'
        run: |
          echo "::notice::ENV-UNREADABLE detected — applying perm repair"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo chown root:workflow /etc/workflow/env && \
               sudo chmod 640 /etc/workflow/env && \
               sudo -u workflow test -r /etc/workflow/env && \
               echo 'env perms repaired' && \
               sudo ls -l /etc/workflow/env"

      # --- Repair branch 2: OOM ----------------------------------------
      # Narrow repair: compose restart, no memory-cap ratchet. Infinite
      # ratchet would mask an actual memory leak; each OOM event is a
      # signal worth preserving in GH issue history. If OOMs recur, host
      # bumps the memory cap by hand (one-shot bump, documented in
      # docs/ops/host-independence-runbook.md — not auto-applied here).
      - name: Repair — OOM (compose restart; memory cap NOT auto-bumped)
        id: repair_oom
        if: steps.classify.outputs.class == 'oom'
        run: |
          echo "::notice::OOM detected — compose restart (no memory ratchet)"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "docker compose -f /opt/workflow/deploy/compose.yml \
                 --env-file /etc/workflow/env \
                 restart daemon" 2>&1

      # --- Repair branch 3: disk full ----------------------------------
      # docker system prune -af reclaims dangling images/containers/cache.
      # workflow-prune.timer runs this weekly, but P0 disk-full is an
      # emergency fire. Journalctl vacuum trims old log state too.
      - name: Repair — disk full (docker prune + journalctl vacuum)
        id: repair_disk
        if: steps.classify.outputs.class == 'disk_full'
        run: |
          echo "::notice::disk-full detected — emergency prune"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo docker system prune -af 2>&1 | tail -20; \
               sudo journalctl --vacuum-time=3d 2>&1 | tail -5; \
               df -h / /var/lib/docker 2>&1" 2>&1

      # --- Repair branch 4: image pull failure -------------------------
      # Fall back to :latest. Log loudly: we've come off the pinned SHA,
      # which loses deterministic-deploy guarantees until the next
      # deploy-prod.yml run re-pins.
      - name: Repair — image pull failure (fall back to :latest)
        id: repair_pull
        if: steps.classify.outputs.class == 'image_pull_failure'
        run: |
          echo "::warning::image-pull failed — falling back to :latest (lose SHA pin)"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo sed -i 's|^WORKFLOW_IMAGE=.*|WORKFLOW_IMAGE=ghcr.io/jonnyton/workflow-daemon:latest|' /etc/workflow/env && \
               sudo chown root:workflow /etc/workflow/env && \
               sudo chmod 640 /etc/workflow/env && \
               sudo -u workflow test -r /etc/workflow/env || { \
                 echo 'ENV-UNREADABLE: fallback sed left /etc/workflow/env unreadable' >&2; \
                 exit 1; \
               }"

      # --- Repair branch 5: watchdog hot-loop --------------------------
      # stop → sleep 60 → start lets the systemd start-limit counter
      # reset. StartLimitIntervalSec=300 (5min) / StartLimitBurst=5 per
      # the unit file; sleeping 60s won't fully clear the 5-min window
      # but gives enough headroom for the next start to succeed if the
      # underlying issue was transient.
      - name: Repair — watchdog hot-loop (stop + sleep 60 + start)
        id: repair_watchdog
        if: steps.classify.outputs.class == 'watchdog_hotloop'
        run: |
          echo "::notice::watchdog hot-loop detected — stop+sleep+start"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "sudo systemctl stop workflow-daemon && \
               sleep 60 && \
               sudo systemctl reset-failed workflow-daemon && \
               sudo systemctl start workflow-daemon" 2>&1

      # --- Repair branch 6: provider_exhaustion (Lane 4b) --------------
      # Daemon alive + writing, but every scene terminates as REVERT —
      # the 2026-04-23 P0 signature. Revert-loop canary fires this via
      # the triage pipeline; auto-repair halts the generator (docker
      # stop workflow-worker + .pause sentinel) and pages the host
      # priority=2 because provider routing needs human intervention
      # (rotate API keys, bump quota, flip tier_routing_policy).
      #
      # Staged rollout (spec §Rollout plan Phase 3): auto-repair gated
      # on WORKFLOW_REVERT_AUTO_REPAIR=on. Off by default so the class
      # can run in WARN-only mode during 7-day soak period before
      # flipping on. Spec Phase 6: remove gate after 14 days clean.
      #
      # Distinct from disk_full: no volume pressure, cause-addressing;
      # distinct from generic restart: restart re-enters the loop on
      # broken providers.
      - name: Repair — provider_exhaustion (auto-repair gate check)
        id: repair_provider_exhaustion_gate
        if: steps.classify.outputs.class == 'provider_exhaustion'
        env:
          REVERT_AUTO_REPAIR: ${{ vars.WORKFLOW_REVERT_AUTO_REPAIR || '' }}
        run: |
          if [ "${REVERT_AUTO_REPAIR,,}" = "on" ] || \
             [ "${REVERT_AUTO_REPAIR,,}" = "true" ] || \
             [ "${REVERT_AUTO_REPAIR,,}" = "1" ]; then
            echo "auto_repair_enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::provider_exhaustion auto-repair ENABLED"
          else
            echo "auto_repair_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::provider_exhaustion DETECTED but auto-repair gated off (WORKFLOW_REVERT_AUTO_REPAIR unset). WARN-only mode; host must act manually."
          fi

      - name: Repair — provider_exhaustion (stop worker + .pause)
        id: repair_provider_exhaustion
        if: >
          steps.classify.outputs.class == 'provider_exhaustion' &&
          steps.repair_provider_exhaustion_gate.outputs.auto_repair_enabled == 'true'
        run: |
          echo "::warning::provider_exhaustion — halting worker + pausing universe"
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "docker stop workflow-worker 2>&1 || true; \
               for udir in /var/lib/docker/volumes/workflow-data/_data/*/; do \
                 [ -d \"\$udir\" ] && touch \"\$udir.pause\" && \
                   echo \"paused \$udir\"; \
               done; \
               ls -la /var/lib/docker/volumes/workflow-data/_data/*/.pause 2>&1" 2>&1

      # Priority=2 page regardless of auto-repair gate — host needs to
      # know even in WARN-only mode so they can act manually. Matches
      # spec §Q6 repair-branch YAML.
      - name: Page — provider_exhaustion (Pushover priority=2)
        if: steps.classify.outputs.class == 'provider_exhaustion'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          AUTO_REPAIR: ${{ steps.repair_provider_exhaustion_gate.outputs.auto_repair_enabled }}
        run: |
          if [ -z "$PUSHOVER_USER_KEY" ] || [ -z "$PUSHOVER_APP_TOKEN" ]; then
            echo "::warning::Pushover secrets unset — cannot page for provider_exhaustion"
            exit 0
          fi
          if [ "$AUTO_REPAIR" = "true" ]; then
            title="P0 provider_exhaustion — worker halted"
            message="Revert-loop canary fired CRITICAL. Worker stopped + .pause set. Fix provider stack before resume."
          else
            title="P0 provider_exhaustion — WARN only (auto-repair gated off)"
            message="Revert-loop canary fired. Auto-repair NOT enabled (WORKFLOW_REVERT_AUTO_REPAIR unset). Manual intervention required."
          fi
          python scripts/pushover_page.py \
              --title "$title" \
              --message "$message" \
              --priority 2 || echo "::warning::Pushover paging failed"

      # --- Manual-only branch: tunnel token ----------------------------
      # Detection only — we can't auto-rotate the Cloudflare tunnel token
      # (host action). Open a distinct `tunnel-token-rotation` issue so
      # the rotation is tracked separately from the P0 umbrella issue,
      # and page priority=2 so the host knows to act.
      - name: Manual-triage — tunnel token rotation needed
        id: triage_tunnel
        if: steps.classify.outputs.class == 'tunnel_token'
        uses: actions/github-script@v7
        env:
          EVIDENCE: ${{ steps.classify.outputs.evidence }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const label = 'tunnel-token-rotation';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: 'b60205',
                  description: 'Cloudflare tunnel token rotation required (manual).',
                });
              } else { throw e; }
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `TUNNEL TOKEN: rotation required — ${new Date().toISOString()}`,
              labels: [label, 'needs-human'],
              body: [
                `**Auto-triage detected tunnel-token failure** — cloudflared rejected the configured token.`,
                ``,
                `**Evidence:** \`${process.env.EVIDENCE}\``,
                ``,
                `This class is MANUAL-ONLY — auto-triage cannot rotate Cloudflare tunnel tokens.`,
                ``,
                `**Rotation runbook:** Cloudflare dashboard → Zero Trust → Networks → Tunnels → workflow-daemon-prod → rotate token → copy new value → update in:`,
                `  - GH secret: \`gh secret set CLOUDFLARE_TUNNEL_TOKEN --body "<new>"\``,
                `  - Droplet env: update \`/etc/workflow/env\` via \`.github/workflows/deploy-prod.yml\` next deploy`,
                `  - 1Password vault: per \`docs/design-notes/2026-04-22-secrets-vault-integration.md\``,
                ``,
                `**Upstream P0 issue:** #${process.env.ISSUE_NUMBER}`,
                `**Triage run:** ${runUrl}`,
              ].join('\n'),
            });
            console.log('opened tunnel-token-rotation issue + paged priority=2 via umbrella P0');

      # Generic compose restart — belt-and-suspenders for every repair
      # branch except watchdog_hotloop (which already did its own start
      # sequence with a start-limit reset) and tunnel_token (which a
      # restart can't fix; host rotation required). Runs unconditionally
      # for `unknown` too, preserving the legacy behavior that was the
      # entire triage contract before classification existed.
      - name: Attempt compose restart
        id: restart
        if: >
          steps.classify.outputs.class != 'watchdog_hotloop' &&
          steps.classify.outputs.class != 'tunnel_token' &&
          steps.classify.outputs.class != 'provider_exhaustion'
        run: |
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
              "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
              "docker compose -f /opt/workflow/deploy/compose.yml \
                 --env-file /etc/workflow/env \
                 up -d --force-recreate daemon" 2>&1
          echo "restart_attempted=true" >> "$GITHUB_OUTPUT"

      - name: Wait for daemon startup
        run: sleep 30

      - name: Re-probe canonical URL
        id: reprobe
        run: |
          set +e
          output=$(python scripts/mcp_public_canary.py \
              --url "${CANARY_URL}" --verbose 2>&1)
          code=$?
          set -e
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "code=$code"
            echo "output<<${_delim}"
            echo "$output"
            echo "${_delim}"
            if [ "$code" = "0" ]; then
              echo "color=green"
            else
              echo "color=red"
            fi
          } >> "$GITHUB_OUTPUT"
          echo "=== re-probe exit=$code ==="
          echo "$output"

      - name: Comment + close on auto-recovery
        if: steps.reprobe.outputs.color == 'green'
        uses: actions/github-script@v7
        env:
          PREDIAG: ${{ steps.prediag.outputs.diag }}
          REPROBE_OUTPUT: ${{ steps.reprobe.outputs.output }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CLASS: ${{ steps.classify.outputs.class }}
          EVIDENCE: ${{ steps.classify.outputs.evidence }}
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const klass = process.env.CLASS || 'unknown';
            const evidence = process.env.EVIDENCE || '';
            const body = [
              `**AUTO-RECOVERED** via \`${klass}\` class repair @ ${new Date().toISOString()}`,
              ``,
              `Detected class: \`${klass}\``,
              evidence ? `Evidence: \`${evidence}\`` : '',
              `Canonical probe returned green after 30s.`,
              ``,
              `<details><summary>Pre-restart diagnostics</summary>`,
              ``,
              '```',
              (process.env.PREDIAG || '(empty)').trim(),
              '```',
              ``,
              `</details>`,
              ``,
              `<details><summary>Re-probe output</summary>`,
              ``,
              '```',
              (process.env.REPROBE_OUTPUT || '(empty)').trim(),
              '```',
              ``,
              `</details>`,
              ``,
              `Run: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER, 10),
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER, 10),
              state: 'closed',
              state_reason: 'completed',
            });
            console.log(`closed issue #${process.env.ISSUE_NUMBER} as auto-recovered`);

      - name: Add needs-human label on persistent red
        if: steps.reprobe.outputs.color == 'red'
        uses: actions/github-script@v7
        env:
          PREDIAG: ${{ steps.prediag.outputs.diag }}
          REPROBE_OUTPUT: ${{ steps.reprobe.outputs.output }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CLASS: ${{ steps.classify.outputs.class }}
        with:
          script: |
            const label = 'needs-human';
            const klass = process.env.CLASS || 'unknown';
            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'e4e669',
                  description: 'Auto-triage attempted; daemon still red. Manual SSH required.',
                });
              } else {
                throw e;
              }
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              `**AUTO-TRIAGE FAILED** — daemon still red after \`${klass}\` repair @ ${new Date().toISOString()}`,
              ``,
              `Detected class: \`${klass}\``,
              `Repair was attempted but canonical probe is still red.`,
              `Manual SSH investigation required.`,
              ``,
              `<details><summary>Pre-restart diagnostics</summary>`,
              ``,
              '```',
              (process.env.PREDIAG || '(empty)').trim(),
              '```',
              ``,
              `</details>`,
              ``,
              `<details><summary>Re-probe output (still red)</summary>`,
              ``,
              '```',
              (process.env.REPROBE_OUTPUT || '(empty)').trim(),
              '```',
              ``,
              `</details>`,
              ``,
              `Run: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER, 10),
              body,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER, 10),
              labels: [label],
            });
            console.log(`added ${label} to #${process.env.ISSUE_NUMBER}`);
            // Exit non-zero so GHA marks the run as failed — surfacing it
            // prominently in the Actions tab for human attention.
            process.exitCode = 1;

      - name: Summary
        if: always()
        run: |
          {
            echo "### P0 auto-triage result"
            echo ""
            echo "- **Issue:** #${{ github.event.issue.number }}"
            echo "- **Class:** \`${{ steps.classify.outputs.class }}\`"
            echo "- **Auto-repairable:** \`${{ steps.classify.outputs.auto_repairable }}\`"
            echo "- **Manual-only:** \`${{ steps.classify.outputs.manual_only }}\`"
            echo "- **Repair branch outcomes:**"
            echo "  - env_unreadable: \`${{ steps.repair_env.outcome }}\`"
            echo "  - oom: \`${{ steps.repair_oom.outcome }}\`"
            echo "  - disk_full: \`${{ steps.repair_disk.outcome }}\`"
            echo "  - image_pull: \`${{ steps.repair_pull.outcome }}\`"
            echo "  - watchdog_hotloop: \`${{ steps.repair_watchdog.outcome }}\`"
            echo "  - tunnel_token: \`${{ steps.triage_tunnel.outcome }}\`"
            echo "  - provider_exhaustion (gate): \`${{ steps.repair_provider_exhaustion_gate.outcome }}\` (enabled=${{ steps.repair_provider_exhaustion_gate.outputs.auto_repair_enabled }})"
            echo "  - provider_exhaustion (repair): \`${{ steps.repair_provider_exhaustion.outcome }}\`"
            echo "- **Generic restart attempted:** \`${{ steps.restart.outcome }}\`"
            echo "- **Re-probe:** \`${{ steps.reprobe.outputs.color }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
