name: actionlint

# Fail-the-PR gate for GH Actions workflow changes. Complements the
# scripts/git-hooks/pre-commit invariant #7 — local hook is fast-feedback,
# this is the authoritative gate. Dev has flagged actionlint as missing
# locally on 3 consecutive tasks; this closes that gap.
#
# Scope: only runs when a PR or push touches .github/workflows/*.yml
# (including this file). Does NOT scan the whole repo on unrelated PRs.
# Does NOT bulk-lint pre-existing issues outside touched files — the
# `-filter` flag scopes findings to changed lines only via the reviewdog
# integration. Without that, we'd block every PR on unrelated pre-
# existing warnings.

on:
  pull_request:
    paths:
      - ".github/workflows/**.yml"
      - ".github/workflows/**.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**.yml"
      - ".github/workflows/**.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install actionlint
        id: install
        run: |
          # Upstream rhysd release — pinned by version AND SHA256 to
          # prevent supply-chain drift at both the DNS and the bytes
          # level. Bump deliberately: update both ACTIONLINT_VERSION
          # and ACTIONLINT_SHA256 at the same time. The SHA256 can be
          # read from the release's actionlint_<version>_checksums.txt
          # and independently verified by downloading + sha256sum-ing
          # the tarball.
          ACTIONLINT_VERSION="1.7.7"
          ACTIONLINT_SHA256="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          curl -fsSL -o /tmp/actionlint.tgz \
              "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tgz" | sha256sum -c -
          mkdir -p /tmp/actionlint
          tar -xzf /tmp/actionlint.tgz -C /tmp/actionlint
          sudo install -m 0755 /tmp/actionlint/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Resolve changed workflow files
        id: changed
        run: |
          # For pull_request and push events, diff against the event range so
          # we only lint workflow files this change touched.
          # Manual dispatch remains an explicit all-workflows audit.
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed=$(git diff --name-only --diff-filter=ACMR \
                "${base}" "${head}" \
                | grep -E '^\.github/workflows/.+\.ya?ml$' || true)
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ "${base}" = "0000000000000000000000000000000000000000" ]; then
              changed=$(ls .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null || true)
            else
              changed=$(git diff --name-only --diff-filter=ACMR \
                  "${base}" "${head}" \
                  | grep -E '^\.github/workflows/.+\.ya?ml$' || true)
            fi
          else
            changed=$(ls .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null || true)
          fi
          if [ -z "${changed}" ]; then
            echo "no workflow files to lint"
            echo "paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Emit as space-separated single-line list.
          paths=$(echo "${changed}" | tr '\n' ' ' | sed 's/ *$//')
          echo "paths=${paths}" >> "$GITHUB_OUTPUT"
          echo "will lint:"
          echo "${changed}"

      - name: Run actionlint
        if: steps.changed.outputs.paths != ''
        run: |
          set -euo pipefail
          # Intentional word-splitting on paths.
          # shellcheck disable=SC2086
          actionlint ${{ steps.changed.outputs.paths }}

      - name: Summary
        if: always()
        run: |
          {
            echo "### actionlint result"
            echo ""
            echo "- **Event:** \`${{ github.event_name }}\`"
            echo "- **Paths:** \`${{ steps.changed.outputs.paths }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
