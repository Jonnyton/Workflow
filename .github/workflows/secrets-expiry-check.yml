name: Secrets expiry check

on:
  schedule:
    - cron: "23 10 1 * *"
  workflow_dispatch:
    inputs:
      threshold_days:
        description: Open an issue when a secret expires within this many days.
        required: false
        default: "30"
      dry_run:
        description: Print would-open issues without creating them.
        required: true
        type: boolean
        default: true
      metadata_json:
        description: Optional JSON array overriding SECRETS_EXPIRY_METADATA_JSON.
        required: false

permissions:
  contents: read
  issues: write

jobs:
  check-secrets-expiry:
    name: Check known secret expiry dates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check expiry metadata and open issues
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METADATA_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.metadata_json || vars.SECRETS_EXPIRY_METADATA_JSON || '' }}
          THRESHOLD_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.threshold_days || '30' }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          DEFAULT_METADATA = [
              {
                  "name": "CLOUDFLARE_API_TOKEN",
                  "provider": "cloudflare",
                  "check": "cloudflare_verify",
                  "runbook": "docs/ops/host-independence-runbook.md#cloudflare-api-token",
              },
              {
                  "name": "CLOUDFLARE_ZONE_ID",
                  "provider": "cloudflare",
                  "expires_on": None,
                  "non_expiring": True,
                  "runbook": "docs/ops/host-independence-runbook.md#cloudflare-zone-id",
              },
              {
                  "name": "HETZNER_API_TOKEN",
                  "provider": "hetzner",
                  "expires_on": None,
                  "runbook": "docs/ops/host-independence-runbook.md#hetzner-api-token",
              },
              {
                  "name": "SUPABASE_SERVICE_ROLE_KEY",
                  "provider": "supabase",
                  "expires_on": None,
                  "runbook": "docs/ops/host-independence-runbook.md#supabase-service-role-key",
              },
              {
                  "name": "GITHUB_OAUTH_CLIENT_SECRET",
                  "provider": "github",
                  "expires_on": None,
                  "runbook": "docs/ops/host-independence-runbook.md#github-oauth-client-secret",
              },
          ]

          def parse_bool(value: str) -> bool:
              return value.lower() in {"1", "true", "yes", "on"}

          def parse_expiry(value: str | None) -> dt.datetime | None:
              if not value:
                  return None
              text = value.replace("Z", "+00:00")
              if len(text) == 10:
                  return dt.datetime.fromisoformat(text).replace(tzinfo=dt.UTC)
              parsed = dt.datetime.fromisoformat(text)
              if parsed.tzinfo is None:
                  parsed = parsed.replace(tzinfo=dt.UTC)
              return parsed.astimezone(dt.UTC)

          def github_request(method: str, path: str, payload: dict | None = None) -> dict | list:
              repo = os.environ["GITHUB_REPOSITORY"]
              token = os.environ["GITHUB_TOKEN"]
              url = f"https://api.github.com/repos/{repo}{path}"
              data = json.dumps(payload).encode("utf-8") if payload is not None else None
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "User-Agent": "workflow-secrets-expiry/1.0",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read()
              return json.loads(body.decode("utf-8")) if body else {}

          def cloudflare_verify() -> dict:
              token = os.getenv("CLOUDFLARE_API_TOKEN", "")
              if not token:
                  return {}
              req = urllib.request.Request(
                  "https://api.cloudflare.com/client/v4/user/tokens/verify",
                  method="GET",
                  headers={
                      "Accept": "application/json",
                      "Authorization": f"Bearer {token}",
                      "User-Agent": "workflow-secrets-expiry/1.0",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              if payload.get("success") is False:
                  raise RuntimeError(f"Cloudflare token verify failed: {payload.get('errors')}")
              return payload.get("result") or {}

          def load_metadata() -> list[dict]:
              raw = os.getenv("METADATA_JSON", "").strip()
              if not raw:
                  return DEFAULT_METADATA
              parsed = json.loads(raw)
              if not isinstance(parsed, list):
                  raise TypeError("metadata_json must be a JSON array")
              return parsed

          threshold_days = int(os.getenv("THRESHOLD_DAYS", "30"))
          dry_run = parse_bool(os.getenv("DRY_RUN", "false"))
          now = dt.datetime.now(dt.UTC)

          metadata = load_metadata()
          cf_verify_cache: dict | None = None
          open_issues = github_request("GET", "/issues?state=open&per_page=100")
          open_titles = {
              issue.get("title", "")
              for issue in open_issues
              if isinstance(issue, dict) and "pull_request" not in issue
          }

          expired_count = 0
          expiring_count = 0
          missing_metadata = []

          for item in metadata:
              name = item["name"]
              if item.get("non_expiring"):
                  print(f"OK {name}: marked non-expiring")
                  continue

              expiry_text = item.get("expires_on")
              status = item.get("status", "unknown")

              if item.get("check") == "cloudflare_verify":
                  if cf_verify_cache is None:
                      cf_verify_cache = cloudflare_verify()
                  expiry_text = cf_verify_cache.get("expires_on") or expiry_text
                  status = cf_verify_cache.get("status") or status

              expiry = parse_expiry(expiry_text)
              if expiry is None:
                  missing_metadata.append(name)
                  continue

              days = (expiry.date() - now.date()).days
              if days > threshold_days:
                  print(f"OK {name}: expires in {days} days")
                  continue

              expiring_count += 1
              if days <= 0:
                  expired_count += 1

              title = f"SECRET EXPIRY: {name} in {days} days"
              prefix = f"SECRET EXPIRY: {name} "
              body = "\n".join([
                  f"`{name}` expires on `{expiry.date().isoformat()}` ({days} days).",
                  f"Provider: `{item.get('provider', 'unknown')}`.",
                  f"Current status: `{status}`.",
                  "",
                  f"Rotation runbook: `{item.get('runbook', 'docs/ops/host-independence-runbook.md')}`.",
                  "",
                  "This issue was opened by `.github/workflows/secrets-expiry-check.yml`.",
              ])

              if any(existing.startswith(prefix) for existing in open_titles):
                  print(f"Existing open issue already covers {name}; skipping duplicate.")
                  continue

              if dry_run:
                  print(f"DRY-RUN would create issue: {title}")
                  continue

              github_request("POST", "/issues", {"title": title, "body": body})
              print(f"Created issue: {title}")

          for name in missing_metadata:
              print(f"::warning::No expiry metadata configured for {name}")

          if expiring_count == 0:
              print("No known secrets inside expiry threshold.")
          if expired_count:
              print(f"::error::{expired_count} known secret(s) are expired.")
              sys.exit(1)
          PY
