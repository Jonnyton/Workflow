name: LLM binding canary

# Scheduled probe that calls get_status on the live daemon and checks
# that llm_endpoint_bound != "unset". Opens an llm-binding-red GH Issue
# after 2 consecutive reds; closes it on recovery.
#
# Why: verify_llm_binding.py was previously run only from the host
# machine. When host is offline, silent binding loss (subscription auth
# expiry, codex CLI drift, docker restart) goes undetected for hours.
# This workflow runs on GitHub's infra every 6h — zero host dependency.
#
# Consecutive-state: open llm-binding-red issue IS the state.
# First red = log + step summary, no issue. Second red = open issue.
# Recovery (green after issue open) = comment RECOVERED + close.

on:
  schedule:
    # Every 6 hours — binding changes are slow-drift, not transient blips.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: llm-binding-canary
  cancel-in-progress: false

env:
  PROBE_URL: https://tinyassets.io/mcp
  ALARM_ISSUE_LABEL: llm-binding-red
  ALARM_THRESHOLD: 2

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      overall: ${{ steps.probe.outputs.overall }}
      status: ${{ steps.probe.outputs.status }}
      msg: ${{ steps.probe.outputs.msg }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Probe LLM binding
        id: probe
        continue-on-error: true
        run: |
          set +e
          output=$(python scripts/verify_llm_binding.py \
            --url "${PROBE_URL}" --timeout 20 2>&1)
          code=$?
          set -e
          _delim="EOF_$(tr -d '-' < /proc/sys/kernel/random/uuid)"
          {
            echo "status=$code"
            echo "msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
            if [ "$code" = "0" ]; then
              echo "overall=green"
            else
              echo "overall=red"
            fi
          } >> "$GITHUB_OUTPUT"
          echo "=== llm-binding probe exit=$code ==="
          echo "$output"
          exit $code

  alarm-sink:
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Gate on consecutive-red threshold + manage issue
        uses: actions/github-script@v7
        env:
          OVERALL: ${{ needs.probe.outputs.overall }}
          PROBE_STATUS: ${{ needs.probe.outputs.status }}
          PROBE_MSG: ${{ needs.probe.outputs.msg }}
          LABEL: ${{ env.ALARM_ISSUE_LABEL }}
          THRESHOLD: ${{ env.ALARM_THRESHOLD }}
          PROBE_URL: ${{ env.PROBE_URL }}
        with:
          script: |
            const overall = process.env.OVERALL;
            const label = process.env.LABEL;
            const threshold = parseInt(process.env.THRESHOLD, 10);
            const probeStatus = process.env.PROBE_STATUS;
            const probeMsg = process.env.PROBE_MSG || '';
            const now = new Date().toISOString();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'e4e669',
                  description: 'Auto-opened by LLM binding canary when endpoint_bound=unset.',
                });
                console.log(`created label ${label}`);
              } else {
                throw e;
              }
            }

            // Find open issue for this label (expect 0 or 1).
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            });
            const openIssue = openIssues.data[0] || null;

            async function previousRunWasRed() {
              const prior = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'llm-binding-canary.yml',
                status: 'completed',
                per_page: 5,
              });
              const priorRuns = (prior.data.workflow_runs || []).filter(
                r => String(r.id) !== process.env.GITHUB_RUN_ID,
              );
              if (!priorRuns.length) return false;
              return priorRuns[0].conclusion === 'failure';
            }

            function formatBody(kind) {
              return [
                `**${kind}** @ ${now}`,
                ``,
                `- endpoint → \`${process.env.PROBE_URL}\``,
                `- verify exit → \`${probeStatus}\``,
                ``,
                `<details><summary>probe output</summary>`,
                ``,
                '```',
                probeMsg.trim() || '(empty)',
                '```',
                ``,
                `</details>`,
                ``,
                `Run: ${runUrl}`,
              ].join('\n');
            }

            if (overall === 'red') {
              if (openIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: openIssue.number,
                  body: formatBody('RED'),
                });
                console.log(`appended RED to #${openIssue.number}`);
                return;
              }

              const priorRed = await previousRunWasRed();
              if (priorRed) {
                const result = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `LLM binding lost — daemon endpoint_bound=unset @ ${now}`,
                  labels: [label],
                  body: [
                    `Auto-opened by the LLM binding canary after ${threshold} consecutive reds.`,
                    `Daemon at \`${process.env.PROBE_URL}\` reports no LLM provider bound.`,
                    ``,
                    `Likely causes: subscription auth missing/expired, codex CLI missing ` +
                    `from image, or container restarted without the env file.`,
                    ``,
                    `See: \`scripts/verify_llm_binding.py\` + \`docs/ops/host-independence-runbook.md\``,
                    ``,
                    formatBody('RED (threshold crossed)'),
                  ].join('\n'),
                });
                console.log(`opened issue #${result.data.number} (threshold crossed)`);
              } else {
                console.log('first-red — not yet alarming. Next red will open issue.');
              }
              return;
            }

            // GREEN path.
            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: formatBody('GREEN — RECOVERED'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`closed #${openIssue.number} as RECOVERED`);
            } else {
              console.log('steady green — no action');
            }

      - name: Summary
        if: always()
        run: |
          {
            echo "### LLM binding canary result"
            echo ""
            echo "- **endpoint** → \`${{ env.PROBE_URL }}\`"
            echo "- **verify exit** → \`${{ needs.probe.outputs.status }}\`"
            echo "- **overall** → **${{ needs.probe.outputs.overall }}**"
          } >> "$GITHUB_STEP_SUMMARY"
