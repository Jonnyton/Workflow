name: Docker build smoke

# Self-host migration Row A drift protection per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Fires on any change that could plausibly break the Dockerfile build:
# the Dockerfile itself, .dockerignore, pyproject.toml (dep changes),
# workflow/** (source the builder stage installs), deploy/** (future
# Row C + D wiring). Manual dispatch for host-triggered re-verification.
#
# Intentionally NOT folded into tier3-oss-clone-nightly — that one runs
# at 07:17 UTC on a schedule. Dockerfile changes want push-triggered
# feedback, not overnight discovery.

on:
  push:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'pyproject.toml'
      - 'workflow/**'
      - 'domains/**'
      - 'deploy/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'pyproject.toml'
      - 'workflow/**'
      - 'domains/**'
      - 'deploy/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Workflow daemon image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: workflow-daemon:ci
          load: true                  # keep the image local for the run step
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --rm \
              --name workflow-daemon-ci \
              -p 8001:8001 \
              workflow-daemon:ci

          # Give uvicorn + FastMCP a moment to bind. Poll rather than
          # sleep-blindly so slow cold-starts don't false-fail.
          for i in $(seq 1 30); do
            if curl -sS -o /dev/null -w "%{http_code}" \
                 -X POST http://localhost:8001/mcp \
                 -H "Content-Type: application/json" \
                 -H "Accept: application/json, text/event-stream" \
                 -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
                 | grep -q '^200$'; then
              echo "Daemon reachable after $i poll(s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Daemon never became reachable on port 8001"
          docker logs workflow-daemon-ci || true
          exit 1

      - name: MCP initialize smoke
        run: |
          # Full MCP handshake via the same canary script the live tray
          # uses. Exit 0 = green image; any nonzero = regression to
          # investigate.
          python scripts/mcp_public_canary.py \
              --url http://localhost:8001/mcp \
              --timeout 15 \
              --verbose

      - name: Container logs on success
        if: success()
        run: docker logs workflow-daemon-ci | tail -50 || true

      - name: Container logs on failure
        if: failure()
        run: |
          echo "::error::Docker build or smoke failed"
          docker logs workflow-daemon-ci 2>&1 || true
          docker ps -a || true

      - name: Stop container
        if: always()
        run: docker stop workflow-daemon-ci || true
