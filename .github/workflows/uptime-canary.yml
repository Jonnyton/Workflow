name: Uptime canary

# Row H of the self-host migration (cloud-canary + out-of-band alarm sink).
# Spec: docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Host directive 2026-04-20: retire mcp.tinyassets.io/mcp as a public URL.
# Canonical is tinyassets.io/mcp ONLY. Canary probes the single canonical.
#
# What this closes:
#   - Pre-Row-H, Layer-1 uptime canary ran on the HOST's Windows Task
#     Scheduler. Host box offline = no canary = no alarm = no signal
#     that the platform is down. Host-fate-sharing defeats the canary.
#   - This workflow runs on GitHub's infrastructure every 5 min (GHA
#     cron minimum) + manual dispatch. Independent vantage point.
#   - On 2 consecutive reds, automation opens / updates a GitHub issue
#     labeled `p0-outage`. Out-of-band alarm sink — zero new deps,
#     reuses issue infrastructure, host gets emailed by GitHub.
#   - On GREEN after reds, comments "RECOVERED" + closes the issue.
#
# Consecutive-state: open P0 issue IS the state. First red = log only.
# Second red (prior run conclusion=failure) = open issue. Recovery = close.

on:
  schedule:
    # Every 5 min — GHA cron granularity. Drift tolerance: ±1 min per
    # GHA's best-effort schedule policy.
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Permissions: canary reads repo; alarm sink writes issues.
permissions:
  contents: read
  issues: write

# Avoid piled-up runs if probe or alarm step is slow.
concurrency:
  group: uptime-canary
  cancel-in-progress: false

env:
  # Single canonical public endpoint (host directive 2026-04-20).
  PROBE_URL: https://tinyassets.io/mcp
  ALARM_ISSUE_LABEL: p0-outage
  # Number of consecutive reds before alarming. 2 = "≥5 min outage
  # (at 5-min cadence)" to filter transient Cloudflare blips.
  ALARM_THRESHOLD: 2

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      status: ${{ steps.probe.outputs.status }}
      msg: ${{ steps.probe.outputs.msg }}
      overall: ${{ steps.probe.outputs.overall }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Probe canonical URL
        id: probe
        continue-on-error: true
        run: |
          set +e
          output=$(python scripts/mcp_public_canary.py --url "${PROBE_URL}" --verbose 2>&1)
          code=$?
          set -e
          # Escape newlines for $GITHUB_OUTPUT multiline capture.
          # Use a random delimiter so probe output containing bare CANARY_EOF
          # cannot close the heredoc early and corrupt $GITHUB_OUTPUT.
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "status=$code"
            echo "msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
            if [ "$code" = "0" ]; then
              echo "overall=green"
            else
              echo "overall=red"
            fi
          } >> "$GITHUB_OUTPUT"
          echo "=== probe (${PROBE_URL}) exit=$code ==="
          echo "$output"
          # Exit non-zero on red so run conclusion reflects canary color.
          # alarm-sink uses prior-run conclusion to detect consecutive reds.
          exit $code

  layer2-probe:
    # Layer-2: Claude.ai connector liveness. Runs headless via injectable
    # _probe_fn — in GHA there is no real browser, so this step detects the
    # absence of a real browser and exits SKIP (14, treated as 0).
    # SOFT_YELLOW signals (fabrication-mode suspected) write to the alarm log
    # and are echoed to stdout via GHA-mode in uptime_alarm.py; they do NOT
    # open GH issues (that path is Layer-1 only).
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      l2_status: ${{ steps.l2probe.outputs.l2_status }}
      l2_semantic: ${{ steps.l2probe.outputs.l2_semantic }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Layer-2 connector probe
        id: l2probe
        continue-on-error: true
        env:
          GITHUB_ACTIONS: "true"
        run: |
          set +e
          python scripts/uptime_canary_layer2.py --once 2>&1
          code=$?
          set -e
          # Map exit code to human-readable semantic.
          case "$code" in
            0)  semantic="GREEN_OR_SOFT_YELLOW" ;;
            10) semantic="RED_tool_not_invoked" ;;
            12) semantic="RED_field_not_matched" ;;
            13) semantic="RED_browser_load_error" ;;
            14) semantic="SKIP_lock_unavailable" ;;
            15) semantic="RED_auth_expired" ;;
            *)  semantic="RED_unexpected_exit_${code}" ;;
          esac
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "l2_status=$code"
            echo "l2_semantic<<${_delim}"
            echo "$semantic"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== layer-2 probe exit=$code semantic=$semantic ==="
          # SKIP (14) and GREEN/SOFT_YELLOW (0) are both non-failure for GHA.
          # RED exits (10/12/13/15/99) make this step fail.
          if [ "$code" != "0" ] && [ "$code" != "14" ]; then
            exit $code
          fi

      - name: Layer-2 alarm evaluation (GHA mode)
        if: always()
        env:
          GITHUB_ACTIONS: "true"
        run: |
          # GITHUB_ACTIONS=true: uptime_alarm.py mirrors new alarm lines to
          # stdout so they appear in workflow output without fetching the file.
          python scripts/uptime_alarm.py --verbose

      - name: Layer-2 Summary
        if: always()
        run: |
          echo "### Layer-2 connector probe" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **exit** → \`${{ steps.l2probe.outputs.l2_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **semantic** → ${{ steps.l2probe.outputs.l2_semantic }}" >> "$GITHUB_STEP_SUMMARY"

  alarm-sink:
    # Runs on every tick so it can close issues after recovery too.
    # `if: always()` because the probe job intentionally exits non-zero
    # on red — without always(), alarm-sink would skip on every red run.
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Gate on consecutive-red threshold + manage issue
        uses: actions/github-script@v7
        env:
          OVERALL: ${{ needs.probe.outputs.overall }}
          PROBE_STATUS: ${{ needs.probe.outputs.status }}
          PROBE_MSG: ${{ needs.probe.outputs.msg }}
          LABEL: ${{ env.ALARM_ISSUE_LABEL }}
          THRESHOLD: ${{ env.ALARM_THRESHOLD }}
          PROBE_URL: ${{ env.PROBE_URL }}
        with:
          script: |
            const overall = process.env.OVERALL;
            const label = process.env.LABEL;
            const threshold = parseInt(process.env.THRESHOLD, 10);
            const probeStatus = process.env.PROBE_STATUS;
            const probeMsg = process.env.PROBE_MSG || '';
            const now = new Date().toISOString();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Auto-opened by uptime canary on public MCP outage.',
                });
                console.log(`created label ${label}`);
              } else {
                throw e;
              }
            }

            // Find open p0-outage issue (expect 0 or 1).
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            });
            const openIssue = openIssues.data[0] || null;

            // Consecutive-red detection: prior run conclusion=failure means red.
            async function previousRunWasRed() {
              const prior = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: context.workflow,
                status: 'completed',
                per_page: 5,
              });
              const priorRuns = (prior.data.workflow_runs || []).filter(
                r => String(r.id) !== process.env.GITHUB_RUN_ID,
              );
              if (!priorRuns.length) return false;
              return priorRuns[0].conclusion === 'failure';
            }

            function formatBody(kind) {
              return [
                `**${kind}** @ ${now}`,
                ``,
                `- \`${process.env.PROBE_URL}\` → exit ${probeStatus}`,
                ``,
                `<details><summary>probe output</summary>`,
                ``,
                '```',
                probeMsg.trim() || '(empty)',
                '```',
                ``,
                `</details>`,
                ``,
                `Run: ${runUrl}`,
              ].join('\n');
            }

            if (overall === 'red') {
              if (openIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: openIssue.number,
                  body: formatBody('RED'),
                });
                console.log(`appended RED to #${openIssue.number}`);
                return;
              }

              const priorRed = await previousRunWasRed();
              if (priorRed) {
                const result = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `P0 Public MCP outage — ${now}`,
                  labels: [label],
                  body: [
                    `Auto-opened by the uptime canary after ${threshold} consecutive reds.`,
                    `This issue tracks the outage window; comments append per tick.`,
                    ``,
                    formatBody('RED (threshold crossed)'),
                  ].join('\n'),
                });
                console.log(`opened issue #${result.data.number} (threshold crossed)`);
              } else {
                console.log('first-red — not yet alarming. Next red will open issue.');
              }
              return;
            }

            // GREEN path.
            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: formatBody('GREEN — RECOVERED'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`closed #${openIssue.number} as RECOVERED`);
            } else {
              console.log('steady green — no action');
            }

      - name: Summary
        if: always()
        run: |
          echo "### Uptime canary result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **${{ env.PROBE_URL }}** → exit \`${{ needs.probe.outputs.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **overall** → **${{ needs.probe.outputs.overall }}**" >> "$GITHUB_STEP_SUMMARY"
