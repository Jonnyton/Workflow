name: Uptime canary

# Row H of the self-host migration (cloud-canary + out-of-band alarm sink).
# Spec: docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Host directive 2026-04-20: retire mcp.tinyassets.io/mcp as a public URL.
# Canonical is tinyassets.io/mcp ONLY. Canary probes the single canonical.
#
# What this closes:
#   - Pre-Row-H, Layer-1 uptime canary ran on the HOST's Windows Task
#     Scheduler. Host box offline = no canary = no alarm = no signal
#     that the platform is down. Host-fate-sharing defeats the canary.
#   - This workflow runs on GitHub's infrastructure every 5 min (GHA
#     cron minimum) + manual dispatch. Independent vantage point.
#   - On 2 consecutive reds, automation opens / updates a GitHub issue
#     labeled `p0-outage`. Out-of-band alarm sink — zero new deps,
#     reuses issue infrastructure, host gets emailed by GitHub.
#   - On GREEN after reds, comments "RECOVERED" + closes the issue.
#
# Consecutive-state: open P0 issue IS the state. First red = log only.
# Second red (prior run conclusion=failure) = open issue. Recovery = close.

on:
  schedule:
    # Every 5 min — GHA cron granularity. Drift tolerance: ±1 min per
    # GHA's best-effort schedule policy.
    - cron: '*/5 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy prod"]
    types: [completed]

# Permissions: canary reads repo; alarm sink writes issues.
permissions:
  contents: read
  issues: write

# Avoid piled-up runs if probe or alarm step is slow.
concurrency:
  group: uptime-canary
  cancel-in-progress: false

env:
  # Single canonical public endpoint (host directive 2026-04-20).
  PROBE_URL: https://tinyassets.io/mcp
  ALARM_ISSUE_LABEL: p0-outage
  # Number of consecutive reds before alarming. 2 = "≥5 min outage
  # (at 5-min cadence)" to filter transient Cloudflare blips.
  ALARM_THRESHOLD: 2

jobs:
  probe:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # Combined outputs across handshake + tool-invocation sub-probes.
      # alarm-sink reads these same keys as before.
      status: ${{ steps.combine.outputs.status }}
      msg: ${{ steps.combine.outputs.msg }}
      overall: ${{ steps.combine.outputs.overall }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Layer-1a: MCP handshake. Proves the daemon answers `initialize`.
      - name: Probe canonical URL (handshake)
        id: probe
        continue-on-error: true
        run: |
          set +e
          output=$(python scripts/mcp_public_canary.py --url "${PROBE_URL}" --verbose 2>&1)
          code=$?
          set -e
          # Escape newlines for $GITHUB_OUTPUT multiline capture.
          # Use a random delimiter so probe output containing bare CANARY_EOF
          # cannot close the heredoc early and corrupt $GITHUB_OUTPUT.
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "handshake_status=$code"
            echo "handshake_msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== handshake probe (${PROBE_URL}) exit=$code ==="
          echo "$output"
          # DO NOT exit here — we want to still run the tool canary if
          # handshake passed, and combine results in the summary step
          # below. continue-on-error=true ensures the step doesn't fail
          # the job on its own.

      # Layer-1b: tool-invocation canary. Proves a real tool handler
      # executes end-to-end — closes the "handshake-green, tool-handler-
      # crashed" gap. Only runs if handshake was green (if the daemon
      # isn't answering initialize, the tool canary can't progress past
      # step 1 anyway — skip to save log noise).
      - name: Tool-invocation canary (universe inspect)
        id: tool_probe
        continue-on-error: true
        if: steps.probe.outputs.handshake_status == '0'
        run: |
          set +e
          output=$(python scripts/mcp_tool_canary.py \
              --url "${PROBE_URL}" --timeout 20 --verbose 2>&1)
          code=$?
          set -e
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "tool_status=$code"
            echo "tool_msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== tool canary (${PROBE_URL}) exit=$code ==="
          echo "$output"

      # Layer-1c: last_activity canary (Task #15). Proves node
      # execution is 24/7, not just MCP surface. Reads daemon.
      # last_activity_at from `universe action=inspect` and pages
      # if it's older than WORKFLOW_LAST_ACTIVITY_THRESHOLD_MIN
      # (default 30min). Closes the "MCP is green but node execution
      # is stalled" gap — exactly the state seen live 2026-04-22
      # before Task #14 landed the cloud-side worker.
      #
      # Only runs when both handshake AND tool-canary are green — if
      # the daemon isn't speaking MCP or its tool handler crashed,
      # last_activity_at is meaningless to check.
      - name: Last-activity canary (node execution 24/7)
        id: activity_probe
        continue-on-error: true
        if: >
          steps.probe.outputs.handshake_status == '0' &&
          steps.tool_probe.outputs.tool_status == '0'
        run: |
          set +e
          output=$(python scripts/last_activity_canary.py \
              --url "${PROBE_URL}" --timeout 20 --verbose 2>&1)
          code=$?
          set -e
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "activity_status=$code"
            echo "activity_msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== last-activity canary (${PROBE_URL}) exit=$code ==="
          echo "$output"

      # Layer-1d — revert-loop canary (BUG-023 Lane 4a). Catches the
      # "daemon is writing but every draft fails" class — distinct from
      # dark daemon (handshake red), broken tool handler (tool red), and
      # stalled worker (activity red). 2026-04-23 P0 signature: 67
      # consecutive REVERT verdicts on concordance while MCP stayed green.
      #
      # Runs only when handshake + tool are green; revert-loop is a
      # work-quality signal, meaningful only when MCP itself is healthy.
      # Does NOT require activity_probe green — activity can be fresh
      # (new writes happening) WHILE all those writes are failing; that
      # is the exact state this canary targets.
      - name: Revert-loop canary (work-quality 24/7)
        id: revert_loop_probe
        continue-on-error: true
        if: >
          steps.probe.outputs.handshake_status == '0' &&
          steps.tool_probe.outputs.tool_status == '0'
        run: |
          set +e
          output=$(python scripts/revert_loop_canary.py \
              --url "${PROBE_URL}" --timeout 20 --verbose 2>&1)
          code=$?
          set -e
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "revert_status=$code"
            echo "revert_msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== revert-loop canary (${PROBE_URL}) exit=$code ==="
          echo "$output"

      # Layer-1e — wiki write-roundtrip canary (PROBE-003). Catches the
      # "wiki-write silently broken" class — distinct from dark daemon
      # (handshake red), broken tool handler (tool red), stalled worker
      # (activity red), and busy-broken (revert red). BUG-028 demonstrated
      # that a slug-normalization bug could silently break bug filing
      # while every Layer-1 probe above stayed green.
      #
      # Wiki-write reachability is forever-rule-tier per
      # `project_wiki_is_uptime_surface`: chatbots filing bugs depend on
      # wiki writes succeeding; when that breaks the auto-heal pipeline
      # breaks. Treat wiki-write breakage as P0 uptime, not a normal bug.
      #
      # Runs only when handshake + tool are green; wiki round-trip is
      # meaningless when MCP itself is down. Does NOT require activity
      # or revert green — wiki writes are independent of node execution.
      - name: Wiki write-roundtrip canary (auto-heal pipeline 24/7)
        id: wiki_probe
        continue-on-error: true
        if: >
          steps.probe.outputs.handshake_status == '0' &&
          steps.tool_probe.outputs.tool_status == '0'
        run: |
          set +e
          output=$(python scripts/wiki_canary.py \
              --url "${PROBE_URL}" --timeout 20 --verbose 2>&1)
          code=$?
          set -e
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "wiki_status=$code"
            echo "wiki_msg<<${_delim}"
            echo "$output"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== wiki canary (${PROBE_URL}) exit=$code ==="
          echo "$output"

      # Combine handshake + tool + last_activity + revert-loop + wiki
      # canary results into the single probe.outputs.overall the alarm-sink
      # reads. Red if ANY step failed. `status` reports the worst exit
      # code so downstream paging messages surface the meaningful signal.
      - name: Combine canary results
        id: combine
        run: |
          handshake="${{ steps.probe.outputs.handshake_status }}"
          tool="${{ steps.tool_probe.outputs.tool_status }}"
          activity="${{ steps.activity_probe.outputs.activity_status }}"
          revert="${{ steps.revert_loop_probe.outputs.revert_status }}"
          wiki="${{ steps.wiki_probe.outputs.wiki_status }}"
          # If a downstream step was skipped (because an upstream went
          # red), its *_status is empty. Report the real upstream exit
          # code rather than a synthetic sentinel so operator-facing
          # paging carries documented ladder codes. Priority: handshake
          # > tool > activity > revert > wiki (upstream-wins; if
          # handshake failed the downstream steps never ran meaningfully).
          if [ "${handshake}" != "0" ]; then
            worst="${handshake}"
          elif [ -n "${tool}" ] && [ "${tool}" != "0" ]; then
            worst="${tool}"
          elif [ -n "${activity}" ] && [ "${activity}" != "0" ]; then
            worst="${activity}"
          elif [ -n "${revert}" ] && [ "${revert}" != "0" ]; then
            worst="${revert}"
          elif [ -n "${wiki}" ] && [ "${wiki}" != "0" ]; then
            worst="${wiki}"
          else
            worst="0"
          fi
          # Display-only: if a step was skipped, label the display so
          # the combined msg in the paging issue is clear about what
          # ran vs. what didn't.
          if [ -z "${tool}" ]; then
            tool="(skipped — handshake red)"
          fi
          if [ -z "${activity}" ]; then
            activity="(skipped — upstream red)"
          fi
          if [ -z "${revert}" ]; then
            revert="(skipped — upstream red)"
          fi
          if [ -z "${wiki}" ]; then
            wiki="(skipped — upstream red)"
          fi
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          msg_handshake="${{ steps.probe.outputs.handshake_msg }}"
          msg_tool="${{ steps.tool_probe.outputs.tool_msg }}"
          msg_activity="${{ steps.activity_probe.outputs.activity_msg }}"
          msg_revert="${{ steps.revert_loop_probe.outputs.revert_msg }}"
          msg_wiki="${{ steps.wiki_probe.outputs.wiki_msg }}"
          {
            echo "status=${worst}"
            echo "msg<<${_delim}"
            echo "--- handshake (exit ${handshake}) ---"
            echo "${msg_handshake}"
            echo ""
            echo "--- tool-canary (exit ${tool}) ---"
            echo "${msg_tool}"
            echo ""
            echo "--- last-activity (exit ${activity}) ---"
            echo "${msg_activity}"
            echo ""
            echo "--- revert-loop (exit ${revert}) ---"
            echo "${msg_revert}"
            echo ""
            echo "--- wiki-roundtrip (exit ${wiki}) ---"
            echo "${msg_wiki}"
            echo "${_delim}"
            if [ "${handshake}" = "0" ] && [ "${tool}" = "0" ] \
               && ([ "${activity}" = "0" ] \
                   || [ "${activity}" = "(skipped — upstream red)" ]) \
               && ([ "${revert}" = "0" ] \
                   || [ "${revert}" = "(skipped — upstream red)" ]) \
               && ([ "${wiki}" = "0" ] \
                   || [ "${wiki}" = "(skipped — upstream red)" ]); then
              echo "overall=green"
            else
              echo "overall=red"
            fi
          } >> "$GITHUB_OUTPUT"
          echo "=== combined: handshake=${handshake} tool=${tool} activity=${activity} revert=${revert} wiki=${wiki} worst=${worst} ==="
          # Exit non-zero on red so the run conclusion reflects canary
          # color — alarm-sink uses prior-run conclusion to detect
          # consecutive reds.
          _activity_is_red="0"
          case "${activity}" in
            0|"(skipped"*) _activity_is_red="0" ;;
            *) _activity_is_red="1" ;;
          esac
          _revert_is_red="0"
          case "${revert}" in
            0|"(skipped"*) _revert_is_red="0" ;;
            *) _revert_is_red="1" ;;
          esac
          _wiki_is_red="0"
          case "${wiki}" in
            0|"(skipped"*) _wiki_is_red="0" ;;
            *) _wiki_is_red="1" ;;
          esac
          if [ "${handshake}" != "0" ] || [ "${tool}" != "0" ] \
             || [ "${_activity_is_red}" = "1" ] \
             || [ "${_revert_is_red}" = "1" ] \
             || [ "${_wiki_is_red}" = "1" ]; then
            exit "${worst}"
          fi

  layer2-probe:
    # Layer-2: Claude.ai connector liveness. Runs headless via injectable
    # _probe_fn — in GHA there is no real browser, so this step detects the
    # absence of a real browser and exits SKIP (14, treated as 0).
    # SOFT_YELLOW signals (fabrication-mode suspected) write to the alarm log
    # and are echoed to stdout via GHA-mode in uptime_alarm.py; they do NOT
    # open GH issues (that path is Layer-1 only).
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      l2_status: ${{ steps.l2probe.outputs.l2_status }}
      l2_semantic: ${{ steps.l2probe.outputs.l2_semantic }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Layer-2 connector probe
        id: l2probe
        continue-on-error: true
        env:
          GITHUB_ACTIONS: "true"
        run: |
          set +e
          python scripts/uptime_canary_layer2.py --once 2>&1
          code=$?
          set -e
          # Map exit code to human-readable semantic.
          case "$code" in
            0)  semantic="GREEN_OR_SOFT_YELLOW" ;;
            10) semantic="RED_tool_not_invoked" ;;
            12) semantic="RED_field_not_matched" ;;
            13) semantic="RED_browser_load_error" ;;
            14) semantic="SKIP_lock_unavailable" ;;
            15) semantic="RED_auth_expired" ;;
            *)  semantic="RED_unexpected_exit_${code}" ;;
          esac
          _delim="EOF_$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
          {
            echo "l2_status=$code"
            echo "l2_semantic<<${_delim}"
            echo "$semantic"
            echo "${_delim}"
          } >> "$GITHUB_OUTPUT"
          echo "=== layer-2 probe exit=$code semantic=$semantic ==="
          # SKIP (14) and GREEN/SOFT_YELLOW (0) are both non-failure for GHA.
          # RED exits (10/12/13/15/99) make this step fail.
          if [ "$code" != "0" ] && [ "$code" != "14" ]; then
            exit $code
          fi

      - name: Layer-2 alarm evaluation (GHA mode)
        if: always()
        env:
          GITHUB_ACTIONS: "true"
        run: |
          # GITHUB_ACTIONS=true: uptime_alarm.py mirrors new alarm lines to
          # stdout so they appear in workflow output without fetching the file.
          python scripts/uptime_alarm.py --verbose

      - name: Layer-2 Summary
        if: always()
        run: |
          echo "### Layer-2 connector probe" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **exit** → \`${{ steps.l2probe.outputs.l2_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **semantic** → ${{ steps.l2probe.outputs.l2_semantic }}" >> "$GITHUB_STEP_SUMMARY"

  alarm-sink:
    # Runs on every tick so it can close issues after recovery too.
    # `if: always()` because the probe job intentionally exits non-zero
    # on red — without always(), alarm-sink would skip on every red run.
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gate on consecutive-red threshold + manage issue
        id: gate
        uses: actions/github-script@v7
        env:
          OVERALL: ${{ needs.probe.outputs.overall }}
          PROBE_STATUS: ${{ needs.probe.outputs.status }}
          PROBE_MSG: ${{ needs.probe.outputs.msg }}
          LABEL: ${{ env.ALARM_ISSUE_LABEL }}
          THRESHOLD: ${{ env.ALARM_THRESHOLD }}
          PROBE_URL: ${{ env.PROBE_URL }}
        with:
          script: |
            const overall = process.env.OVERALL;
            const label = process.env.LABEL;
            const threshold = parseInt(process.env.THRESHOLD, 10);
            const probeStatus = process.env.PROBE_STATUS;
            const probeMsg = process.env.PROBE_MSG || '';
            const now = new Date().toISOString();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // Ensure label exists.
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Auto-opened by uptime canary on public MCP outage.',
                });
                console.log(`created label ${label}`);
              } else {
                throw e;
              }
            }

            // Find open p0-outage issue (expect 0 or 1).
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            });
            const openIssue = openIssues.data[0] || null;

            // Consecutive-red detection: prior run conclusion=failure means red.
            async function previousRunWasRed() {
              const prior = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'uptime-canary.yml',
                status: 'completed',
                per_page: 5,
              });
              const priorRuns = (prior.data.workflow_runs || []).filter(
                r => String(r.id) !== process.env.GITHUB_RUN_ID,
              );
              if (!priorRuns.length) return false;
              return priorRuns[0].conclusion === 'failure';
            }

            function formatBody(kind) {
              return [
                `**${kind}** @ ${now}`,
                ``,
                `- \`${process.env.PROBE_URL}\` → exit ${probeStatus}`,
                ``,
                `<details><summary>probe output</summary>`,
                ``,
                '```',
                probeMsg.trim() || '(empty)',
                '```',
                ``,
                `</details>`,
                ``,
                `Run: ${runUrl}`,
              ].join('\n');
            }

            // Outputs consumed by the Pushover paging step downstream.
            // Defaults are "no page" — only flipped when an issue is opened
            // or already open during red.
            core.setOutput('page_eligible', 'false');
            core.setOutput('issue_number', '');
            core.setOutput('is_first_alarm', 'false');

            if (overall === 'red') {
              if (openIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: openIssue.number,
                  body: formatBody('RED'),
                });
                console.log(`appended RED to #${openIssue.number}`);
                // Escalation path — not a first alarm, but the ladder may
                // still re-page at 1h/4h/24h.
                core.setOutput('page_eligible', 'true');
                core.setOutput('issue_number', String(openIssue.number));
                core.setOutput('is_first_alarm', 'false');
                return;
              }

              const priorRed = await previousRunWasRed();
              if (priorRed) {
                const result = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `P0 Public MCP outage — ${now}`,
                  labels: [label],
                  body: [
                    `Auto-opened by the uptime canary after ${threshold} consecutive reds.`,
                    `This issue tracks the outage window; comments append per tick.`,
                    ``,
                    formatBody('RED (threshold crossed)'),
                  ].join('\n'),
                });
                console.log(`opened issue #${result.data.number} (threshold crossed)`);
                // First-alarm path — always pages.
                core.setOutput('page_eligible', 'true');
                core.setOutput('issue_number', String(result.data.number));
                core.setOutput('is_first_alarm', 'true');
              } else {
                console.log('first-red — not yet alarming. Next red will open issue.');
              }
              return;
            }

            // GREEN path.
            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: formatBody('GREEN — RECOVERED'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`closed #${openIssue.number} as RECOVERED`);
            } else {
              console.log('steady green — no action');
            }

      # Pushover paging — navigator 2026-04-22 §c P0 fix.
      # Today's 18h outage: canary probe was green→red correctly, alarm-sink
      # opened issue correctly, but host learned ~18h later (email+GH only).
      # Pushover app push arrives on phone; priority=2 (emergency) forces
      # sound even on silent mode + retries until the host acknowledges,
      # with retry/expire set by pushover_page.py's P0_RETRY_S / P0_EXPIRE_S.
      # Re-pages at 1h / 4h / 24h while the incident stays open without a
      # host comment (escalation ladder in scripts/pushover_page.py).
      #
      # Seeding secrets (host action — not in-workflow):
      #   gh secret set PUSHOVER_USER_KEY --body "<user key from pushover.net>"
      #   gh secret set PUSHOVER_APP_TOKEN --body "<app api token>"
      # Both secrets live at Settings → Secrets and variables → Actions.
      # When missing, the step no-ops (decision stays intact; send_pushover
      # returns ok=false with a 'missing' error and we still post the marker
      # comment to preserve audit trail).
      - name: Fetch issue comments for escalation decision
        id: comments
        if: steps.gate.outputs.page_eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
        run: |
          # Pull all comments (paginated), emit as a single JSON array.
          mkdir -p /tmp/pushover
          gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --jq '.' > /tmp/pushover/comments_raw.json
          # `gh --paginate` concatenates per-page JSON arrays; merge them.
          python -c "
          import json, sys
          merged = []
          with open('/tmp/pushover/comments_raw.json', 'r', encoding='utf-8') as fp:
              text = fp.read().strip()
          # --paginate emits multiple arrays back-to-back; parse each.
          dec = json.JSONDecoder()
          i = 0
          while i < len(text):
              while i < len(text) and text[i] in ' \t\r\n':
                  i += 1
              if i >= len(text):
                  break
              obj, offset = dec.raw_decode(text, i)
              if isinstance(obj, list):
                  merged.extend(obj)
              i = offset
          with open('/tmp/pushover/comments.json', 'w', encoding='utf-8') as fp:
              json.dump(merged, fp)
          print(f'merged {len(merged)} comments')
          "

      - name: Pushover page
        id: page
        if: steps.gate.outputs.page_eligible == 'true'
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
        run: |
          set +e
          output=$(python scripts/pushover_page.py \
              --issue-number "${{ steps.gate.outputs.issue_number }}" \
              --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --probe-url "${PROBE_URL}" \
              --probe-exit "${{ needs.probe.outputs.status }}" \
              --kind "PUBLIC_MCP_OUTAGE" \
              $([ "${{ steps.gate.outputs.is_first_alarm }}" = "true" ] && echo "--first-alarm") \
              --comments-json /tmp/pushover/comments.json)
          code=$?
          set -e
          echo "$output"
          # Capture the MARKER line emitted only on successful page — the next
          # alarm-sink tick parses it back out of issue comments.
          marker=$(echo "$output" | awk -F'MARKER::' '/^MARKER::/ {print $2; exit}')
          if [ -n "$marker" ]; then
            printf 'marker=%s\n' "$marker" >> "$GITHUB_OUTPUT"
          fi
          exit $code

      - name: Post PAGED marker comment on issue
        if: steps.page.outputs.marker != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          MARKER_BODY: ${{ steps.page.outputs.marker }}
        run: |
          # The marker is a single-line machine-readable record the next
          # tick's pushover_page.py reads back to compute elapsed-since-last.
          gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              -f "body=${MARKER_BODY}"

      - name: Summary
        if: always()
        run: |
          echo "### Uptime canary result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **${{ env.PROBE_URL }}** → exit \`${{ needs.probe.outputs.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **overall** → **${{ needs.probe.outputs.overall }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- **page_eligible** → \`${{ steps.gate.outputs.page_eligible }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **is_first_alarm** → \`${{ steps.gate.outputs.is_first_alarm }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **paged_this_tick** → \`${{ steps.page.outputs.marker != '' }}\`" >> "$GITHUB_STEP_SUMMARY"
