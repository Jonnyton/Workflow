name: claude-auth-keepalive

# Keep the Claude-subscription session fresh on the Droplet. Claude Code stores
# login state under CLAUDE_CONFIG_DIR; the workflow-data volume preserves
# /data/.claude across redeploys.
on:
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch: {}

concurrency:
  group: claude-auth-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DO_DROPLET_HOST: ${{ secrets.DO_DROPLET_HOST || vars.DO_DROPLET_HOST }}
      DO_SSH_USER: ${{ secrets.DO_SSH_USER || vars.DO_SSH_USER }}
      DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
    steps:
      - name: Verify SSH settings
        run: |
          missing=()
          [ -z "${DO_DROPLET_HOST:-}" ] && missing+=("DO_DROPLET_HOST")
          [ -z "${DO_SSH_USER:-}" ] && missing+=("DO_SSH_USER")
          [ -z "${DO_SSH_KEY:-}" ] && missing+=("DO_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DO_SSH_KEY" > ~/.ssh/do_deploy
          chmod 600 ~/.ssh/do_deploy
          ssh-keyscan -t ed25519,rsa "$DO_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Exercise Claude subscription auth
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/do_deploy -o BatchMode=yes \
            "${DO_SSH_USER}@${DO_DROPLET_HOST}" \
            'sudo docker exec -e CLAUDE_CONFIG_DIR=/data/.claude workflow-daemon claude -p "Reply with the single word OK." >/dev/null'
          echo "Claude keepalive OK; subscription session exercised."
