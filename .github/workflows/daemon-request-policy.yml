name: Daemon request policy

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce writer/checker family policy
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const names = new Set(labels.map((label) => label.name));
            const violations = [];

            const writerClaude = names.has('writer:claude');
            const writerCodex = names.has('writer:codex');
            const checkerClaude = names.has('checker:claude');
            const checkerCodex = names.has('checker:codex');

            if (writerClaude && writerCodex) {
              violations.push('PR has both writer:claude and writer:codex labels.');
            }
            if (writerClaude && !checkerCodex) {
              violations.push('writer:claude PRs require checker:codex.');
            }
            if (writerClaude && checkerClaude) {
              violations.push('writer:claude PRs must not use checker:claude.');
            }
            if (writerCodex && !checkerClaude) {
              violations.push('writer:codex PRs require checker:claude.');
            }
            if (writerCodex && checkerCodex) {
              violations.push('writer:codex PRs must not use checker:codex.');
            }

            await core.summary
              .addHeading('Daemon Request Policy')
              .addList([
                `writer:claude=${writerClaude}`,
                `writer:codex=${writerCodex}`,
                `checker:claude=${checkerClaude}`,
                `checker:codex=${checkerCodex}`,
              ])
              .write();

            if (violations.length) {
              core.setFailed(violations.join('\n'));
            }
