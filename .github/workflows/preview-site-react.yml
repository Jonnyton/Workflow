# Hosted PREVIEW for WebSite/site-react on a Cloudflare Pages project.
#
# Gives a shareable *.pages.dev URL for reviewing the React site BEFORE the live
# cutover. It is a SEPARATE Cloudflare Pages project (tiny-site-react-preview) —
# it never touches tinyassets.io or its GitHub Pages deploy. Safe to run on every
# change.
#
# Triggers: pull_request touching the site/design-system, and manual dispatch.
#
# One-time host setup: the CLOUDFLARE_API_TOKEN repo secret must include the
# "Cloudflare Pages: Edit" permission (the existing token is scoped for Workers
# Routes; add Pages:Edit in the Cloudflare dashboard → My Profile → API Tokens).
# CLOUDFLARE_ACCOUNT_ID is resolved from the tinyassets.io zone if not set.
name: preview-site-react

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'WebSite/site-react/**'
      - 'WebSite/design-system/**'
      - '.github/workflows/preview-site-react.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-site-react-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build design system
        working-directory: WebSite/design-system
        run: |
          npm ci
          npm run build

      - name: Build site (static export, live MCP endpoint)
        working-directory: WebSite/site-react
        env:
          # Hosted preview points at the live MCP so vital signs/goals/graph try
          # to read real data (degrades gracefully if CORS blocks the pages.dev origin).
          NEXT_PUBLIC_MCP_PATH: 'https://tinyassets.io/mcp'
        run: |
          npm ci
          npm run build
          # CF Pages configures custom domains in its dashboard, not via a CNAME
          # file — remove it so there is zero chance of touching tinyassets.io.
          rm -f out/CNAME

      - name: Resolve Cloudflare account id
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set."
            exit 1
          fi
          account_id="${ACCOUNT_ID_SECRET}"
          if [ -z "${account_id}" ]; then
            response="$(curl -s -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/zones?name=tinyassets.io")"
            account_id="$(python3 -c 'import json,sys; d=json.load(sys.stdin); r=d.get("result") or []; print(((r[0].get("account") or {}).get("id") or "") if r else "")' <<< "${response}")"
          fi
          if [ -z "${account_id}" ]; then
            echo "::error::Could not resolve Cloudflare account id."
            exit 1
          fi
          echo "CLOUDFLARE_ACCOUNT_ID=${account_id}" >> "${GITHUB_ENV}"

      - name: Deploy to Cloudflare Pages (preview project)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          out="$(npx --yes wrangler@latest pages deploy WebSite/site-react/out \
            --project-name=tiny-site-react-preview \
            --branch="${GITHUB_REF_NAME}" \
            --commit-dirty=true 2>&1)"
          echo "${out}"
          url="$(echo "${out}" | grep -oE 'https://[a-z0-9-]+\.tiny-site-react-preview\.pages\.dev' | head -1)"
          if [ -z "${url}" ]; then
            url="$(echo "${out}" | grep -oE 'https://[a-z0-9.-]+\.pages\.dev' | head -1)"
          fi
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "### React site preview" >> "${GITHUB_STEP_SUMMARY}"
          echo "Preview URL: ${url}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          gh pr comment "${PR_NUMBER}" --body "🔎 **React site preview:** ${PREVIEW_URL}

          Separate Cloudflare Pages project — does not touch the live tinyassets.io. Updates on every push to this PR."
