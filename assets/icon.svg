<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#533483" stroke-width="3"/>
  <!-- Outer summoning ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.8"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#e94560" stroke-width="1" opacity="0.4" stroke-dasharray="12 6"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <!-- Pentagram-like workflow star (5 workflow phases) -->
  <polygon points="256,80 308,200 440,200 330,275 365,400 256,320 147,400 182,275 72,200 204,200"
           fill="none" stroke="#e94560" stroke-width="2" opacity="0.7"/>
  <!-- Center daemon eye -->
  <ellipse cx="256" cy="256" rx="45" ry="30" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="12" fill="#e94560" opacity="0.9"/>
  <!-- Radiating lines (connection/network) -->
  <line x1="256" y1="56" x2="256" y2="80" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <line x1="440" y1="200" x2="456" y2="200" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <line x1="365" y1="400" x2="378" y2="416" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <line x1="147" y1="400" x2="134" y2="416" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <line x1="72" y1="200" x2="56" y2="200" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <!-- Small orbital dots (daemons/agents) -->
  <circle cx="256" cy="56" r="5" fill="#e94560" opacity="0.8"/>
  <circle cx="456" cy="200" r="5" fill="#533483" opacity="0.8"/>
  <circle cx="378" cy="416" r="5" fill="#e94560" opacity="0.8"/>
  <circle cx="134" cy="416" r="5" fill="#533483" opacity="0.8"/>
  <circle cx="56" cy="200" r="5" fill="#e94560" opacity="0.8"/>
</svg>
