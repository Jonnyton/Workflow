id: gate_canon_promotion
display_name: Gate canon promotion
phase: custom
prompt_template: |
  Review this proposed Echoes contribution packet:

  {contribution_packet}

  Compare it against the current canon index:
  {canon_index}

  Decide whether it should be accepted-canon, draft-canon, needs-review, rejected, or archived.
  Give concrete reasons and identify any required human approval.
output_keys:
- promotion_decision
timeout_seconds: 300.0
approved: true
enabled: true
author: Jonathan Farnsworth
