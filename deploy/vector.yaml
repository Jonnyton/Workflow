# Vector config — base: sources, transforms, stdout sink.
#
# Self-host migration Row K per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Loaded via the vector entrypoint wrapper (deploy/vector-entrypoint.sh)
# which also conditionally loads deploy/vector-betterstack.yaml when
# BETTERSTACK_SOURCE_TOKEN is non-empty. Without the token, only this
# file is loaded — no betterstack sink, no 401 error noise.
#
# To enable Better Stack: set BETTERSTACK_SOURCE_TOKEN in
# /etc/workflow/env and restart compose. No config change needed.

# ---------------------------------------------------------------------
# Sources: Docker container logs
# ---------------------------------------------------------------------

sources:
  docker_logs:
    type: docker_logs
    # Scope to only our containers — don't spam Better Stack with
    # every Docker container on the box (if any).
    include_containers:
      - workflow-daemon
      - workflow-tunnel

# ---------------------------------------------------------------------
# Transforms: add metadata
# ---------------------------------------------------------------------

transforms:
  enriched:
    type: remap
    inputs: [docker_logs]
    source: |
      .service = "workflow"
      # Derive role from container name so Better Stack can filter.
      if .container_name == "workflow-daemon" {
        .role = "daemon"
      } else if .container_name == "workflow-tunnel" {
        .role = "cloudflared"
      } else {
        .role = "other"
      }

# ---------------------------------------------------------------------
# Sinks — dual-path
# ---------------------------------------------------------------------
#
# vector's env-var interpolation treats an unset BETTERSTACK_SOURCE_TOKEN
# as empty string, which means the betterstack sink will fail to auth.
# We avoid that by using a config fragment loaded conditionally — but
# vector-yaml doesn't support conditional sinks inline. Instead, we
# write BOTH sinks; the betterstack one is disabled when the token is
# empty via a healthcheck-style token presence check (vector reloads
# config on SIGHUP, so an env flip + reload works without compose
# restart).
#
# Simpler: ship everything to stdout always. If the operator wants
# Better Stack, they set BETTERSTACK_SOURCE_TOKEN and we ALSO ship
# there. Missing token = single-sink (stdout only).

sinks:
  # Always-on: write to vector's stdout so journald captures logs
  # even when Better Stack is unconfigured or temporarily down.
  stdout:
    type: console
    inputs: [enriched]
    encoding:
      codec: json
