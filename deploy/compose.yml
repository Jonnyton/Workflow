# Workflow daemon — Docker Compose for self-host deploys.
#
# Self-host migration Row D per
# docs/exec-plans/active/2026-04-20-selfhost-uptime-migration.md.
#
# Two services:
#   daemon      — the MCP server image (Row A Dockerfile, published to
#                 GHCR by Row I build-image.yml). Binds 127.0.0.1:8001.
#                 Reads on-disk state from a named volume mounted at
#                 /data, env-var driven per Row B data_dir() resolver.
#   cloudflared — tunnel sidecar exposing daemon at mcp.tinyassets.io
#                 (tunnel origin). Token read from env. Runs the
#                 official cloudflared image + the same run-tunnel.sh
#                 entrypoint used locally (Row C).
#
# The daemon does NOT publish 8001 to the host network; cloudflared
# reaches it via Docker's default bridge at daemon:8001. Only the
# loopback is exposed for host-side canary probes.
#
# Secrets: sourced from /etc/workflow/env (the env_file below). Host
# provisions that file with chmod 600 per HETZNER-DEPLOY.md. Never
# commit real values to this repo.
#
# Dev use:
#   # Render this compose against a local env file for smoke tests.
#   cp deploy/workflow-env.template /tmp/workflow-env
#   # ...fill in real values...
#   docker compose -f deploy/compose.yml --env-file /tmp/workflow-env up

services:
  daemon:
    # Pinned via env to support rollbacks. `latest` is the default
    # for first-deploy convenience; production pins a short-SHA tag
    # emitted by .github/workflows/build-image.yml.
    image: ${WORKFLOW_IMAGE:-ghcr.io/jonnyton/workflow-daemon:latest}
    container_name: workflow-daemon
    restart: unless-stopped
    # Image CMD already runs `python -m workflow.universe_server`.
    # Expose loopback only; cloudflared reaches via Docker network.
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      WORKFLOW_DATA_DIR: /data
      WORKFLOW_ALLOW_API_KEY_PROVIDERS: "0"
      WORKFLOW_CLOUD_DAEMON_SUBSCRIPTION_ONLY: "1"
      WORKFLOW_GOAL_POOL: "on"
      # Pass through anything in the env file.
      WORKFLOW_MCP_CANARY_URL: ${WORKFLOW_MCP_CANARY_URL:-https://tinyassets.io/mcp}
    env_file:
      - /etc/workflow/env
    volumes:
      - workflow-data:/data
    healthcheck:
      # Use the same canary shape as Layer-1 / tier-3 / docker-build
      # CI. Python already in the image.
      test: ["CMD", "python", "/app/scripts/mcp_public_canary.py",
             "--url", "http://127.0.0.1:8001/mcp", "--timeout", "10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    labels:
      org.workflow.component: daemon
      org.workflow.role: mcp-server

  cloudflared:
    # Official image, pinned to a known-stable tag. Bump by hand
    # after testing on a staging box; don't track `latest` in prod.
    image: cloudflare/cloudflared:2026.3.0
    container_name: workflow-tunnel
    restart: unless-stopped
    # cloudflared runs in host network namespace so that the tunnel's
    # dashboard-configured ingress rule `http://localhost:8001` resolves
    # to the daemon's loopback-published port (127.0.0.1:8001 on the
    # Droplet host). Without this, "localhost" inside the cloudflared
    # container is the container's own loopback — not the daemon.
    # Long-term cleaner fix: edit the tunnel ingress rule in Cloudflare
    # Zero Trust dashboard to point at `http://daemon:8001` (Docker
    # service name), then drop network_mode: host.
    network_mode: host
    # Tunnel token auth (shape A per Row C).
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - /etc/workflow/env
    depends_on:
      daemon:
        condition: service_healthy
    labels:
      org.workflow.component: tunnel
      org.workflow.role: cloudflare-ingress

  # Row K — log aggregation sidecar. Tails daemon + cloudflared stdout
  # via the Docker socket. Ships to Better Stack when
  # BETTERSTACK_SOURCE_TOKEN is set in /etc/workflow/env; otherwise
  # logs are captured by compose stdout (journald) only.
  #
  # vector-entrypoint.sh builds /run/vector-config/ at startup:
  #   - vector.yaml always loaded (sources + transforms + stdout)
  #   - vector-betterstack.yaml loaded only when token is non-empty
  # This prevents 401 error noise when the token is unset.
  logs:
    image: timberio/vector:0.40.0-alpine
    container_name: workflow-logs
    restart: unless-stopped
    env_file:
      - /etc/workflow/env
    entrypoint: ["/bin/sh", "/etc/vector/vector-entrypoint.sh"]
    volumes:
      - /opt/workflow/deploy/vector.yaml:/etc/vector/vector.yaml:ro
      - /opt/workflow/deploy/vector-betterstack.yaml:/etc/vector/vector-betterstack.yaml:ro
      - /opt/workflow/deploy/vector-entrypoint.sh:/etc/vector/vector-entrypoint.sh:ro
      # Docker socket access so vector's docker_logs source can tail
      # container stdout. Read-only — we never modify containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - daemon
    labels:
      org.workflow.component: logs
      org.workflow.role: log-forwarder

  # Task #14 — cloud-side node-executor worker. Closes the uptime gap
  # where MCP surface + canary + paging + DR all work 24/7 but node
  # execution depended on the host's laptop. Supervisor process spawns
  # `python -m fantasy_daemon --universe ... --no-tray` and restarts
  # on exit with exponential backoff on crashes.
  #
  # Identity: sets UNIVERSE_SERVER_HOST_USER=cloud-droplet so activity
  # log entries distinguish cloud-executed work from host/laptop work.
  # Concurrency safety: branch_tasks.claim_task is file-locked — two
  # fantasy_daemon processes on different hosts claiming tasks in the
  # same universe file race for the lock; loser sees status != pending
  # and returns None. No double-claim possible.
  #
  # Shares the workflow-data volume + /etc/workflow/env with `daemon`
  # so state persists across deploys and secrets are centralized.
  worker:
    image: ${WORKFLOW_IMAGE:-ghcr.io/jonnyton/workflow-daemon:latest}
    container_name: workflow-worker
    restart: unless-stopped
    command: ["python", "-m", "workflow.cloud_worker"]
    environment:
      WORKFLOW_DATA_DIR: /data
      WORKFLOW_ALLOW_API_KEY_PROVIDERS: "0"
      WORKFLOW_CLOUD_DAEMON_SUBSCRIPTION_ONLY: "1"
      WORKFLOW_GOAL_POOL: "on"
      # Cloud-side identity — distinguishes activity-log entries from
      # the host's `host` identity so multi-tenant ops can tell who
      # did what.
      UNIVERSE_SERVER_HOST_USER: cloud-droplet
    env_file:
      - /etc/workflow/env
    volumes:
      - workflow-data:/data
    depends_on:
      daemon:
        condition: service_healthy
    labels:
      org.workflow.component: worker
      org.workflow.role: node-executor

volumes:
  workflow-data:
    name: workflow-data
    # Local named volume backed by Docker's default driver. Backups
    # (Row J) snapshot this to Hetzner Storage Box.

networks:
  default:
    name: workflow-net
    # Default bridge; cloudflared reaches daemon via `daemon:8001`.
