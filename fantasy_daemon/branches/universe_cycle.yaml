# Fantasy universe-cycle Branch seed (Phase D).
#
# Wraps the full fantasy universe graph (`build_universe_graph()`) as
# a single-node registered Branch so the engine can drive fantasy
# through the standard Branch compile path under
# `WORKFLOW_UNIFIED_EXECUTION=1`.
#
# The single node `universe_cycle_wrapper` is a domain-trusted opaque
# callable registered by `fantasy_author/branch_registrations.py`.
# `published=false` because this is infrastructure, not a user-facing
# fork target. Users who accidentally fork it get a clean
# opaque-node-with-no-registry CompilerError (defense-in-depth for
# engine/domain coupling).
#
# State schema is the minimal boundary per preflight §4.1 #3; the
# real `UniverseState` lives inside the wrapped graph. Mid-cycle
# state is not persisted across wrapper invocations (preflight §4.11
# option-1 regression, accepted for v1).

branch_def_id: fantasy-universe-cycle-v1
name: Fantasy Universe Cycle
description: >
  Single-node wrap of the fantasy universe graph. Invokes
  build_universe_graph() once per outer-graph step via the
  domain-trusted opaque-node registry.
author: host
domain_id: fantasy_author
version: 1
tags:
  - fantasy_author
  - phase_d
  - domain_trusted
published: false

entry_point: universe_cycle_wrapper

graph_nodes:
  - id: universe_cycle_wrapper
    node_def_id: universe_cycle_wrapper

edges:
  - from: universe_cycle_wrapper
    to: END

conditional_edges: []

node_defs:
  - node_id: universe_cycle_wrapper
    display_name: Universe Cycle Wrapper
    description: >
      Opaque callable registered under (fantasy_author,
      universe_cycle_wrapper). Runs one full inner-graph pass to
      END (idle or stopped). Checkpoint stores only the boundary
      fields declared in state_schema.
    phase: custom
    input_keys:
      - universe_id
      - universe_path
      - premise_kernel
      - total_words
      - total_chapters
      - world_state_version
      - canon_facts_count
      - active_series
      - series_completed
    output_keys:
      - total_words
      - total_chapters
      - world_state_version
      - canon_facts_count
      - active_series
      - series_completed
      - health
    prompt_template: ""
    source_code: ""
    dependencies: []
    author: host
    approved: true
    enabled: true

state_schema:
  - name: universe_id
    type: str
  - name: universe_path
    type: str
  - name: premise_kernel
    type: str
  - name: health
    type: dict
    reducer: merge
  - name: total_words
    type: int
  - name: total_chapters
    type: int
  - name: world_state_version
    type: int
  - name: canon_facts_count
    type: int
  - name: active_series
    type: str
  - name: series_completed
    type: list
    reducer: append
