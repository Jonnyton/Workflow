<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#171f24" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; worker-src 'self'; connect-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self';"
    />
    <title>Scorched Tanks Browser Port</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar" aria-label="Game toolbar">
        <div class="identity">
          <span class="mark" aria-hidden="true">ST</span>
          <div>
            <h1>Scorched Tanks</h1>
            <p>Browser compatibility port</p>
          </div>
        </div>
        <div class="actions">
          <button id="install-button" class="button" type="button" disabled>Install</button>
          <button id="fullscreen-button" class="button" type="button">Fullscreen</button>
        </div>
      </header>

      <section class="stage" aria-label="Scorched Tanks game">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="hud" aria-label="Turn controls">
          <div class="readout">
            <span id="turn-label">Commander</span>
            <span id="wind-label">Wind 0.0</span>
            <span id="status" role="status">Ready</span>
          </div>
          <label>
            <span>Angle</span>
            <input id="angle-control" type="range" min="5" max="175" value="45" />
            <strong id="angle-value">45</strong>
          </label>
          <label>
            <span>Power</span>
            <input id="power-control" type="range" min="25" max="100" value="68" />
            <strong id="power-value">68</strong>
          </label>
          <label>
            <span>Weapon</span>
            <select id="weapon-control">
              <option value="single">Single Shot</option>
              <option value="big">Big Shot</option>
              <option value="dirt">Dirt Slinger</option>
              <option value="split">Scatter Shot</option>
            </select>
          </label>
          <button id="fire-button" class="button primary" type="button">Fire</button>
          <button id="new-round-button" class="button" type="button">New Round</button>
        </div>
      </section>

      <footer class="provenance" aria-label="Source provenance">
        <a href="https://aminet.net/package/game/shoot/Scorch185">Aminet reference</a>
        <span>Installable browser play surface generated by Workflow</span>
        <a href="https://www.retro32.com/gaming/amiga-public-domain/26042020710-scorched-tanks-v1-90-1994-dark-unicorn-amiga-public-domain-game">ADF reference</a>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
