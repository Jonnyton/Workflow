<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#161a18" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; worker-src 'self'; connect-src 'self' https://cloudflareinsights.com; frame-src https://vamigaweb.github.io; child-src https://vamigaweb.github.io; style-src 'self'; img-src 'self' data:; media-src 'self';"
    />
    <title>Scorched Tanks Original Amiga Disk</title>
    <link rel="manifest" href="./manifest.webmanifest?v=exact-mount-guard" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=exact-mount-guard" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar" aria-label="Game toolbar">
        <div class="identity">
          <span class="mark" aria-hidden="true">ST</span>
          <div>
            <h1>Scorched Tanks</h1>
            <p>Original Amiga disk in a browser runtime</p>
          </div>
        </div>
        <div class="actions">
          <button id="install-button" class="button" type="button" disabled>
            Install
          </button>
          <button id="emulator-fullscreen-button" class="button" type="button">
            Fullscreen
          </button>
        </div>
      </header>

      <section
        id="emulator-panel"
        class="emulator-panel"
        aria-label="Original Amiga runtime"
      >
        <div class="runtime-toolbar">
          <div class="runtime-state">
            <span id="runtime-status" role="status">Runtime booting</span>
            <span id="media-status">Original disk pending</span>
            <span id="rom-status">AROS trial; use ROM if stuck</span>
            <span id="audio-status">Audio locked</span>
          </div>
          <div class="runtime-actions">
            <button id="start-aros-button" class="button primary" type="button">
              Restart Disk
            </button>
            <label class="file-button">
              <input id="kickstart-input" type="file" accept=".rom,.bin" />
              Kickstart ROM
            </label>
            <button
              id="start-kickstart-button"
              class="button"
              type="button"
              disabled
            >
              Run With ROM
            </button>
            <button id="reset-emulator-button" class="button" type="button">
              Reset
            </button>
          </div>
        </div>

        <div class="emulator-frame-wrap">
          <div id="emulator-frame-host" class="emulator-frame-host"></div>
        </div>
      </section>

      <details id="compatibility-port" class="compatibility-port">
        <summary>Compatibility port fallback</summary>
        <section
          class="compat-stage"
          aria-label="Browser-native Scorched Tanks fallback"
        >
          <canvas id="game" width="960" height="540"></canvas>
          <div class="hud" aria-label="Turn controls">
            <div class="readout">
              <span id="turn-label">Commander</span>
              <span id="wind-label">Wind 0.0</span>
              <span id="status" role="status">Ready</span>
            </div>
            <label>
              <span>Angle</span>
              <input
                id="angle-control"
                type="range"
                min="5"
                max="175"
                value="45"
              />
              <strong id="angle-value">45</strong>
            </label>
            <label>
              <span>Power</span>
              <input
                id="power-control"
                type="range"
                min="25"
                max="100"
                value="68"
              />
              <strong id="power-value">68</strong>
            </label>
            <label>
              <span>Weapon</span>
              <select id="weapon-control">
                <option value="single">Single Shot</option>
                <option value="big">Big Shot</option>
                <option value="dirt">Dirt Slinger</option>
                <option value="split">Scatter Shot</option>
              </select>
            </label>
            <button id="fire-button" class="button primary" type="button">
              Fire
            </button>
            <button id="new-round-button" class="button" type="button">
              New Round
            </button>
            <button id="compat-fullscreen-button" class="button" type="button">
              Fullscreen
            </button>
          </div>
        </section>
      </details>

      <footer class="provenance" aria-label="Source provenance">
        <a
          href="https://www.retro32.com/gaming/amiga-public-domain/26042020710-scorched-tanks-v1-90-1994-dark-unicorn-amiga-public-domain-game"
          >ADF source</a
        >
        <span>Original media, boot-patched only to autostart.</span>
        <a href="https://github.com/vAmigaWeb/vAmigaWeb">vAmigaWeb runtime</a>
      </footer>
    </main>

    <script src="./original.js?v=exact-mount-guard"></script>
    <script src="./app.js?v=exact-mount-guard"></script>
  </body>
</html>
