<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>Workflow — UI Kit</title>
  <link rel="icon" href="../../assets/logo-mark.svg" />
  <link rel="stylesheet" href="../../colors_and_type.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    body { min-width: 1240px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="SigilMark.jsx"></script>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="TopNav.jsx"></script>
  <script type="text/babel" src="Goal.jsx"></script>
  <script type="text/babel" src="Branch.jsx"></script>
  <script type="text/babel" src="BranchDAG.jsx"></script>
  <script type="text/babel" src="ChatDemo.jsx"></script>
  <script type="text/babel" src="PhoneTeamCommand.jsx"></script>
  <script type="text/babel" src="Landing.jsx"></script>
  <script type="text/babel" src="Connect.jsx"></script>
  <script type="text/babel" src="Catalog.jsx"></script>
  <script type="text/babel" src="Host.jsx"></script>
  <script type="text/babel" src="Contribute.jsx"></script>
  <script type="text/babel" src="AgentTeams.jsx"></script>
  <script type="text/babel" src="Diagrams.jsx"></script>
  <script type="text/babel" src="CodingDiagrams.jsx"></script>
  <script type="text/babel" src="Showcase.jsx"></script>
  <script type="text/babel" src="CodingShowcase.jsx"></script>
  <script type="text/babel" src="Economy.jsx"></script>

  <script type="text/babel">
    const STORAGE_KEY = "workflow.ui-kit.route";

    function App() {
      const [route, setRoute] = React.useState(
        () => localStorage.getItem(STORAGE_KEY) || "landing"
      );

      const navigate = React.useCallback((r) => {
        setRoute(r);
        localStorage.setItem(STORAGE_KEY, r);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      return (
        <div data-screen-label={`Workflow · ${route}`}>
          <TopNav current={route} onNavigate={navigate} />
          {route === "landing" && <Landing onNavigate={navigate} />}
          {route === "connect" && <Connect />}
          {route === "catalog" && <Catalog />}
          {route === "host" && <Host />}
          {route === "contribute" && <Contribute onNavigate={navigate} />}
          {route === "teams" && <AgentTeams onNavigate={navigate} />}
          {route === "showcase" && <Showcase onNavigate={navigate} />}
          {route === "coding" && <CodingShowcase onNavigate={navigate} />}
          {route === "economy" && <Economy />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
