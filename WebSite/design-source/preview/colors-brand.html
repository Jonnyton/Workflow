<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .swatch { width: 100%; aspect-ratio: 1 / 1; border-radius: 10px; border: 1px solid var(--border-1); position: relative; overflow: hidden; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .cell { display: flex; flex-direction: column; gap: 6px; }
    .name { font-size: 12px; color: var(--fg-1); font-weight: 600; }
    .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
    .sigil-swatch {
      background:
        radial-gradient(circle at 50% 50%, rgba(233,69,96,0.18) 0%, transparent 55%),
        linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .sigil-swatch::after {
      content: "";
      position: absolute; inset: 18%;
      border: 1.5px solid #533483;
      border-radius: 50%;
      box-shadow: 0 0 24px rgba(83,52,131,0.55);
    }
  </style>
  <div class="grid">
    <div class="cell"><div class="swatch" style="background:#0e0e1a"></div><div class="name">ink-900</div><div class="hex">#0E0E1A</div></div>
    <div class="cell"><div class="swatch" style="background:#1a1a2e"></div><div class="name">ink-800</div><div class="hex">#1A1A2E</div></div>
    <div class="cell"><div class="swatch" style="background:#16213e"></div><div class="name">ink-700</div><div class="hex">#16213E</div></div>
    <div class="cell"><div class="swatch sigil-swatch"></div><div class="name">sigil</div><div class="hex">ring energy</div></div>
    <div class="cell"><div class="swatch" style="background:#e94560"></div><div class="name">ember-600</div><div class="hex">#E94560</div></div>
    <div class="cell"><div class="swatch" style="background:#533483"></div><div class="name">violet-600</div><div class="hex">#533483</div></div>
    <div class="cell"><div class="swatch" style="background:#8a63ce"></div><div class="name">violet-400</div><div class="hex">#8A63CE</div></div>
    <div class="cell"><div class="swatch" style="background:#f7f5ef; border-color: rgba(0,0,0,0.1)"></div><div class="name">bone-50</div><div class="hex">#F7F5EF</div></div>
  </div>
</body></html>
