<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 20px; }
    .row2 { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; align-items: center; }
    .mark-wrap { display: flex; align-items: center; justify-content: center; height: 180px; background: linear-gradient(135deg, #0e0e1a 0%, #16213e 100%); border-radius: 12px; border: 1px solid var(--border-1); }
    .mark-wrap img { width: 130px; height: 130px; }
    .guide { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); line-height: 1.6; }
    .guide strong { color: var(--fg-1); font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; color: var(--ember-600); }
    .guide ul { margin: 0; padding-left: 14px; }
    .guide li + li { margin-top: 4px; }
  </style>
  <div class="row2">
    <div class="mark-wrap"><img src="../assets/logo-mark.svg" alt="Workflow sigil" /></div>
    <div class="guide">
      <strong>The mark</strong>
      <ul>
        <li>Summoning sigil — pentagram + rings + 4 cardinal nodes + central eye</li>
        <li>Min size: 24px. Favicon-safe at 16px.</li>
        <li>Never recolor. Never place on imagery without a 0.4+ dark overlay.</li>
        <li>Watermark use: bottom-right of hero, 0.06 opacity, 320px wide.</li>
      </ul>
    </div>
  </div>
</body></html>
