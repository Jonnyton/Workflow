<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 24px 20px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500; }
    .input { background: var(--bg-inset); color: var(--fg-1); border: 1px solid var(--border-1); border-radius: 8px; padding: 10px 14px; font-family: var(--font-mono); font-size: 13px; width: 100%; outline: none; transition: all 160ms var(--ease-summon); }
    .input::placeholder { color: var(--fg-3); }
    .input.focus { border-color: transparent; box-shadow: 0 0 0 1px var(--ember-600), 0 0 0 4px rgba(233,69,96,0.15); }
    .input.error { border-color: var(--ember-600); }
    .hint { font-size: 11px; color: var(--fg-3); font-family: var(--font-sans); }
    .hint.err { color: var(--ember-600); }
    .copy-row { display: flex; gap: 0; }
    .copy-row .input { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .copy-btn { background: var(--ember-600); color: var(--fg-on-ember); border: none; padding: 0 16px; border-radius: 0 8px 8px 0; font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; }
  </style>
  <div class="field">
    <label>MCP Server URL</label>
    <div class="copy-row">
      <input class="input" value="https://api.tinyassets.io/mcp" readonly />
      <button class="copy-btn">Copy</button>
    </div>
  </div>
  <div class="field">
    <label>Workflow name · focus state</label>
    <input class="input focus" placeholder="e.g. invoice-extractor" value="research-synthesizer" />
  </div>
  <div class="field">
    <label>Payout wallet · error state</label>
    <input class="input error" value="0x3a...invalid" />
    <span class="hint err">The summoning failed. Wallet address is not a valid ETH signer.</span>
  </div>
</body></html>
