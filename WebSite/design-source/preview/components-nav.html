<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 14px 20px; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: rgba(14,14,26,0.72); backdrop-filter: blur(10px); border: 1px solid var(--border-1); border-radius: 14px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 26px; height: 26px; }
    .brand .wm { font-family: var(--font-display); font-size: 16px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg-1); }
    .nav-items { display: flex; gap: 6px; }
    .nav-items a { font-family: var(--font-sans); font-size: 13px; color: var(--fg-2); padding: 6px 12px; border-radius: 6px; text-decoration: none; font-weight: 500; transition: all 160ms; }
    .nav-items a:hover { color: var(--fg-1); background: rgba(255,255,255,0.04); }
    .nav-items a.active { color: var(--ember-600); }
    .nav-items a.active::after { content: ""; display: block; height: 1px; background: var(--ember-600); margin-top: 3px; margin-left: -12px; margin-right: -12px; }
    .right { display: flex; align-items: center; gap: 10px; }
    .ghost { font-family: var(--font-sans); font-size: 12px; color: var(--fg-2); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-2); background: transparent; font-weight: 500; cursor: pointer; }
    .primary { font-family: var(--font-sans); font-size: 12px; color: var(--fg-on-ember); padding: 7px 14px; border-radius: 6px; background: var(--ember-600); border: none; font-weight: 600; cursor: pointer; }
  </style>
  <div class="nav">
    <div class="brand">
      <img src="../assets/logo-mark.svg" alt="Workflow" />
      <span class="wm">Workflow</span>
    </div>
    <div class="nav-items">
      <a href="#" class="active">Catalog</a>
      <a href="#">Connect</a>
      <a href="#">Host</a>
      <a href="#">Docs</a>
    </div>
    <div class="right">
      <button class="ghost">Sign in</button>
      <button class="primary">Summon a daemon →</button>
    </div>
  </div>
</body></html>
