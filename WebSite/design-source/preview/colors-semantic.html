<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tile { background: var(--bg-2); border: 1px solid var(--border-1); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .dot { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; border: 1px solid var(--border-1); }
    .dot.bg-0 { background: #0e0e1a; }
    .dot.bg-1 { background: #1a1a2e; }
    .dot.bg-2 { background: #16213e; }
    .dot.bg-3 { background: #1f2447; }
    .dot.fg-1 { background: #f2eee6; }
    .dot.fg-2 { background: #b9b4a6; }
    .dot.fg-3 { background: #7a7668; }
    .dot.accent { background: #e94560; }
    .dot.sigil { background: #533483; }
    .dot.live { background: #6dd3a6; }
    .dot.idle { background: #d9a84a; }
    .dot.error { background: #e94560; }
    .text .k { font-size: 12px; color: var(--fg-1); font-weight: 600; }
    .text .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  </style>
  <div class="row2">
    <div class="tile"><div class="dot bg-1"></div><div class="text"><div class="k">--bg-1</div><div class="v">page surface</div></div></div>
    <div class="tile"><div class="dot bg-2"></div><div class="text"><div class="k">--bg-2</div><div class="v">card / elevated</div></div></div>
    <div class="tile"><div class="dot fg-1"></div><div class="text"><div class="k">--fg-1</div><div class="v">primary text</div></div></div>
    <div class="tile"><div class="dot fg-2"></div><div class="text"><div class="k">--fg-2</div><div class="v">secondary text</div></div></div>
    <div class="tile"><div class="dot fg-3"></div><div class="text"><div class="k">--fg-3</div><div class="v">metadata / muted</div></div></div>
    <div class="tile"><div class="dot accent"></div><div class="text"><div class="k">--accent</div><div class="v">ember · primary CTA</div></div></div>
    <div class="tile"><div class="dot sigil"></div><div class="text"><div class="k">--sigil</div><div class="v">violet · ring energy</div></div></div>
    <div class="tile"><div class="dot live"></div><div class="text"><div class="k">--signal-live</div><div class="v">daemon online</div></div></div>
    <div class="tile"><div class="dot idle"></div><div class="text"><div class="k">--signal-idle</div><div class="v">idle (failure state)</div></div></div>
    <div class="tile"><div class="dot error"></div><div class="text"><div class="k">--signal-error</div><div class="v">summoning failed</div></div></div>
  </div>
</body></html>
