<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 20px; }
    .daemon { background: var(--bg-2); border: 1px solid var(--border-1); border-radius: 12px; padding: 16px 18px; display: grid; grid-template-columns: 40px 1fr auto; gap: 16px; align-items: center; position: relative; overflow: hidden; }
    .daemon + .daemon { margin-top: 10px; }
    .sigil-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1.5px solid var(--violet-600); display: flex; align-items: center; justify-content: center; position: relative; }
    .sigil-avatar::before { content: ""; position: absolute; inset: 5px; border-radius: 50%; border: 1px solid var(--ember-600); opacity: 0.5; }
    .sigil-avatar::after { content: ""; position: absolute; width: 5px; height: 5px; background: var(--ember-600); border-radius: 50%; box-shadow: 0 0 8px rgba(233,69,96,0.7); }
    .daemon.live .sigil-avatar { border-color: var(--violet-400); box-shadow: 0 0 20px rgba(138,99,206,0.4); }
    .name { font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--fg-1); }
    .sub { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 3px; }
    .right { display: flex; align-items: center; gap: 14px; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border-1); }
    .pill .d { width: 6px; height: 6px; border-radius: 50%; }
    .pill.live { background: rgba(109,211,166,0.1); color: #8de6bf; border-color: rgba(109,211,166,0.3); }
    .pill.live .d { background: #6dd3a6; box-shadow: 0 0 6px rgba(109,211,166,0.7); }
    .pill.idle { background: rgba(217,168,74,0.08); color: #e6bc6c; border-color: rgba(217,168,74,0.25); }
    .pill.idle .d { background: #d9a84a; }
    .earn { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
    .earn strong { color: var(--fg-1); }
  </style>
  <div class="daemon live">
    <div class="sigil-avatar"></div>
    <div>
      <div class="name">research-synthesizer</div>
      <div class="sub">daemon::research-synthesizer::a7f3 · bound to universe: papers/</div>
    </div>
    <div class="right">
      <span class="pill live"><span class="d"></span>Live</span>
      <span class="earn"><strong>$4.12</strong> earned today</span>
    </div>
  </div>
  <div class="daemon">
    <div class="sigil-avatar"></div>
    <div>
      <div class="name">invoice-ocr</div>
      <div class="sub">daemon::invoice-ocr::9bc1 · self-only · never takes outside work</div>
    </div>
    <div class="right">
      <span class="pill idle"><span class="d"></span>Idle</span>
      <span class="earn"><strong>—</strong></span>
    </div>
  </div>
</body></html>
