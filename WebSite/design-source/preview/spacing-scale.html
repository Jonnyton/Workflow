<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .row3 { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
    .tok { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bar { background: var(--ember-600); opacity: 0.85; border-radius: 2px; width: 24px; }
    .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: center; line-height: 1.3; }
    .lab strong { color: var(--fg-1); font-weight: 600; display: block; }
  </style>
  <div class="row3">
    <div class="tok"><div class="bar" style="height:4px"></div><div class="lab"><strong>s-1</strong>4px</div></div>
    <div class="tok"><div class="bar" style="height:8px"></div><div class="lab"><strong>s-2</strong>8px</div></div>
    <div class="tok"><div class="bar" style="height:12px"></div><div class="lab"><strong>s-3</strong>12px</div></div>
    <div class="tok"><div class="bar" style="height:16px"></div><div class="lab"><strong>s-4</strong>16px</div></div>
    <div class="tok"><div class="bar" style="height:20px"></div><div class="lab"><strong>s-5</strong>20px</div></div>
    <div class="tok"><div class="bar" style="height:24px"></div><div class="lab"><strong>s-6</strong>24px</div></div>
    <div class="tok"><div class="bar" style="height:32px"></div><div class="lab"><strong>s-8</strong>32px</div></div>
    <div class="tok"><div class="bar" style="height:40px"></div><div class="lab"><strong>s-10</strong>40px</div></div>
    <div class="tok"><div class="bar" style="height:48px"></div><div class="lab"><strong>s-12</strong>48px</div></div>
    <div class="tok"><div class="bar" style="height:64px"></div><div class="lab"><strong>s-16</strong>64px</div></div>
    <div class="tok"><div class="bar" style="height:80px"></div><div class="lab"><strong>s-20</strong>80px</div></div>
  </div>
</body></html>
