<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .scale { display: grid; grid-template-columns: 60px repeat(8, 1fr); gap: 0; align-items: stretch; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-1); }
    .scale + .scale { margin-top: 10px; }
    .scale .name { background: var(--bg-2); display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: var(--fg-2); font-weight: 600; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
    .step { aspect-ratio: 1 / 0.9; display: flex; align-items: flex-end; justify-content: flex-start; padding: 6px 8px; font-family: var(--font-mono); font-size: 9px; }
    .step.light { color: #0e0e1a; }
    .step.dark { color: #f2eee6; }
  </style>
  <div class="scale">
    <div class="name">Ink</div>
    <div class="step dark" style="background:#0e0e1a">900</div>
    <div class="step dark" style="background:#1a1a2e">800</div>
    <div class="step dark" style="background:#16213e">700</div>
    <div class="step dark" style="background:#1f2447">600</div>
    <div class="step dark" style="background:#2a2d55">500</div>
    <div class="step dark" style="background:#3c3f6e">400</div>
    <div class="step dark" style="background:#5a5d88">300</div>
    <div class="step light" style="background:#b9b4a6">200</div>
  </div>
  <div class="scale">
    <div class="name">Violet</div>
    <div class="step dark" style="background:#2b1a4a">900</div>
    <div class="step dark" style="background:#3f2470">700</div>
    <div class="step dark" style="background:#533483">600</div>
    <div class="step dark" style="background:#6b44a8">500</div>
    <div class="step light" style="background:#8a63ce">400</div>
    <div class="step light" style="background:#a88ad8">300</div>
    <div class="step light" style="background:#c1aae3">250</div>
    <div class="step light" style="background:#d9cbee">200</div>
  </div>
  <div class="scale">
    <div class="name">Ember</div>
    <div class="step dark" style="background:#8a1a33">900</div>
    <div class="step dark" style="background:#c22948">700</div>
    <div class="step light" style="background:#e94560">600</div>
    <div class="step light" style="background:#f06480">500</div>
    <div class="step light" style="background:#f48ba1">400</div>
    <div class="step light" style="background:#f8b2c0">300</div>
    <div class="step light" style="background:#fbcfd7">200</div>
    <div class="step light" style="background:#fde6eb">100</div>
  </div>
  <div class="scale">
    <div class="name">Bone</div>
    <div class="step light" style="background:#4a4738">700</div>
    <div class="step light" style="background:#87826f">500</div>
    <div class="step light" style="background:#c8c2af">300</div>
    <div class="step light" style="background:#e2ddcd">200</div>
    <div class="step light" style="background:#efece3">100</div>
    <div class="step light" style="background:#f7f5ef">50</div>
    <div class="step light" style="background:#faf8f2">25</div>
    <div class="step light" style="background:#ffffff">0</div>
  </div>
</body></html>
