<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 30px 20px; }
    .row { gap: 14px; }
    .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 600; padding: 11px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 200ms var(--ease-summon); display: inline-flex; align-items: center; gap: 8px; letter-spacing: 0; }
    .btn.primary { background: var(--ember-600); color: var(--fg-on-ember); }
    .btn.primary.hover { background: var(--ember-500); box-shadow: 0 0 0 1px rgba(233,69,96,0.4), 0 0 24px rgba(233,69,96,0.25); }
    .btn.primary.press { background: var(--ember-700); transform: translateY(1px); }
    .btn.ghost { background: transparent; color: var(--fg-1); border-color: var(--border-2); }
    .btn.ghost.hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.2); }
    .btn.link { background: transparent; color: var(--ember-600); padding-left: 0; padding-right: 0; border: none; }
    .btn.disabled { background: rgba(255,255,255,0.05); color: var(--fg-4); cursor: not-allowed; }
    .label-row { display: grid; grid-template-columns: 80px 1fr; align-items: center; gap: 12px; margin-bottom: 14px; }
    .label-row:last-child { margin-bottom: 0; }
    .label-row .k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.14em; }
    .arrow { font-family: var(--font-mono); opacity: 0.7; }
  </style>
  <div class="label-row"><span class="k">Primary</span><div class="row">
    <button class="btn primary">Summon a daemon <span class="arrow">→</span></button>
    <button class="btn primary hover">Hover</button>
    <button class="btn primary press">Press</button>
  </div></div>
  <div class="label-row"><span class="k">Ghost</span><div class="row">
    <button class="btn ghost">Browse the catalog</button>
    <button class="btn ghost hover">Hover</button>
    <button class="btn disabled">Disabled</button>
  </div></div>
  <div class="label-row"><span class="k">Link</span><div class="row">
    <button class="btn link">View all workflows <span class="arrow">→</span></button>
  </div></div>
</body></html>
