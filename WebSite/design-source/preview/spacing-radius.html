<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .row4 { display: flex; gap: 16px; align-items: flex-end; }
    .r { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .sq { width: 80px; height: 80px; background: var(--bg-2); border: 1px solid var(--border-1); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05); }
    .sq.ember { background: var(--ember-600); border-color: transparent; }
    .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: center; line-height: 1.4; }
    .lab strong { color: var(--fg-1); display: block; font-weight: 600; }
    .pill { width: 120px; height: 32px; border-radius: 999px; background: var(--ember-600); display: flex; align-items: center; justify-content: center; color: var(--fg-on-ember); font-size: 12px; font-weight: 600; }
  </style>
  <div class="row4">
    <div class="r"><div class="sq" style="border-radius:3px"></div><div class="lab"><strong>xs</strong>3px</div></div>
    <div class="r"><div class="sq" style="border-radius:6px"></div><div class="lab"><strong>sm</strong>6px</div></div>
    <div class="r"><div class="sq" style="border-radius:10px"></div><div class="lab"><strong>md</strong>10px</div></div>
    <div class="r"><div class="sq" style="border-radius:12px"></div><div class="lab"><strong>card</strong>12px</div></div>
    <div class="r"><div class="sq" style="border-radius:14px"></div><div class="lab"><strong>lg</strong>14px</div></div>
    <div class="r"><div class="sq" style="border-radius:22px"></div><div class="lab"><strong>xl</strong>22px</div></div>
    <div class="r"><div class="pill">pill</div><div class="lab"><strong>pill</strong>999px</div></div>
  </div>
</body></html>
