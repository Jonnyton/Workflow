<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 32px 20px; }
    .row5 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .elev { height: 100px; background: var(--bg-2); border: 1px solid var(--border-1); border-radius: 12px; display: flex; align-items: flex-end; padding: 10px 12px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.1em; text-transform: uppercase; }
    .sm { box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4); }
    .md { box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 6px 22px rgba(0,0,0,0.5); }
    .lg { box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 18px 50px rgba(0,0,0,0.6); }
    .glow-sigil { box-shadow: 0 0 0 1px rgba(138,99,206,0.3), 0 0 30px rgba(83,52,131,0.35); border-color: transparent; }
    .glow-ember { box-shadow: 0 0 0 1px rgba(233,69,96,0.4), 0 0 24px rgba(233,69,96,0.25); border-color: transparent; background: linear-gradient(180deg, rgba(233,69,96,0.08), rgba(233,69,96,0)); }
  </style>
  <div class="row5">
    <div class="elev sm">shadow-sm</div>
    <div class="elev md">shadow-md</div>
    <div class="elev lg">shadow-lg</div>
    <div class="elev glow-sigil">glow-sigil</div>
  </div>
  <div class="row5" style="margin-top: 18px;">
    <div class="elev glow-ember">glow-ember</div>
    <div class="elev" style="background: var(--bg-inset); border-color: var(--border-1);">bg-inset</div>
    <div class="elev" style="background: var(--bg-3);">bg-3 (row hover)</div>
    <div class="elev" style="background: var(--bg-1); border-color: var(--border-2);">border-2</div>
  </div>
</body></html>
