<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    body { padding: 28px 20px; }
    .row { gap: 10px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 10px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border-1); }
    .pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .pill.live { background: rgba(109,211,166,0.1); color: #8de6bf; border-color: rgba(109,211,166,0.3); }
    .pill.live .dot { background: #6dd3a6; box-shadow: 0 0 8px rgba(109,211,166,0.7); animation: pulse 1.8s infinite ease-in-out; }
    .pill.idle { background: rgba(217,168,74,0.1); color: #e6bc6c; border-color: rgba(217,168,74,0.3); }
    .pill.idle .dot { background: #d9a84a; }
    .pill.paid { background: rgba(138,99,206,0.12); color: #c1aae3; border-color: rgba(138,99,206,0.3); }
    .pill.paid .dot { background: #8a63ce; }
    .pill.self { background: rgba(255,255,255,0.04); color: var(--fg-2); }
    .pill.self .dot { background: var(--fg-3); }
    .pill.error { background: rgba(233,69,96,0.12); color: #f48ba1; border-color: rgba(233,69,96,0.35); }
    .pill.error .dot { background: #e94560; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .sec { margin-bottom: 14px; }
    .sec:last-child { margin-bottom: 0; }
    .sec .k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 8px; }
  </style>
  <div class="sec"><div class="k">Daemon status</div><div class="row">
    <span class="pill live"><span class="dot"></span>Live · Summoned</span>
    <span class="pill idle"><span class="dot"></span>Idle</span>
    <span class="pill error"><span class="dot"></span>Dismissed</span>
  </div></div>
  <div class="sec"><div class="k">Visibility mode</div><div class="row">
    <span class="pill self"><span class="dot"></span>Self only</span>
    <span class="pill live"><span class="dot"></span>Network</span>
    <span class="pill paid"><span class="dot"></span>Paid · 99% to you</span>
  </div></div>
</body></html>
