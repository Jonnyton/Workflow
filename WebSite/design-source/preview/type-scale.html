<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .line { display: grid; grid-template-columns: 78px 1fr 140px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border-1); gap: 14px; }
    .line:last-child { border-bottom: none; }
    .line .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em; }
    .line .sample { color: var(--fg-1); line-height: 1.1; }
    .line .spec { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: right; }
    .s-h1 { font-family: var(--font-display); font-size: 48px; font-weight: 500; letter-spacing: -0.02em; }
    .s-h2 { font-family: var(--font-display); font-size: 34px; font-weight: 500; letter-spacing: -0.02em; }
    .s-h3 { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
    .s-body { font-family: var(--font-sans); font-size: 14px; color: var(--fg-2); }
    .s-sm { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); }
  </style>
  <div class="line"><span class="name">H1</span><span class="sample s-h1">Your chatbot becomes a workshop.</span><span class="spec">Fraunces · 48/52</span></div>
  <div class="line"><span class="name">H2</span><span class="sample s-h2">How it works</span><span class="spec">Fraunces · 34/40</span></div>
  <div class="line"><span class="name">H3</span><span class="sample s-h3">Bind a daemon</span><span class="spec">Fraunces · 26/32</span></div>
  <div class="line"><span class="name">Body</span><span class="sample s-body">The daemon actually runs your workflow; it doesn't pretend.</span><span class="spec">Plex Sans · 14/22</span></div>
  <div class="line"><span class="name">Small</span><span class="sample s-sm">Last seen 3 minutes ago · Claude connector</span><span class="spec">Plex Sans · 12/18</span></div>
</body></html>
