<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css"></head>
<body>
  <style>
    .group { display: grid; grid-template-columns: 120px 1fr; gap: 18px; align-items: baseline; padding: 10px 0; border-bottom: 1px dashed var(--border-1); }
    .group:last-child { border-bottom: none; }
    .group .key { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.14em; }
    .ritual { font-family: var(--font-mono); font-size: 11px; color: var(--ember-600); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 500; }
    .code { font-family: var(--font-mono); font-size: 13px; color: var(--violet-200); background: rgba(255,255,255,0.06); border: 1px solid var(--border-1); padding: 2px 8px; border-radius: 3px; }
    .meta-row { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
    .meta-row strong { color: var(--fg-1); font-weight: 500; }
    .id-string { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
    .id-string .prefix { color: var(--violet-400); }
  </style>
  <div class="group"><span class="key">Ritual label</span><span class="ritual">· STATUS · SUMMONED</span></div>
  <div class="group"><span class="key">Inline code</span><span class="code">workflow.summon(universe_id)</span></div>
  <div class="group"><span class="key">Metadata</span><span class="meta-row">v1.0 · <strong>142 uses</strong> · CC0 · last updated 3d ago</span></div>
  <div class="group"><span class="key">Daemon ID</span><span class="id-string"><span class="prefix">daemon::</span>research-synthesizer::a7f3</span></div>
</body></html>
